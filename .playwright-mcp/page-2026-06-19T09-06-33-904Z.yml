          - generic [ref=e111]:
            - generic [ref=e112]:
              - heading "Summary" [level=3] [ref=e113]
              - paragraph [ref=e114]: <p>The LDAP and OAuth authentication flows use a TOCTOU (Time-of-Check-Time-of-Use) pattern for first-user admin role assignment. The regular signup handler (<code>signup_handler</code> in auths.py, line 663) was explicitly patched to prevent this race with the comment <em>"Insert with default role first to avoid TOCTOU race"</em>, but the LDAP and OAuth code paths were never updated with the same fix.</p>
            - generic [ref=e115]:
              - heading "Impact" [level=3] [ref=e116]
              - paragraph [ref=e117]: <p>Any LDAP/OAuth user who times their first login concurrently with the legitimate first admin can escalate to full admin privileges, gaining access to all user data, system configuration, API keys, and connected LLM backends.</p>
            - generic [ref=e118]:
              - heading "Exploitation" [level=3] [ref=e119]
              - paragraph [ref=e120]: <ol> <li>Deploy Open WebUI with LDAP or OAuth enabled on a fresh instance (no existing users)</li> <li>Send multiple concurrent authentication requests from different users</li> <li>Multiple requests pass the <code>has_users()</code> / <code>get_num_users() == 0</code> check simultaneously</li> <li>All concurrent users become administrators</li> </ol> <p><code>DATABASE_ENABLE_SESSION_SHARING</code> defaults to <code>False</code> (env.py:387), so each call uses its own database session, widening the race window.</p>
            - generic [ref=e121]:
              - heading "Patch" [level=3] [ref=e122]
              - paragraph [ref=e123]: <p>Fixed in PR <a href="https://github.com/open-webui/open-webui/pull/23626">#23626</a> (commit <a href="https://github.com/open-webui/open-webui/commit/96a0b3239b1aadb23fc359bf10849c9ba12fd6ec">96a0b3239</a>), first released in <strong>v0.9.0</strong> (Apr 2026). Both LDAP (<code>routers/auths.py</code>) and OAuth (<code>utils/oauth.py</code>) registration paths now use the same insert-first-check-after pattern that <code>signup_handler</code> already had:</p> <ol> <li>Insert the new user with <code>DEFAULT_USER_ROLE</code> unconditionally — no pre-insert role decision based on user count.</li> <li>After the insert commits, atomically call <code>Users.get_num_users() == 1</code> to check whether this is the sole user.</li> <li>Only the sole user gets promoted to <code>admin</code> via <code>Users.update_user_role_by_id</code>.</li> </ol> <p><code>OAuthManager.get_user_role</code> was also updated to return <code>DEFAULT_USER_ROLE</code> (not <code>admin</code>) for first-user bootstrap; admin promotion is deferred to the post-insert check above. With this ordering, two concurrent first-user registrations that both observe an empty table can both insert, but only one will see <code>get_num_users() == 1</code> afterward — the other will see <code>== 2</code> and not be promoted.</p> <p>Users on <code>&gt;= 0.9.0</code> are not affected.</p>
