              - paragraph [ref=e161]:
                - text: CVE-2026-45675 is a high-severity vulnerability in the "open-webui" package (versions <= 0.8.12) that arises from a TOCTOU (Time-of-Check-Time-of-Use) pattern in LDAP and OAuth authentication flows, potentially allowing unauthorized first-user admin role assignment. There is a fix available in version 0.9.0, but no information is provided regarding exploitation in the wild, proof-of-concept exploits, or downstream impacts on other vendors. The vulnerability is associated with CWE-269 and CWE-362, indicating issues related to improper privilege management and race conditions.
