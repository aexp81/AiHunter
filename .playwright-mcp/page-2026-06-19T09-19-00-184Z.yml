            - generic [ref=e112]:
              - heading "Summary" [level=3] [ref=e113]
              - paragraph [ref=e114]: Open WebUI fails to validate or sanitize file names when processing file attachments to prompts. This allows attackers to upload files with path traversal sequences (dot-segments) in the file name, enabling arbitrary file placement on the filesystem outside the intended uploads directory.
            - generic [ref=e115]:
              - heading "Impact" [level=3] [ref=e116]
              - paragraph [ref=e117]: An unauthenticated attacker over the network can upload files with traversal sequences in the filename to write arbitrary files anywhere on the filesystem that the web server process has permission to access, potentially enabling remote code execution or system compromise.
            - generic [ref=e118]:
              - heading "Exploitation" [level=3] [ref=e119]
              - paragraph [ref=e120]: One proof-of-concept exploit is available on github.com. There is no evidence of proof of exploitation at the moment.
            - generic [ref=e121]:
              - heading "Patch" [level=3] [ref=e122]
              - paragraph [ref=e123]: Patch available in version 0.1.124 and later.
            - generic [ref=e124]:
              - heading "Mitigation" [level=3] [ref=e125]
              - paragraph [ref=e126]: Upgrade Open WebUI to version 0.1.124 or later immediately. Until patching is possible, consider restricting network access to the Open WebUI application or disabling file attachment functionality if feasible.
