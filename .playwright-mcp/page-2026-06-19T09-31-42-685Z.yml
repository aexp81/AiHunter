          - generic [ref=e103]:
            - heading "Description" [level=2] [ref=e105]
            - generic [ref=e107]:
              - heading "Summary" [level=2] [ref=e108]
              - paragraph [ref=e109]:
                - text: The LDAP and OAuth authentication flows use a TOCTOU (Time-of-Check-Time-of-Use) pattern for first-user admin role assignment. The regular signup handler (
                - code [ref=e110]: signup_handler
                - text: in auths.py, line 663) was explicitly patched to prevent this race with the comment
                - emphasis [ref=e111]: "\"Insert with default role first to avoid TOCTOU race\""
                - text: ", but the LDAP and OAuth code paths were never updated with the same fix."
              - heading "Vulnerable Code" [level=2] [ref=e112]
              - heading "LDAP (auths.py, lines 479-490)" [level=3] [ref=e113]
              - generic [ref=e115]: "# Line 482 - CHECK: is the user table empty? role = 'admin' if not Users.has_users(db=db) else request.app.state.config.DEFAULT_USER_ROLE # Lines 484-490 - USE: create user with the role determined above user = Auths.insert_new_auth( email=email, password=str(uuid.uuid4()), name=cn, role=role, # <-- role was determined BEFORE insert, race window exists db=db, )"
              - heading "OAuth (oauth.py, lines 1103-1112, 1566-1574)" [level=3] [ref=e116]
              - generic [ref=e118]: "# Line 1104 - CHECK: count users def get_user_role(self, user, user_data): user_count = Users.get_num_users() if not user and user_count == 0: return 'admin' # Line 1112 # Lines 1566-1574 - USE: create user with pre-determined role user = Auths.insert_new_auth( ... role=self.get_user_role(None, user_data), # Line 1571 ... )"
              - paragraph [ref=e119]:
                - text: Both paths determine the role BEFORE inserting the user, creating a race window where multiple concurrent requests on a fresh instance can all observe an empty database and all receive the
                - code [ref=e120]: admin
                - text: role.
              - heading "Comparison with Patched Signup" [level=2] [ref=e121]
              - paragraph [ref=e122]:
                - text: The
                - code [ref=e123]: signup_handler
                - text: "(auths.py, line 663) was explicitly fixed:"
              - generic [ref=e125]: "# Insert with default role first to avoid TOCTOU race user = Auths.insert_new_auth(..., role=DEFAULT_USER_ROLE, ...) # Then check if this is the only user and upgrade if Users.get_num_users() == 1: Users.update_user_role_by_id(user.id, 'admin')"
              - paragraph [ref=e126]: The LDAP and OAuth paths did NOT receive this fix.
              - heading "Exploitation" [level=2] [ref=e127]
              - list [ref=e128]:
                - listitem [ref=e129]: Deploy Open WebUI with LDAP or OAuth enabled on a fresh instance (no existing users)
                - listitem [ref=e130]: Send multiple concurrent authentication requests from different users
                - listitem [ref=e131]:
                  - text: Multiple requests pass the
                  - code [ref=e132]: has_users()
                  - text: /
                  - code [ref=e133]: get_num_users() == 0
                  - text: check simultaneously
                - listitem [ref=e134]: All concurrent users become administrators
              - paragraph [ref=e135]:
                - code [ref=e136]: DATABASE_ENABLE_SESSION_SHARING
                - text: defaults to
                - code [ref=e137]: "False"
                - text: (env.py:387), so each call uses its own database session, widening the race window.
              - heading "Impact" [level=2] [ref=e138]
              - paragraph [ref=e139]: Any LDAP/OAuth user who times their first login concurrently with the legitimate first admin can escalate to full admin privileges, gaining access to all user data, system configuration, API keys, and connected LLM backends.
              - heading "Suggested Fix" [level=2] [ref=e140]
              - paragraph [ref=e141]:
                - text: Apply the same insert-then-check pattern used in
                - code [ref=e142]: signup_handler
                - text: ": insert the user with"
                - code [ref=e143]: DEFAULT_USER_ROLE
                - text: first, then atomically check if this is the only user and upgrade to admin only if so.
              - heading "Resolution" [level=2] [ref=e144]
              - paragraph [ref=e145]:
                - text: Fixed in PR
                - link "#23626" [ref=e146] [cursor=pointer]:
                  - /url: https://github.com/open-webui/open-webui/pull/23626
                - text: (commit
                - link "96a0b3239" [ref=e147] [cursor=pointer]:
                  - /url: https://github.com/open-webui/open-webui/commit/96a0b3239b1aadb23fc359bf10849c9ba12fd6ec
                - text: ), first released in
                - strong [ref=e148]: v0.9.0
                - text: (Apr 2026). Both LDAP (
                - code [ref=e149]: routers/auths.py
                - text: ) and OAuth (
                - code [ref=e150]: utils/oauth.py
                - text: ) registration paths now use the same insert-first-check-after pattern that
                - code [ref=e151]: signup_handler
                - text: "already had:"
              - list [ref=e152]:
                - listitem [ref=e153]:
                  - text: Insert the new user with
                  - code [ref=e154]: DEFAULT_USER_ROLE
                  - text: unconditionally — no pre-insert role decision based on user count.
                - listitem [ref=e155]:
                  - text: After the insert commits, atomically call
                  - code [ref=e156]: Users.get_num_users() == 1
                  - text: to check whether this is the sole user.
                - listitem [ref=e157]:
                  - text: Only the sole user gets promoted to
                  - code [ref=e158]: admin
                  - text: via
                  - code [ref=e159]: Users.update_user_role_by_id
                  - text: .
              - paragraph [ref=e160]:
                - code [ref=e161]: OAuthManager.get_user_role
                - text: was also updated to return
                - code [ref=e162]: DEFAULT_USER_ROLE
                - text: (not
                - code [ref=e163]: admin
                - text: ) for first-user bootstrap; admin promotion is deferred to the post-insert check above. With this ordering, two concurrent first-user registrations that both observe an empty table can both insert, but only one will see
                - code [ref=e164]: get_num_users() == 1
                - text: afterward — the other will see
                - code [ref=e165]: == 2
                - text: and not be promoted.
              - paragraph [ref=e166]:
                - text: Users on
                - code [ref=e167]: ">= 0.9.0"
                - text: are not affected.
              - heading "References" [level=3] [ref=e168]
