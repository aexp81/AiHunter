          - generic [ref=e111]:
            - generic [ref=e112]:
              - heading "Summary" [level=3] [ref=e113]
              - paragraph [ref=e114]: Open WebUI prior to version 0.9.0 does not validate that the LDAP authentication endpoint receives a non-empty password before performing a Simple Bind against the LDAP server. The LdapForm Pydantic model accepts an empty string as a valid password, allowing the subsequent bind operation to succeed on vulnerable LDAP servers. Upon successful bind with an empty password, the application issues a full session token for the targeted user.
            - generic [ref=e115]:
              - heading "Impact" [level=3] [ref=e116]
              - paragraph [ref=e117]: An unauthenticated attacker over the network can submit an empty password to the LDAP authentication endpoint and gain a valid session token as any targeted user, achieving full unauthorized access to the Open WebUI application and platform.
            - generic [ref=e118]:
              - heading "Exploitation" [level=3] [ref=e119]
              - paragraph [ref=e120]: One proof-of-concept exploit is available on github.com. There is no evidence of proof of exploitation at the moment.
            - generic [ref=e121]:
              - heading "Patch" [level=3] [ref=e122]
              - paragraph [ref=e123]: Yes. Version 0.9.0 and later contain the fix.
            - generic [ref=e124]:
              - heading "Mitigation" [level=3] [ref=e125]
              - paragraph [ref=e126]: Upgrade Open WebUI to version 0.9.0 or later. Additionally, configure your LDAP server to reject empty password bind attempts if possible, and monitor LDAP authentication logs for suspicious activity involving empty passwords.
          - paragraph [ref=e128]: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
