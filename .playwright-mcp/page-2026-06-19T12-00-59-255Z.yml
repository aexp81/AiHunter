                  - generic [ref=e1040]: "<h2>Vulnerability Disclosure Analysis Documentation</h2> <h2>Vulnerability Details</h2> <ol> <li>Discoverer: Taylor Pennington of KoreLogic, Inc.</li> <li>Date Submitted: June 11, 2024</li> <li>Title: Open WebUI Arbitrary File Write, Delete via Path Traversal</li> <li>High-level Summary: Attacker controlled files can be uploaded to arbitrary locations on the web server's filesystem by abusing a path traversal vulnerability. After the file is written, it is deleted.</li> <li>Affected Vendor: Open WebUI</li> <li>Affected Product(s): Open WebUI (Formerly Ollama WebUI)</li> <li>Affected Version(s): 0.1.105</li> <li>Platform/OS: Debian GNU/Linux 12 (bookworm)</li> <li>Vector: HTTP web interface</li> <li>CWE: 22 Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')</li> <li>Technical Analysis:</li> </ol> <p>When attaching files to a prompt by clicking the plus sign (+) on the left of the message input box when using the Open WebUI HTTP interface, the file is uploaded to a static upload directory. If the file is an audio file it will be sent to a second API that will attempt to transcribe it.</p> <p>The name of the file is derived from the original HTTP upload request and is not validated or sanitized. This allows for users to upload files with names containing dot-segments in the file path and traverse out of the intended u..."
