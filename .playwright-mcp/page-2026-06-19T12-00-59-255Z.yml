                  - generic [ref=e1580]: "VULNERABILITY TYPE: Code Injection via Untrusted External Data Source WHO IS IMPACTED: All users who enable Direct Connections feature Organizations allowing external model endpoints Users adding local models (Ollama, LM Studio, custom APIs) Development and testing environments Direct Connections is admin-controllable but affects all users once enabled Common in organizations using \"bring your own model\" policies Social engineering success rate is high (\"Try my free GPT-4\") Feature is designed for external connections, making attacks plausible ATTACK SCENARIOS: Scenario 1: Corporate Espionage Attacker targets company using Open WebUI Posts \"free GPT-4 alternative\" on Reddit/HackerNews Company employees add the malicious model Multiple tokens stolen including admin Full access to company's AI conversations and data Scenario 2: Supply Chain Attack MSP hosts Open WebUI for 50 clients MSP employee tests malicious model Admin token stolen Attacker gains access to all 50 client instances Scenario 3: Insider Threat Amplification Disgruntled employee with user account Deploys malicious model Shares in company Slack: \"Cool new model!\" Admin tests it, token stolen Employee escalates to admin privileges Please note that once this vulnerability is fixed, we are going to release a blog. I work as a security researcher for Cato Networks."
