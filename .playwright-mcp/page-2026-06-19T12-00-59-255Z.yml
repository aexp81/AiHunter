                  - generic [ref=e212]: "<h2>Summary</h2><p>Open WebUI lets a user who can create, update, or import workspace models store arbitrary <code>meta.knowledge</code> entries on their model without checking whether they own or can read the referenced files. Open WebUI then treats <code>meta.knowledge</code> entries of type <code>file</code> as an authorization source in two places: the built-in <code>view_file</code> tool reads the file's extracted text, and <code>has_access_to_file()</code>'s model branch authorizes the file content and file delete endpoints. A malicious model owner can therefore attach another user's file ID to their model metadata and read or delete that private file.</p><h2>Impact</h2><p>Security boundary crossed: file confidentiality and integrity.</p><p>An authenticated attacker needs the <code>workspace.models</code> or <code>workspace.models_import</code> permission (or write access to an existing model) and a victim file ID. With those, for a file they do not own and cannot otherwise read, the attacker can:</p><ul><li>read the file's extracted text (up to <code>100000</code> characters per <code>view_file</code> call from <code>file.data.content</code>),</li><li>read the file's content via <code>GET /api/v1/files/{id}/content</code>, and</li><li>delete the file via <code>DELETE /api/v1/files/{id}</code>.</li></ul><h2>Root Cause</h2><p><code>ModelMeta</code> allows extra metadata..."
