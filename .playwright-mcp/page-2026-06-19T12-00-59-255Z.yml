            - row "CVE-2026-45317 <p>An application-wide Cross-Site Request Forgery (CSRF) vulnerability was found Open-WebUl's image uploading functionality. An attacker can set an image URL to a malicious endpoint, allowing them to perform actions on behalf of a victim user. Any authenticated user can exploit this vulnerability, and any user who views the compromised image (e.g., a profile picture) will unknowingly send a GET request to the attacker-controlled URL. This can lead to cookie theft, denial of service (DoS), or other malicious actions.</p> <p>This can be exploited in various locations, including:</p> <p>• Profile picture</p> <p>• Model picture</p> <p>• Hidden images in shared chats</p> <p>• Images within shared notes</p> 4.6 Exploit Patched Trending graph for this CVE" [ref=e783]:
