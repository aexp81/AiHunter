            - 'row "CVE-2026-44571 <p>In standard channels (i.e., channels whose <code>channel.type</code> is neither <code>group</code> nor <code>dm</code>), the endpoint</p> <p><code>POST /api/v1/channels/{channel_id}/messages/{message_id}/update</code> can be accessed with <strong>read permission only</strong>.</p> <p>When <code>access_control</code> is set to <code>None</code>, the authorization check <code>has_access(..., type=\"read\")</code> evaluates to <code>True</code>, allowing users who are <strong>not the message owner</strong> to update messages.</p> <p>As a result, unauthorized modification of other users’ messages is possible.</p> <hr /> 6.5 Exploit Patched Trending graph for this CVE" [ref=e927]':
