                  - link "CVE-2026-44570" [ref=e949] [cursor=pointer]:
                    - /url: /cve/CVE-2026-44570
                  - generic [ref=e950]: "Open WebUI is a self-hosted artificial intelligence platform designed to operate entirely offline. Prior to 0.6.19, authorization controls surrounding the memories API were inconsistent, resulting in the ability of a standard user to delete, restore, and view the contents of other users' memories. Using a newly created non-admin user with no existing memories, it is possible to view existing memories via POST /api/v1/memories/query. Similarly, even if a non-admin user cannot modify another user's memory data via POST /api/v1/memories/{memory_id}/update, the endpoint's response improperly leaks the content of that memory if a valid memory_id is known. The DELETE /api/v1/memories/{memory_id} can also be used by any user to delete an existing memory. Deleted memories can then be restored by calling the POST /api/v1/memories/{memory_id}/update endpoint again. This vulnerability is fixed in 0.6.19."
              - cell "8.3" [ref=e951]:
                - generic [ref=e953]: "8.3"
              - cell "Exploit" [ref=e954]:
                - paragraph [ref=e956]: Exploit
              - cell "Patched" [ref=e957]:
                - paragraph [ref=e959]: Patched
              - cell "Trending graph for this CVE" [ref=e960]:
                - img "Trending graph for this CVE" [ref=e962]
            - row [ref=e963]:
              - cell [ref=e964]:
                - generic [ref=e966]:
                  - link "CVE-2026-44569" [ref=e967] [cursor=pointer]:
                    - /url: /cve/CVE-2026-44569
                  - generic [ref=e968]: <p>There's an IDOR in the channels message management system that allows authenticated users to modify or delete any message within channels they have read access to. The vulnerability exists in the message update and delete endpoints, which implement channel-level authorization but completely lack message ownership validation.</p> <p>While the frontend correctly implements ownership checks (showing edit/delete buttons only for message owners or admins), the backend APIs bypass these protections by only validating channel access permissions without verifying that the requesting user owns the target message. This creates a client-side security control bypass where attackers can directly call the APIs to modify other users' messages.</p> <p>The vulnerability affects both message content modification and deletion, allowing users to tamper with message integrity and audit trails in collaborative channel environments.</p>
              - cell "7.1" [ref=e969]:
