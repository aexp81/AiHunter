                  - generic [ref=e140]: "<h2>Summary</h2><p>Open WebUI has a Broken Object Level Authorization (BOLA) vulnerability in the builtin <code>search_knowledge_files</code> tool.</p><p>When native function calling is enabled and the selected model has no attached knowledge bases, an authenticated user can call <code>search_knowledge_files</code> with an arbitrary <code>knowledge_id</code>. The function then returns file metadata from that knowledge base without checking whether the user has read access.</p><p>This allows unauthorized enumeration of private or restricted knowledge base files.</p><h2>Details</h2><p>The vulnerable code is in:</p><p><code>backend/open_webui/tools/builtin.py</code></p><p>Affected function:</p><pre><code>async def search_knowledge_files(query: str,knowledge_id: Optional[str] = None,count: int = 5,skip: int = 0,__request__: Request = None,__user__: dict = None,__model_knowledge__: Optional[list[dict]] = None,) -&gt; str:</code></pre><p>In the \"No attached knowledge\" branch, when <code>knowledge_id</code> is provided, the function directly calls:</p><pre><code>result = await Knowledges.search_files_by_id(knowledge_id=knowledge_id,user_id=user_id,filter={&quot;query&quot;: query},skip=skip,limit=count,)</code></pre><p>This code path does not verify that the current user is authorized to access the specified knowledge base.</p><p>The missing check is inconsistent with other nearby ..."
