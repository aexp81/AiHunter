                  - link "CVE-2026-45395" [ref=e517] [cursor=pointer]:
                    - /url: /cve/CVE-2026-45395
                  - generic [ref=e518]: "<p>The tool update endpoint (<code>POST /api/v1/tools/id/{id}/update</code>) is missing the <code>workspace.tools</code> permission check that is present on the tool create endpoint. This allows a user who has been explicitly <strong>denied</strong> tool management capabilities ( and who the administrator considers <strong>untrusted</strong> for code execution ) to replace a tool's server-side Python content and trigger execution, bypassing the intended <code>workspace.tools</code> security boundary.</p> <p>Open WebUI's security policy correctly states that <code>workspace.tools</code> is the trust boundary for code execution: <em>\"Granting a user the ability to create Tools is equivalent to giving them shell access to the server.\"</em> This vulnerability breaks that boundary. A <code>write</code> access grant on a single tool is sufficient to bypass <code>workspace.tools</code> entirely.</p> <p>This is <strong>not</strong> a report about exec() being unsandboxed (that is acknowledged as intended behavior). This is a report about a <strong>missing authorization check</strong> that allows an untrusted user to reach the exec() sink that should be gated behind <code>workspace.tools</code>.</p>"
