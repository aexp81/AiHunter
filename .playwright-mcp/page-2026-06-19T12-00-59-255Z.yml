                  - generic [ref=e176]: <h2>Summary</h2><p>A path traversal vulnerability exists in open-webui's cache file serving endpoint that allows any authenticated user to read files from sibling directories outside the intended cache directory, by exploiting an incomplete <code>startswith</code> containment check that lacks a trailing path separator.</p><p>The root cause is that <code>serve_cache_file()</code> in <code>open_webui/main.py</code> validates the resolved path with <code>file_path.startswith(os.path.abspath(CACHE_DIR))</code> — without appending <code>os.sep</code>. This allows any path resolving to a sibling directory whose name begins with <code>cache</code> (e.g. <code>cache_sibling</code>, <code>cache_backup</code>, <code>cached_models</code>) to pass validation.</p><p>Deep traversal and absolute paths are correctly blocked. The bypass is narrow but confirmed — limited to sibling-prefix directories.</p><h3>Exploitation constraints</h3><p>| Constraint | Detail ||---|---|| Auth required | <code>get_verified_user</code> — any user with role <code>user</code> or <code>admin</code> || Scope | Only sibling directories starting with <code>cache</code> (e.g. <code>cache_backup</code>, <code>cached_models</code>) || Deep traversal | Blocked — <code>../../etc/passwd</code> correctly fails the startswith check || Absolute paths | Blocked — <code>/etc/passwd</code> correctly fails || Client n...
