              - 'cell "CVE-2026-45398 <p><code>_validate_collection_access()</code> (<a href=\"https://github.com/open-webui/open-webui/pull/22109\">PR #22109</a>) checks the <code>user-memory-*</code> and <code>file-*</code> collection name prefixes but does not check knowledge base collections, which use raw UUIDs as collection names. Any authenticated user who knows a private knowledge base UUID can read its content through the retrieval query endpoints, even though the knowledge API correctly denies that user access. The same gap affects the retrieval write endpoints (<code>/process/text</code>, <code>/process/file</code>, <code>/process/files/batch</code>, <code>/process/web</code>, <code>/process/youtube</code>), allowing an attacker to inject content into or overwrite another user''s knowledge base.</p> <p>Reproduced on <code>main</code> at commit <code>4d058a125</code> (v0.8.11) on March 26, 2026.</p>" [ref=e460]':
