                  - generic [ref=e158]: "<h2>Summary</h2><p>Open WebUI's prompt version-history endpoints authorize the <code>prompt_id</code> in the URL but then act on caller-supplied history IDs without verifying that the history row belongs to that prompt (<code>history_entry.prompt_id == prompt.id</code>). Three operations are affected:</p><ul><li><code>GET /api/v1/prompts/id/{prompt_id}/history/diff</code> — returns another prompt's history snapshots (read).</li><li><code>POST /api/v1/prompts/id/{prompt_id}/update/version</code> — restores another prompt's snapshot into the caller's prompt, exposing its content (read).</li><li><code>DELETE /api/v1/prompts/id/{prompt_id}/history/{history_id}</code> — deletes another prompt's history entry (delete).</li></ul><p>An authenticated user with access to any prompt they control, plus a victim <code>prompt_history.id</code>, can read or delete another user's private prompt history. The single-entry read endpoint (<code>GET .../history/{history_id}</code>) already enforces the binding; these three did not.</p><h2>Impact</h2><p>Security boundary crossed: prompt confidentiality and integrity.</p><p>Prompt history snapshots can contain private prompt text, internal instructions, and sensitive variables. With a known victim <code>prompt_history.id</code>, an attacker can read another user's snapshot (via the diff endpoint or by restoring it into their own prompt) and ..."
