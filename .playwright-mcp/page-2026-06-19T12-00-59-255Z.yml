            - row "CVE-2026-45396 <p>The <code>POST /api/v1/evaluations/feedback</code> endpoint in Open WebUI v0.9.2 is vulnerable to mass assignment via <code>FeedbackForm</code>, which uses <code>model_config = ConfigDict(extra='allow')</code>. Due to an insecure dictionary merge order in <code>insert_new_feedback()</code>, an authenticated attacker can inject a <code>user_id</code> field in the request body that overwrites the server-derived value, creating feedback records attributed to any arbitrary user. This corrupts the model evaluation leaderboard (Elo ratings) and enables identity spoofing.</p> 5.4 Exploit Patched Trending graph for this CVE" [ref=e495]:
