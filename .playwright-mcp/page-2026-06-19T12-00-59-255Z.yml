                  - generic [ref=e104]: "<h2>Summary</h2><p>Several direct, index-addressed Ollama proxy routes accept a caller-supplied <code>url_idx</code>path parameter and use it as a raw index into the admin-configured <code>OLLAMA_BASE_URLS</code>list. Access control on these routes validates only whether the user may use therequested <em>model</em>, never which <em>backend</em> the request is routed to. Any authenticateduser can append an arbitrary <code>url_idx</code> to force their request onto an Ollama backendthey were never authorized to reach, including internal, higher-privilege, orexplicitly admin-disabled backends.</p><h2>Affected endpoints</h2><p>All indexed Ollama routes that resolve the backend through <code>get_ollama_url()</code>:</p><pre><code>POST /ollama/api/chat/{url_idx}POST /ollama/api/generate/{url_idx}POST /ollama/api/embed/{url_idx}POST /ollama/api/embeddings/{url_idx}POST /ollama/v1/chat/completions/{url_idx}POST /ollama/v1/completions/{url_idx}POST /ollama/v1/messages/{url_idx}POST /ollama/v1/responses/{url_idx}</code></pre><h2>Root cause</h2><p><code>backend/open_webui/routers/ollama.py</code> — <code>get_ollama_url()</code> consults themodel-to-backend allow-list (<code>OLLAMA_MODELS[model][\"urls\"]</code>) only when <code>url_idx</code> isomitted. When the caller supplies <code>url_idx</code>, that mapping is skipped and the value isused directly as an index:</p><pre><code>async ..."
