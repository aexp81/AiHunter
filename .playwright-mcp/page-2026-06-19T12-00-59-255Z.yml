                  - generic [ref=e194]: <h1>Stored XSS to Account Takeover via Model Profile Images in Open WebUI</h1><p><strong>Affected:</strong> Open WebUI &lt;= 0.9.5<strong>Bypass of:</strong> GHSA-3wgj-c2hg-vm6q, GHSA-3856-3vxq-m6fc</p><h2>TL;DR</h2><p>Open WebUI patched SVG XSS in user profile images and webhook profile images but forgot to apply the same fix to <strong>model</strong> profile images. The <code>ModelMeta</code> class has no <code>validate_profile_image_url</code> field validator, and the model image serving endpoint has no MIME allowlist or <code>nosniff</code> header. Any authenticated user with <code>workspace.models</code> permission (enabled by default) can store a <code>data:image/svg+xml;base64,...</code> payload in a model's profile image and achieve full account takeover of anyone who navigates to the image URL.</p><h2>Past of the issue</h2><p>In early 2025, two security advisories landed for Open WebUI:</p><ul><li><strong>GHSA-3wgj-c2hg-vm6q</strong> SVG XSS via user profile images</li><li><strong>GHSA-3856-3vxq-m6fc</strong> SVG XSS via webhook profile images</li></ul><p>The patches were clean. A <code>validate_profile_image_url</code> function was introduced in <code>backend/open_webui/utils/validate.py</code> a compiled regex that restricts <code>data:</code> URIs to safe raster formats (<code>image/png</code>, <code>image/jpeg</code>, <code>image/gif</code>, <code>image/webp...
