                    - /url: /cve/CVE-2026-45331
                  - generic [ref=e752]: <p><code>validate_url()</code> in <code>backend/open_webui/retrieval/web/utils.py</code> calls <code>validators.ipv6(ip, private=True)</code>, but the <code>validators</code> library does NOT implement the <code>private</code> keyword for IPv6 — the call raises a <code>ValidationError</code> (which is falsy in a boolean context), so every IPv6 address passes the filter. In addition, IPv4-mapped IPv6 (<code>::ffff:10.0.0.1</code>) bypasses the IPv4 check entirely, and several reserved IPv4 ranges (<code>0.0.0.0/8</code>, <code>100.64.0.0/10</code>, <code>192.0.0.0/24</code>, etc.) are not blocked.</p> <p>The vulnerability has existed since the <code>validate_url()</code> function was introduced and was NOT actually fixed by GHSA-c6xv-rcvw-v685 / CVE-2025-65958 despite that patch's intent. It affects every endpoint that calls <code>validate_url()</code>, including <code>/api/v1/retrieval/process/web</code>, <code>/api/v1/images/edit</code>, and others.</p>
              - cell "8.5" [ref=e753]:
