                  - generic [ref=e136]:
                    - text: On January 26,
                    - link "@augustozanellato" [ref=e137] [cursor=pointer]:
                      - /url: /augustozanellato
                    - text: reported that while reviewing a public MacOS app, they found a valid GitHub Access Token belonging to a Shopify employee. This token had read and write access to Shopify-owned GitHub repositories. Upon validating the report, we immediately revoked the token and performed an audit of access logs to confirm no unauthorized activity had occurred.
              - generic [ref=e138]:
                - strong [ref=e140]: Summary by augustozanellato
                - generic [ref=e141]:
                  - link [ref=e143] [cursor=pointer]:
                    - /url: /augustozanellato
                    - img [ref=e147]
                  - generic [ref=e153]:
                    - text: I was reviewing an Electron app made by one of Shopify employees (at the time I didn't know that Shopify was in any way involved), after extracting the
                    - code [ref=e154]: app.asar
                    - text: file using
                    - code [ref=e155]: npx asar extract path/to/app.asar extracted/path
                    - text: I found a
                    - code [ref=e156]: .env
                    - text: file, initially I skipped it because I thought it just contained some app configuration stuff but after taking a look at the source it was clear that the app never loaded it. It was probably a leftover of the release building process. That
                    - code [ref=e157]: .env
                    - text: contained a
                    - code [ref=e158]: GH_TOKEN
                    - text: variable, which is (as you can probably guess) a GitHub token, I tried using it to authenticate against GitHub REST API using
                    - code [ref=e159]: "curl -H \"Authorization: token $GH_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" https://api.github.com/user"
                    - text: ", I saw that the token was indeed valid so I decided to hit the"
                    - code [ref=e160]: /user/orgs
                    - text: API endpoint and I got back (among others) the Shopify organization, then I hit the
                    - code [ref=e161]: /orgs/Shopify/repos
                    - text: endpoint to confirm the GitHub token scope and I successfully got back a list containing both Shopify public and private repos with
                    - code [ref=e162]: "\"permissions\": {\"admin\": false, \"push\": true, \"pull\": true}"
                    - text: so at that point I knew that the token was enabling me to perform arbitrary push and pulls to Shopify repos so potentially permitting me to place backdoors and such.
