                - emphasis [ref=e62]: and access this lab and a robust library covering the latest in Cyber Security, Networking, Cloud, and Data Science!
              - heading "Description" [level=2] [ref=e63]:
                - strong [ref=e64]: Description
              - paragraph [ref=e65]:
                - text: In 2020, a critical vulnerability was found in the GitLab server. An issue discovered in GitLab CE/EE 8.5 to 12.9 is vulnerable to a path traversal when moving an issue between projects. This leads to the arbitrary file read via the UploadsRewriter and remote command execution on the vulnerable GitLab server. The problem was discovered by
                - link "William Bowling" [ref=e66] [cursor=pointer]:
                  - /url: https://twitter.com/wcbowling
                - text: .
              - paragraph [ref=e67]: This exercise is to understand how to exploit the vulnerable Gitlab (CVE-2020-10977) to gain a meterpreter session on the target machine.
              - paragraph [ref=e68]:
                - strong [ref=e69]: "Purpose:"
                - text: We are learning how to exploit Gitlab using the Metasploit Framework module and will exploit the Gitlab application manually to better understand the vulnerability. Also, we will use the python scripts for exploiting Gitlab.
              - paragraph [ref=e70]:
                - strong [ref=e71]: "Technical difficulty:"
                - text: Beginner
              - paragraph [ref=e72]
              - heading "What is GitLab?" [level=2] [ref=e73]:
                - strong [ref=e74]: What is GitLab?
              - paragraph [ref=e75]: GitLab Community Edition (CE) is an open-source end-to-end software development platform with built-in version control, issue tracking, code review, CI/CD, and more. Self-host GitLab CE on your own servers, in a container, or on a cloud provider.
              - paragraph [ref=e76]: GitLab is The DevOps platform that empowers organizations to maximize the overall return on software development by delivering software faster and efficiently, while strengthening security and compliance. With GitLab, every team in your organization can collaboratively plan, build, secure, and deploy software to drive business outcomes faster with complete transparency, consistency and traceability.
              - paragraph [ref=e77]: GitLab is an open core company which develops software for the software development lifecycle with 30 million estimated registered users and more than 1 million active license users, and has an active community of more than 2,500 contributors. GitLab openly shares more information than most companies and is public by default, meaning our projects, strategy, direction and metrics are discussed openly and can be found within our website. Our values are Collaboration, Results, Efficiency, Diversity, Inclusion & Belonging , Iteration, and Transparency (CREDIT) and these form our culture.
              - paragraph [ref=e78]:
                - strong [ref=e79]: "Source:"
                - text: https://about.gitlab.com/company/
              - paragraph [ref=e80]:
                - text: Also, before we get started, we highly recommend you to please refer this excellent blog by
                - link "snovvcrash" [ref=e81] [cursor=pointer]:
                  - /url: https://snovvcrash.rocks/2021/02/21/exploiting-cve-2020-10977-on-old-gitlab.html
                - text: .
              - heading "Vulnerable Code:" [level=2] [ref=e82]:
                - strong [ref=e83]: "Vulnerable Code:"
              - code [ref=e85]: "``` @text.gsub(@pattern) do |markdown| file = find_file(@source_project, $~[:secret], $~[:file]) break markdown unless file.try(:exists?) klass = target_parent.is_a?(Namespace) ? NamespaceFileUploader : FileUploader moved = klass.copy_to(file, target_parent) ... def find_file(project, secret, file) uploader = FileUploader.new(project, secret: secret) uploader.retrieve_from_store!(file) uploader end ```"
              - paragraph [ref=e86]: There is no restriction on what file can be accessed; because of that, path traversal can be used to copy any file, depending on the file's permission. This vulnerability allows an attacker to read sensitive files i.e., including tokens, private data, configs, etc
              - paragraph
              - heading "Lab Environment" [level=2] [ref=e87]:
                - strong [ref=e88]: Lab Environment
              - paragraph [ref=e89]: In this lab environment, the user will access a Kali GUI instance. A vulnerable machine GitLab server deployed on http://demo.ine.local.
              - paragraph [ref=e90]: "Goal after completing this scenario: Exploit the Gitlab server using the Metasploit framework module and gain the shell. Then read the flag."
