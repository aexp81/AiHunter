              - paragraph [ref=e159]: The port is set to 80, which is the GitLab server port. Also, set RHOSTS and USERNAME, PASSWORD, which we have created, then run the module.
              - paragraph
              - paragraph [ref=e160]: Commands
              - paragraph [ref=e161]: set RHOSTS demo.ine.local
              - paragraph [ref=e162]: set USERNAME test123
              - paragraph [ref=e163]: set PASSWORD password_123
              - paragraph [ref=e164]: check
              - img "gitlab_file_read_6_1.jpg" [ref=e165]
              - paragraph [ref=e166]: The target appears to be vulnerable. GitLab 12.8.1 is a vulnerable version.
              - paragraph [ref=e167]: The module first reads the /opt/gitlab/embedded/service/gitlab-rails/config/secrets.yml file and reads the value of secret_key_base This is a base key that is used for generating various other secrets.
