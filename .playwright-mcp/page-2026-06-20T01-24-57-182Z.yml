              - paragraph [ref=e55]:
                - emphasis [ref=e56]: In our lab walkthrough series, we go through selected lab exercises on our INE Platform.
                - link "Subscribe" [ref=e57] [cursor=pointer]:
                  - /url: https://ine.com/pricing
