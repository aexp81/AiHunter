name: "HTTP 客户端跨域重定向时未清除全部敏感请求头——残留的 Proxy-Authorization 泄露"
id: "HTTP_CLIENT_REDIRECT_SENSITIVE_HEADER_RESIDUAL_LEAK"
applicable: "whitebox"
phase: "auth"
also_phases: []
tags: ["http-client", "redirect", "proxy-authorization", "header-leak", "cross-origin", "undici", "node.js", "CVE-2024-30260", "CVE-2024-24758", "credential-leak", "incomplete-fix"]
source: "https://hackerone.com/reports/2451113"

# ——— L3 核心 ———

observation: >
  undici（Node.js HTTP 客户端）在 v5.28.3/v6.6.1 中修复了跨域重定向时清除
  Authorization 和 Cookie 头的问题（GHSA-3787-6prv-h9w3），但在 v6.7.0 中
  Proxy-Authorization 和 x-auth-token 头仍未被清除。
  fetch() 接口已正确清除，但 undici.request() 接口遗漏了。
  (原文: "Undici already cleared Authorization and Cookie headers on cross-origin
  redirects, but did not clear Proxy-Authorization and x-auth-token headers."
  团队摘要: "Undici cleared Authorization and Proxy-Authorization headers for
  fetch(), but did not clear them for undici.request().")

hypothesis: >
  未叙述（仅结果）。但从技术上下文可推断：研究者验证了已知修复（GHSA-3787-6prv-h9w3）
  是否覆盖了所有敏感头和所有接口，发现 Proxy-Authorization 和 x-auth-token 被遗漏，
  且 request/stream/pipeline 接口与 fetch 接口的清除逻辑不一致。

action_result: >
  PoC 验证成功：
  1. 用 undici.request() 发送请求到 127.0.0.1，附带 Proxy-Authorization 头
  2. 服务端返回 302 重定向到不同域名（a.com:2333）
  3. 在目标端口监听，发现 Proxy-Authorization 头被完整传递到跨域目标
  补丁在 commit 6805746 中修复，发布为 v5.28.4 和 v6.11.1。
  (原文: PoC 代码展示 headers 包含 'Proxy-Authorization': 'secret Proxy-Authorization'，
  "Listening on port 2333 and discovering that Proxy-Authorization headers has been passed.")

why_here_first: "未叙述（仅结果）"

chaining: >
  N/A。单独是 Low 级别信息泄露。但在代理环境中可被利用：
  攻击者控制重定向目标 → 窃取 Proxy-Authorization 凭证 → 冒充用户访问代理后资源。

# ——— 落地检查清单 ———

approach: >
  对 HTTP 客户端库的跨域重定向处理逻辑进行差分审计：对比已修复的敏感头清除列表
  与实际应清除的完整集合（Authorization、Cookie、Proxy-Authorization、
  x-auth-token 等），以及不同接口（fetch vs request/stream/pipeline）之间
  的行为一致性，寻找遗漏的头或遗漏的代码路径。

reasoning_chain:
  - "问：目标应用使用了哪些 HTTP 客户端库？（undici、axios、got、node-fetch、requests、httpx 等）"
  - "问：该库在跨域重定向时是否清除敏感请求头？具体清除了哪些头？"
  - "问：敏感头的完整集合是什么？是否有遗漏？（Authorization、Cookie、Proxy-Authorization、x-auth-token、X-API-Key、Bearer token 等）"
  - "问：不同接口/方法（fetch vs request vs stream vs pipeline）之间的头清除逻辑是否一致？"
  - "问：该库是否有过相关的安全修复？修复是否完整覆盖了所有敏感头和所有接口？"
  - "如果发现遗漏 → 构造 PoC：设置重定向到攻击者控制的域名，检查哪些敏感头被转发。"
  - "问：应用的使用场景中是否涉及代理认证（Proxy-Authorization）？该头泄露的实际影响是什么？"

vuln_root: >
  HTTP 客户端库在修复跨域重定向头清除问题时，仅处理了最常见的 Authorization 和 Cookie，
  遗漏了 Proxy-Authorization 等其他敏感头；且不同接口的实现路径不同，
  fetch() 已修复但 request() 未同步修复——典型的不完整修复（incomplete fix）模式。

transferable_to:
  - "所有 HTTP 客户端库的重定向处理逻辑（undici、axios、got、httpx、requests 等）"
  - "任何执行过「清除敏感头」修复的库——检查修复的完整性"
  - "代理环境（corporate proxy、API gateway proxy）中使用 HTTP 客户端的应用——Proxy-Authorization 泄露影响更大"
  - "微服务间调用中携带内部认证头的 HTTP 客户端——跨域重定向可能导致内部凭证泄露到外部"

