  - url: "https://hackerone.com/reports/3642600"
    title: "Authorization header leak in ssrf_filter via cross-host redirect leads to credential theft and unauthorized access"
    author: "argareksapatii"
    platform: "arkadiyt-projects (ssrf_filter Ruby gem)"
    severity: "未标注"
    bounty: "无"
    note: >
      ssrf_filter（Ruby SSRF 保护库）跨域重定向时未清除 Authorization 头：
      redirect 循环复用原始 request options（headers/body/request_proc），
      未区分 same-host 与 cross-host 重定向，导致 Bearer token 被转发到攻击者控制的域名。
      PoC 演示了完整链路：窃取 token → 重放到受保护 API → 获取私有数据。
      纯结果文，无 why_here_first/扑空叙事。
      (原文: "When a redirect crosses to a different host, it still reapplies
      caller-supplied sensitive state such as the Authorization header."
      "redirect loop reuses the original request options"
      "redirected requests reapply headers/body/request_proc"
      "redirects are not differentiated between same-host and cross-host targets")
  - url: "https://hackerone.com/reports/2390009"
    title: "Proxy-Authorization header is not cleared in cross-domain redirect in undici"
    author: "timon8"
    platform: "Node.js undici (Internet Bug Bounty)"
    severity: "Low"
    bounty: "$405"
    cve: "CVE-2024-24758"
    note: >
      undici v5.28.2/v6.6.0 跨域重定向时仅清除了 Authorization 和 Cookie 头，
      遗漏了 Proxy-Authorization 头。研究者在阅读 GHSA-wqq4-5wpv-mx2g 安全公告后
      发现该遗漏。修复版本 v5.28.3 / v6.6.1。GHSA-3787-6prv-h9w3。
      这是同一 insight 中 CVE-2024-30260 的前序漏洞——同一代码库的同一类遗漏，
      只是后续修复又遗漏了 request/stream/pipeline 接口。
      (原文: "I read this security advisory https://github.com/nodejs/undici/security/advisories/GHSA-wqq4-5wpv-mx2g.
      It only clears authorization and cookie header during cross-domain redirect."
      "As such this may lead to accidental leakage of 'Proxy-Authorization' to a 3rd-party site.")
  - url: "https://hackerone.com/reports/3480713"
    author: "yupiy"
    platform: "curl"
    severity: "High (作者评级，团队关闭为 N/A)"
    note: >
      curl 8.17.0 在通过代理发送请求后收到 302 重定向到直连目标（如 --noproxy 指定的地址）时，
      未清除 Proxy-Authorization 头，导致该头被转发到非代理的源站服务器。
      复现步骤：nc 监听代理和源站端口，代理返回 302 到 127.0.0.1:8080，
      curl 带 --noproxy 127.0.0.1 跟随重定向后，源站收到了 Proxy-Authorization 头。
      curl 团队关闭为 N/A（认为 -H 手动设置的头不属于 curl 责任范围）。
      与 undici 案例（CVE-2024-24758/CVE-2024-30260）属同一模式但不同库。
      (原文: "curl leaks the Proxy-Authorization header to the origin server after following
      an HTTP redirect that transitions from a proxied connection to a direct connection"
      "The Proxy-Authorization header must never be forwarded to origin servers and should
      be stripped when the request is sent directly instead of via a proxy.")
      2025-12 报告，2025-12 公开。关闭为 N/A。
  - url: "https://hackerone.com/reports/3180396"
    title: "Failure to strip Proxy-Authorization header on change in origin"
    author: "grahamcampbell"
    platform: "curl (curl.se)"
    severity: "Medium（作者评级，团队关闭为 N/A）"
    note: >
      curl 8.14.1 在跨域重定向时清除了 Authorization 和 Cookie 头，
      但未清除 Proxy-Authorization 头。研究者维护 PHP Guzzle HTTP 包（使用 curl），
      注意到 Go 刚修补了类似问题（CVE-2025-4673），随即检查 curl 发现同一遗漏。
      curl 团队关闭为 N/A。
      (原文: "I maintain the PHP Guzzle HTTP package which uses curl, and noticed
      we have the same issue as curl in this regard. I was made aware of this issue
      when golang patched something similar a few hours ago: CVE-2025–4673.")
      与 #3480713 同属 curl Proxy-Authorization 泄露系列，但本报告触发点是
      cross-language CVE 移植（Go→curl→PHP Guzzle），体现了跨语言修复对照审计的价值。
  - url: "https://hackerone.com/reports/2408074"
