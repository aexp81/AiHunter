name: "密码重置后自动登录——拦截重置链接即可绕过手动认证直接接管账户"
id: "PASSWORD_RESET_AUTO_LOGIN_REFERER_ATO"
applicable: "blackbox"
phase: "auth"
also_phases: []
tags: ["password-reset", "auto-login", "referer-leak", "account-takeover", "owasp", "session-management"]
source: "https://hackerone.com/reports/164648"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。密码重置完成后，用户被自动登录到账户，
  而非要求用户使用新密码手动登录。
  (原文团队摘要: "after resetting a password, the user was automatically logged in")

hypothesis: >
  未叙述（仅结果）。若密码重置链接通过 Referer header 泄露或其他方式被截获，
  攻击者使用该链接重置密码后将被自动登录，无需知道新密码或进行额外认证。
  (原文团队摘要: "compromising a legitimate password reset link
  (via referrer token leakage or a similar issue) could lead to
  compromising the account since the user would not be forced to
  log in after resetting their password")

action_result: >
  未叙述（仅结果，no-content 公开）。
  团队确认漏洞并按 OWASP Forgot Password Cheat Sheet 修复，
  修复后用户重置密码后需手动重新登录。
  (原文团队摘要: "OWASP forgot password recommendations suggest
  a better approach, which we have now implemented.")

why_here_first: "未叙述（仅结果）"

chaining: >
  密码重置链接泄露（Referer header / 共享浏览器 / 邮件转发 / 中间人）
  + 重置后自动登录 → 攻击者无需知道新密码即可完成账户接管。
  单独的自动登录不构成漏洞，需要与链接泄露场景组合。

# ——— 落地检查清单 ———

approach: >
  对密码重置流程，测试重置密码成功后是否直接将用户登入会话——
  若是，则拦截到重置链接（通过 Referer leak、邮件转发、共享设备）
  的攻击者可在受害者之前使用链接重置密码并直接获得认证会话，
  而不需要知道新设置的密码。OWASP 建议重置后强制重新登录。

reasoning_chain:
  - "问：密码重置成功后，浏览器是否被重定向到已认证的 dashboard/首页？"
  - "黑盒：完成密码重置流程后，检查响应 Set-Cookie 是否包含新的 session token。"
  - "问：重置后是否需要用户手动输入新密码登录？（检查是否出现登录页面）"
  - "如果重置后直接进入已认证状态 → 确认自动登录行为"
  - "问：密码重置链接是否可通过 Referer header 泄露？（重置页面是否有外部资源引用）"
  - "问：密码重置链接是否一次性使用？（使用后是否失效）"
  - "如果自动登录 + Referer 泄露/链接可复用 → 完整 ATO 路径成立"

vuln_root: >
  密码重置流程在设置新密码后自动为用户创建认证会话，
  违反了 OWASP 的"重置后强制重新登录"建议——
  开发者优先考虑用户体验（减少一步登录），
  忽略了重置链接可能被第三方截获的威胁模型。

transferable_to:
