name: "密码重置令牌与 URL 中 Account ID 未关联验证——替换 ID 接管任意账户"
id: "PASSWORD_RESET_TOKEN_ACCOUNT_BINDING_MISMATCH"
applicable: "blackbox"
phase: "auth"
also_phases: []
tags: ["idor", "ato", "account-takeover", "password-reset", "token-binding", "broken-authorization", "mass-ato", "stripe", "taxjar"]
source: "https://hackerone.com/reports/1685970"

observation: >
  密码重置/邮箱变更端点 POST /accounts/<ACCOUNT_ID> 中，后端用 URL 路径里的
  Account ID 确定操作目标用户，而不是从令牌本身解析目标用户。
  (原文团队摘要: 确认修复为 "rely on the user fetched from the reset password token itself
  instead of the account ID provided in the URL")

hypothesis: "未叙述（仅结果）"
action_result: >
  用自己的合法 token + 替换 URL 中的 Account ID 为受害者 ID + 注入攻击者 email，
  成功变更任意账户邮箱。可脚本化批量遍历实现 mass ATO。
  (原文: 替换 account number + 注入攻击者 email 即可变更任意账户邮箱)

why_here_first: "未叙述（仅结果）"
chaining: "替换 Account ID → 邮箱变更 → 密码重置 → 账户接管"

approach: >
  对密码重置/邮箱变更等使用一次性令牌的端点，测试 URL 中的 Account ID 与
  token 绑定的用户是否一致——用自己的合法 token + 替换 URL 中的 ID 测试。

reasoning_chain:
  - "问：密码重置/邮箱变更端点的 URL 格式是否包含 account_id/user_id？"
  - "问：将 URL 中的 ID 替换为其他用户的 ID，body 中保持自己的合法 token，请求是否成功？"
  - "如果成功 → 后端用 URL 的 ID 而非 token 确定目标用户"
  - "问：可否脚本化批量遍历 account_id 实现 mass ATO？"

vuln_root: "后端存在两个身份来源（token vs URL），错误地优先使用不可信的 URL 参数确定操作对象。"

transferable_to:
  - "任何 URL 格式为 /accounts/{id}/reset 或 POST 到 /accounts/{id} 的接口"
  - "令牌 scope 未与资源 ID 绑定的场景"

cases:
  - url: "https://hackerone.com/reports/1685970"
    note: "Stripe/TaxJar 密码重置 token/Account ID 绑定缺失，$13,000。"
  - url: "https://hackerone.com/reports/1716016"
    title: "Ability to join an arbitrary workspace by utilizing a proxy to manipulate invite links"
    platform: "Slack"
    severity: "Critical (CVSS 9.3)"
    bounty: "未公开"
    note: >
      Slack 邀请注册流程中，api/signup.createUser 的 team ID 参数未与邀请令牌绑定。
      攻击者可用代理截获请求，将 team ID 替换为任意 workspace 的 ID，
      加入未经邀请的工作空间。no-content 公开，仅有团队摘要。
