name: "SAML Service Provider 未验证 Audience restriction——接受为其他 SP 签发的 assertion"
id: "SAML_AUDIENCE_RESTRICTION_BYPASS"
applicable: "blackbox"
phase: "auth"
tags: ["saml", "sso", "audience-restriction", "confused-deputy", "authentication-bypass", "assertion-reuse"]
source: "http://blog.intothesymmetry.com/2017/10/slack-saml-authentication-bypass.html"

# ——— L3 核心 ———

observation: >
  作者在学习 SAML 时，使用 Burp SAML Raider 扩展测试多个 SAML 启用的服务。
  Slack 的 /sso/saml 端点接受 SAML assertion。
  (原文: "many of the service that routinely I use are SAML compliant...
  Slack, Bingo see next section")

hypothesis: >
  未叙述（仅结果）。推断：若 Slack（Service Provider A）未验证 SAML assertion 中的
  Audience/AudienceRestriction 元素，则可能接受为其他 Service Provider（如 GitHub）签发的 assertion，
  这是 "confused deputy problem"。
  (原文: "The vulnerability I found is part of the class known as 'confused deputy problem'")

action_result: >
  攻击成功：
  1. 使用一个旧的、已过期的 GitHub SAML assertion（为不同用户签发，非作者本人）
  2. 将该 assertion 提交到 Slack 的 /sso/saml 端点
  3. Slack 接受了该 assertion，作者以 assertion 中的用户名登录 Slack
  (原文: "I presented to Slack. Slack happily accepted it and I was logged in Slack channel
  with the username of this old and expired Assertion that was never meant to be a Slack one!!!")

  关键点：
  - assertion 是为 GitHub 签发的（Audience ≠ Slack）
  - assertion 已过期
  - assertion 中的用户名不是作者本人

  立即停止测试并上报 HackerOne。
  时间线：2017-05-02 报告，2017-05-03 确认，2017-08-26 获 $3,000 bounty，
  2017-10-26 修复完成（需与受影响客户协调）。

why_here_first: >
  灵感来自 Ioannis Kakavas 的 SAML 研究——他在 Microsoft 和 GitHub 中发现过严重 SAML 漏洞。
  作者决定学习 SAML，使用 SAML Raider Burp 扩展测试日常使用的 SAML 服务。
  (原文: "one of the leading expert (that I follow) on SAML is by far Ioannis Kakavas.
  Indeed he was able in the last years to find serious vulnerability in the SAML implementation
  of Microsoft and Github... The Github incident gave me the final motivation to start learning it")

  测试优先级：GitHub（已被 Ioannis 挖过）→ HackerOne（未发现）→ Slack（成功）。

chaining: >
  单独的 Audience restriction 绕过即可完成认证绕过，无需串链其他漏洞。
  但可组合使用：
  - 获取合法 SAML assertion（从自己账户或泄露的 assertion）→ 重放到目标 SP
  - 结合 SAML assertion 签名绕过（如 XML signature wrapping）→ 修改 assertion 内容

# ——— 落地检查清单 ———

approach: >
  对支持 SAML SSO 的应用，获取为其他 Service Provider 签发的有效 SAML assertion，
  提交到目标 SP 的 SAML 消费端点（/sso/saml、/acs 等），检查是否接受。

reasoning_chain:
  - "问：目标是否支持 SAML SSO（通常是企业版功能）？查找 /sso/saml、/saml/acs、/saml/consume 等端点。"
  - "工具：使用 Burp SAML Raider 扩展拦截和编辑 SAML assertion。"
  - "黑盒测试：从自己控制的另一个 SAML SP（如 GitHub、Google Workspace）获取有效 SAML assertion。"
  - "修改 assertion（可选）：保持原始签名不变，仅修改目标 SP endpoint（或不修改，直接测试 Audience 验证）。"
  - "提交到目标 SP 的 SAML 消费端点，观察是否被接受并成功登录。"
  - "问：目标 SP 是否验证 assertion 中的 Audience/AudienceRestriction 元素？（应该拒绝 Audience ≠ 自身的 assertion）"
  - "问：目标 SP 是否验证 assertion 签名？（若不验证，可伪造任意 assertion）"
  - "问：目标 SP 是否验证 assertion 过期时间（NotBefore/NotOnOrAfter）？（若不验证，可重放旧 assertion）"
  - "白盒审计：搜索 SAML library 使用（如 ruby-saml、python-saml、OneLogin），检查是否配置 audience 验证。"
  - "白盒审计：查找 SAMLResponse 解析代码，确认是否有 audience 检查逻辑（通常是检查 <saml:Audience> 元素）。"
  - "扩展：测试 SAML signature wrapping 攻击——修改 assertion 内容但保留有效签名（需深入 XML 签名知识）。"

vuln_root: >
  SAML Service Provider 假设 Identity Provider 签发的 assertion 只会发送给正确的 SP；
  未验证 assertion 的 Audience/AudienceRestriction 元素是否匹配自身，
  导致为其他 SP 签发的 assertion 被错误接受（confused deputy problem）——
  攻击者可将自己在 SP A 的合法 assertion 重放到 SP B，以任意用户身份登录。

transferable_to:
  - "任何支持 SAML SSO 的企业应用（Slack、GitHub、Salesforce、Okta、Azure AD 等）"
  - "自建 SAML Service Provider（使用 SAML library 但未正确配置 audience 验证）"
  - "SaaS 平台的企业版 SSO 功能（通常为付费功能，受影响范围广）"
  - "云服务的 SAML 集成（AWS、GCP、Azure）——可能导致云账户接管"
  - "内部企业应用（Intranet、VPN、CI/CD 系统）使用 SAML 统一登录"

cases:
  - source: "http://blog.intothesymmetry.com/2017/10/slack-saml-authentication-bypass.html"
    author: "asanso (Antonio Sanso)"
    platform: "Slack"
    bounty: "$3,000"
    note: >
      使用为 GitHub 签发的旧 SAML assertion（已过期，用户名不是作者）提交到 Slack /sso/saml。
      Slack 接受该 assertion，作者以 assertion 中的用户名成功登录 Slack。
      Slack 未验证 Audience restriction（应拒绝 Audience=GitHub 的 assertion）、
      未验证过期时间、未验证用户身份。
      灵感来自 Ioannis Kakavas 在 Microsoft/GitHub 的 SAML 漏洞研究。
      使用 Burp SAML Raider 扩展测试。
      2017-05-02 报告，2017-10-26 修复（需与企业客户协调）。
