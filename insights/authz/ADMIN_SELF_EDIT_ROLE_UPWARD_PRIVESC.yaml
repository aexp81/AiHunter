name: "组织管理员通过'编辑用户'功能自提权为所有者——角色编辑接口缺少向上越级检查"
id: "ADMIN_SELF_EDIT_ROLE_UPWARD_PRIVESC"
applicable: "blackbox"
phase: "authz"
also_phases: []
tags: ["rbac", "privilege-escalation", "self-edit", "owner-takeover", "organization", "bitwarden", "role-management"]
source: "https://hackerone.com/reports/272570"

# ——— L3 核心 ———

observation: >
  Bitwarden 组织管理界面中，Admin 角色拥有邀请用户和编辑用户角色的权限。
  测试发现 Admin 可以编辑自己的用户条目，将角色从 Admin 改为 Owner。
  (原文: "Navigate to the organization → invite users → edit accountB user and change to owner.
  See that the change worked and accountB is now owner.")

hypothesis: "未叙述（仅结果）"

action_result: >
  Admin 编辑自己的角色为 Owner → 成功 → 然后移除原 Owner → 完成组织接管。
  (原文: "To proceed with organization takeover, remove the original owner.
  Note that (after login and logout) the original owner no longer is in the organization")

why_here_first: "未叙述（仅结果）"

chaining: >
  单步权限越级即可完成组织接管：Admin 自编辑为 Owner → 移除原 Owner。

# ——— 落地检查清单 ———

approach: >
  在有多角色层级的组织/团队管理系统中，以 Admin 角色通过"编辑用户"功能尝试修改
  自己的角色到更高层级（Owner/SuperAdmin），检查后端是否在角色编辑时阻止向上自提权。

reasoning_chain:
  - "问：系统是否有 Owner > Admin > Member 等多角色层级？"
  - "问：Admin 角色是否有权编辑其他用户的角色（包括邀请、修改权限）？"
  - "问：Admin 是否可以编辑自己的用户条目？（前端可能隐藏，但直接改请求体 user_id 为自己的）"
  - "如果可以：问：将自己的 role 改为 Owner/SuperAdmin，后端是否拒绝？"
  - "如果成功提权 → 问：新 Owner 是否可以移除原 Owner，完成组织接管？"
  - "扩展：检查是否可以先邀请自己的小号为 Owner 角色（跳过编辑限制）"

vuln_root: >
  角色编辑接口仅检查操作者是否有'管理用户'权限，未检查目标角色是否高于操作者自身角色，
  也未阻止用户编辑自己的角色。

transferable_to:
  - "任何含组织/团队管理且有 Owner > Admin 分层的 SaaS 平台"
  - "密码管理器、项目管理、协作工具的团队管理功能"
  - "RBAC 系统中 Admin 有'编辑成员角色'权限的场景"
  - "API 中 PUT /users/{id} 允许修改 role 字段且 id 可为自己的系统"

