    title: "Reference caching can leak data to unauthorized users"
    author: "systemkeeper"
    platform: "Nextcloud Deck"
    severity: "Medium (CVSS 5.4)"
    cve: "CVE-2023-22469"
    note: >
      Nextcloud Deck 的 CardReferenceProvider 缓存键缺少 userId 前缀，
      有权用户触发缓存后，无权用户可通过知道 boardId/cardId 读取卡片数据。
      同系统的 GitHub Integration 正确使用了 userId 作为 cachePrefix。
      白盒代码审计发现，通过实现差异比对定位漏洞。
