      .../activity_feed?activity_pages=XXXX , he can able to view all shop admin activities")
  - url: "https://hackerone.com/reports/45960"
    title: "IDOR — Unauthorized access to Videos of Private Channel via widget/montage endpoint"
    author: "coolboss"
    platform: "Vimeo"
    severity: "未评级（报告标题标注 CRITICAL）"
    bounty: "有赏金（金额未披露）"
    note: >
      Vimeo 频道设为 "Only moderators and people I choose" 时，主页面
      /channels/870575 正确返回 "Private Channel — Sorry, this Channel is private."
      但 widget/montage 预览端点 /tools/widget/montage?badge_stream=channel&badge_channel=870575
      未检查频道隐私设置，直接返回私有频道内视频的缩略图。
      攻击者可枚举 badge_channel 参数获取任意私有频道的视频列表。
      approach 相同：辅助/嵌入式端点（widget 预览生成器）未继承父资源（频道）的隐私 ACL。
      (原文: "Now, I have a video placed there... Go to /tools/widget/montage...
      Note badge_channel parameter to any value... it will get you access to any videos.")
