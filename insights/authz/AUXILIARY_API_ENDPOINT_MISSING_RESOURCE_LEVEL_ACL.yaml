      未认证/无密码用户可通过该辅助端点枚举受保护房间的实时观众数量。
      (原文: "through the following endpoint, It is possible to know the total
      number of viewers of the room even if it is password protected")
      approach 相同：辅助/统计端点未继承父资源（密码保护房间）的访问控制。
  - url: "https://hackerone.com/reports/13959"
    title: "privilege escalation — Cloudup password-protected file bypass"
    author: "niks"
    platform: "Automattic (Cloudup)"
    severity: "未评级"
    bounty: "赏金（金额未披露）"
    note: >
      Cloudup 上传文件并设置密码保护后，下载链接为
      https://cloudup.com/files/<id>/download（需密码）。
      但去掉 /download 后缀访问 https://cloudup.com/files/<id>/
      可直接获取文件内容和 EXIF 元数据，绕过密码保护和跨用户访问控制。
      (原文: "modify the url ... remove the download part ... you can access the
      file contents i.e. password protected file (authentication bypass)")
      approach 相同：资源的辅助/元数据端点（文件详情 API）未继承主端点（download）的
      密码保护和授权检查。
  - url: "https://hackerone.com/reports/676976"
    title: "Container scanning and Dependency scanning report leaked to unauthorized users"
    platform: "GitLab"
    severity: "Medium"
    bounty: "有赏金（金额未公开）"
    cve: "CVE-2019-15591"
    note: >
      GitLab 公共项目设置了 "restrict CI pipeline access to project members only"
      并禁用了 public pipelines，但 merge request 的辅助端点
      /merge_requests/<id>/container_scanning_reports 和
      /merge_requests/<id>/dependency_scanning_reports 未继承 CI 访问控制，
      未授权用户（无 CI 权限）可直接访问安全扫描报告，获取容器和依赖漏洞详情。
      approach 相同：辅助/衍生数据端点未继承父资源（CI pipeline）的访问控制。
      纯结果文，无导航叙事。
      (原文: "GitLab makes the container scanning and dependency scanning information
      available as part of a JSON endpoint for merge requests... However, right now
      GitLab displays the scanning reports regardless of this permission.")
  - url: "https://hackerone.com/reports/95589"
    title: "Privilege escalation and circumvention of permission to limited access user"
    author: "egrep"
    platform: "Shopify"
    severity: "Low"
    bounty: "有赏金（金额未披露）"
    note: >
      Shopify 店铺管理后台对仅有 "Overviews" 权限的受限用户隐藏了活动页面
      (/admin/activity 返回 403），但活动页面的分页 AJAX 子端点
