  - url: "https://hackerone.com/reports/1091380"
    author: "imgnotfound"
    platform: "Shopify (partners.shopify.com)"
    severity: "Medium (CVSS 4.3)"
    note: >
      Shopify Partner Dashboard 的 GraphQL 查询字段 serviceMetrics { totalEarnings { amount } }
      未检查 staff 成员是否拥有 "View financials" 权限，无任何权限的 staff 成员
      可通过直接构造 GraphQL 请求获取组织的服务收入数据。
      (原文: "a staff with no permission is able to retrieve Services financial."
      "Assuming that this property should be gated by the View financials permission,
      I should have received an access denied there instead of an amount")
      h1-2102 live hack event 报告。approach 相同：辅助/元数据查询端点未做功能权限过滤。
  - url: "https://hackerone.com/reports/962462"
    title: "Unauthorized user is able to access schedule pipeline variables and values"
    author: "vaib25vicky"
    platform: "GitLab (gitlab.com)"
    severity: "High"
    cve: "CVE-2020-13351"
    note: >
      GitLab pipeline schedule 功能中，安全模型规定只有 schedule owner 或 maintainer
      可读取变量值，developer 只能列出但不能读取。但 API 端点
      GET /api/v4/projects/:id/pipeline_schedules/:schedule_id 未做角色过滤，
      任何认证用户（甚至非项目成员）均可读取 schedule 自定义变量和值。
      approach 与已有条目一致：API 端点的鉴权实现落后于 UI/文档描述的安全模型。
      (原文: "the current security model is: If you are owner of schedule (as developer)
      or master => you can read, modify and delete. But api endpoints are clearly showing
      this values to everyone even if the user is not part of the project.")
  - url: "https://hackerone.com/reports/411822"
    title: "Password protected rooms total number of viewers disclosure to unauthorized members"
    author: "batee5a"
    platform: "Chaturbate"
    severity: "Low"
    note: >
      密码保护的直播间 UI 隐藏了所有信息，但 /contest/log/{username}/ 端点
