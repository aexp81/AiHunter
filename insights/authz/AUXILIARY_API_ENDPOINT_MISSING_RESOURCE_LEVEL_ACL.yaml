name: "辅助/元数据 API 端点缺少资源级 ACL 过滤——认证用户可列出无权访问的资源信息"
id: "AUXILIARY_API_ENDPOINT_MISSING_RESOURCE_LEVEL_ACL"
applicable: "blackbox"
phase: "authz"
also_phases: []
tags: ["access-control", "api", "authz-filter", "airflow", "dag", "metadata-leak", "resource-level-acl", "CVE-2023-42780"]
source: "https://hackerone.com/reports/2208647"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。Apache Airflow 的 /api/v1/dagWarnings 端点返回所有 DAG 的警告信息，
  即使认证用户仅被授权访问特定 DAG。
  (原文: "Apache Airflow, versions prior to 2.7.2, contains a security vulnerability
  that allows authenticated users of Airflow to list warnings for all DAGs, even if the
  user had no permission to see those DAGs.")

hypothesis: >
  未叙述（仅结果）。推断：dagWarnings 端点在查询数据库时未按当前用户的
  DAG 级权限过滤结果，直接返回全量数据。

action_result: >
  创建仅对 "example_setup_teardown_taskflow" DAG 有读权限的角色，
  使用该受限用户调用 /api/v1/dagWarnings，成功获取所有 DAG 的警告信息，
  包括 dag_id 和导入错误的堆栈跟踪。
  (原文: "Here I create a role with very little permission. It only has read permissions
  for the DAG 'example_setup_teardown_taskflow' and read warning permissions."
  以及 "Use burpsuite to send the following message, and you can see the warnings of other DAGs.")

why_here_first: "未叙述（仅结果）"

chaining: >
  N/A。影响限于信息泄露——泄露 dag_id 列表和导入错误的堆栈跟踪，
  堆栈跟踪可能暴露文件路径、依赖版本、内部配置等信息。

# ——— 落地检查清单 ———

approach: >
  对实现了资源级权限（如 DAG 级、项目级、文档级 ACL）的系统，
  枚举所有辅助/元数据 API 端点（warnings、audit-log、statistics、health-check、tags），
  测试是否按当前用户的资源级权限过滤返回结果——
  关键在于辅助端点常被视为"全局功能"而遗漏资源级过滤。

reasoning_chain:
  - "问：目标系统是否实现了资源级权限（如每个 DAG/项目/文档有独立的 ACL）？"
  - "问：系统提供了哪些辅助/元数据 API 端点？（/warnings、/audit-log、/tags、/statistics 等）"
  - "问：这些辅助端点是否需要认证？（需要认证 ≠ 已做资源级过滤）"
  - "问：用受限角色调用辅助端点时，返回的数据是否仅限于该角色有权访问的资源？"
  - "如果返回了无权访问的资源的数据 → 资源级 ACL 过滤缺失"
  - "问：泄露的信息中是否包含敏感内容？（堆栈跟踪、内部路径、配置参数、错误详情）"
  - "扩展：同一系统的其他列表/搜索端点是否也缺少资源级过滤？"

vuln_root: >
  开发者在辅助/元数据端点的查询逻辑中仅做了认证检查（是否登录）和功能权限检查
  （是否有"读取警告"的权限），但未在数据库查询层面按用户的资源级权限（DAG ACL）
  过滤结果，假设"有功能权限即可访问所有资源的该类数据"。

transferable_to:
  - "Apache Airflow 的其他列表端点——audit log、import errors、DAG runs、task instances"
  - "其他工作流/编排平台（Prefect、Dagster、Luigi）的 API 权限过滤"
  - "多租户 SaaS 的辅助端点——tags、categories、statistics 是否泄露跨租户资源信息"
  - "项目管理工具的全局搜索/过滤 API——是否返回用户无权访问的项目数据"
  - "CMS/Wiki 系统的全局标签/分类端点——是否泄露受限页面的标签信息"

