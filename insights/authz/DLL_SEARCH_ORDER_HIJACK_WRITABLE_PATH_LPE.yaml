  - url: "https://hackerone.com/reports/1010552"
    title: "DLL Hijacking when creating Rescue Media Builder leading to Privilege Escalation"
    author: "z3ron3"
    platform: "Acronis True Image 2021 (MediaBuilder.exe)"
    severity: "Medium (CVSS 6.7)"
    bounty: "$250"
    note: >
      MediaBuilder.exe（Rescue Media Builder 工具）以 Administrator 权限运行，
