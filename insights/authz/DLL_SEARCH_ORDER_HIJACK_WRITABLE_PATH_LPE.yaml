name: "高权限进程 DLL 搜索顺序劫持——通过可写 PATH 目录植入恶意 DLL 提权"
id: "DLL_SEARCH_ORDER_HIJACK_WRITABLE_PATH_LPE"
applicable: "both"
phase: "authz"
also_phases: ["chain"]
tags: ["lpe", "windows", "dll-hijacking", "search-order", "path-variable", "procmon", "privilege-escalation", "acronis", "nodejs", "installer-acl"]
source: "https://hackerone.com/reports/959608"

# ——— L3 核心 ———

observation: >
  Acronis Cyber Protection Agent 的 systeminfo.exe 组件以高权限运行时，
  按照 Windows DLL 搜索顺序从 PATH 环境变量中的目录加载 snapapi.dll，
  其中包括用户可写的目录（如 C:\Python27）。
  (原文: "As part of my PATH system variables, I have the Python's location,
  which was installed in the C:\Python27 folder... systeminfo.exe 2132
  CreateFile C:\python27\snapapi.dll NAME NOT FOUND")

hypothesis: >
  未叙述（仅结果）。推断：如果攻击者对 PATH 中任一优先级更高的目录有写入权限，
  可以放置恶意 DLL，当高权限进程加载该 DLL 时即可以其权限执行任意代码。

action_result: >
  使用 Sysinternals ProcMon 监控 systeminfo.exe 进程，确认其在 C:\python27\
  路径下搜索 snapapi.dll（返回 NAME NOT FOUND）。
  将恶意 snapapi.dll 放入该目录后，进程启动时加载恶意 DLL 并执行
  C:\attacker\mmg.bat（以高权限运行）。
  通过 whoami /all 确认代码在 SYSTEM 安全上下文中执行。
  (原文: "I have attached a sample DLL, when loaded this will call
  C:\attacker\mmg.bat file... whoami /all >> c:\attacker\who.txt
  to confirm the security context in which my code was executed.")

why_here_first: "未叙述（仅结果）"

chaining: >
  DLL 植入 → 高权限进程加载 → SYSTEM 级代码执行。
  唯一前提是攻击者对 PATH 中某个目录有写入权限。

# ——— 落地检查清单 ———

approach: >
  用 ProcMon/API Monitor 监控高权限 Windows 进程（安全软件 Agent、备份工具、
  系统服务的辅助程序）的 DLL 加载行为，筛选 "NAME NOT FOUND" 的 DLL 加载尝试，
  检查其搜索路径中是否包含当前用户可写的目录。

reasoning_chain:
  - "问：目标系统中有哪些以 SYSTEM/高权限运行的第三方进程？"
  - "问：这些进程加载了哪些 DLL？使用 ProcMon 过滤 CreateFile + NAME NOT FOUND。"
  - "问：DLL 搜索路径中是否包含当前用户可写的目录？（检查 PATH 环境变量中各目录的 ACL）"
  - "如果找到可写目录且优先级高于实际 DLL 位置 → 植入同名恶意 DLL。"
  - "问：高权限进程是否在启动/定时任务/用户触发时自动加载该 DLL？"
  - "问：进程是否校验 DLL 的数字签名？（Authenticode 验证可防止此攻击）"
  - "如果不校验 → 恶意 DLL 被加载，代码以高权限执行。"

vuln_root: >
  开发者假设 PATH 中的所有目录都是可信的且仅管理员可写，
  但实际上用户安装的软件（如 Python、Node.js）会在 PATH 中添加用户可写目录。
  进程未验证 DLL 的数字签名，也未使用绝对路径加载 DLL。

transferable_to:
  - "安全软件（杀毒、EDR、备份工具）的 Agent 进程"
  - "以 SYSTEM 运行的企业管理代理（SCCM、Intune、Puppet agent）"
  - "开发工具的后台服务（Docker Desktop、VS Code server、Git credential helper）"
  - "任何 Windows 高权限服务加载非标准 DLL（非 System32 目录下的 DLL）的场景"

