  - url: "https://hackerone.com/reports/784714"
    title: "Relative Path Vulnerability Results in Arbitrary Command Execution/Privilege Escalation"
    author: "jhancock"
    platform: "Slack Nebula VPN (macOS/Windows)"
    severity: "Medium (CVSS 6.8)"
    bounty: "$750"
    note: >
      Nebula VPN 客户端在 macOS 上以 root/sudo 权限运行时，使用相对路径调用
      exec.Command("ifconfig") / exec.Command("route")（而非 /sbin/ifconfig），
      Windows 上类似使用 exec.Command("netsh")。
      攻击者在 /tmp 目录放置恶意 ifconfig 脚本并修改 PATH 优先级，
      当 Nebula 以 root 运行时加载恶意脚本获得 root 反弹 shell。
      与 Windows DLL 搜索顺序劫持属同一模式（PATH/搜索顺序劫持），
      区别在于目标是 macOS/Go 语言 exec.Command 的可执行文件搜索而非 Windows DLL 加载。
      (原文: "These commands are entered using relative paths, not absolute paths
      (such as /sbin/ifconfig). When a binary is run with a relative path, the system
      uses environmental variables ('PATH') to determine the search order..."
      "Because Nebula must be run with root/sudo permissions, this can be an effective
      privilege escalation technique.")
      2020-01 报告，2020-04 公开。$750 赏金。纯结果文，无导航叙事。
  - url: "https://hackerone.com/reports/1004740"
    title: "DLL Hijacking when performing operations in Acronis Secure Zone partition leading to Privilege Escalation"
    author: "z3ron3"
    platform: "Acronis True Image 2021 (aszbrowsehelper.exe)"
    severity: "Medium (CVSS 5.5)"
    bounty: "$250"
    note: >
      Acronis True Image 2021 的 aszbrowsehelper.exe（浏览 Secure Zone 分区内容）
      以 Administrator 权限运行，搜索 tcmalloc.dll 时按 Windows DLL 搜索顺序遍历
      PATH 中的目录，其中 %USERPROFILE%\AppData\Local\Microsoft\WindowsApps
      位于 User PATH 中且普通用户有 Full Control 权限。植入恶意 tcmalloc.dll 后
      以 Administrator 权限执行代码，进一步通过 schtasks 创建 NT AUTHORITY\SYSTEM
      计划任务升级至 SYSTEM 权限。即使 WindowsApps 不在 PATH 中，攻击者也可自行
      添加任意目录到 User PATH（无需管理员权限）。与 case #959017、#1010552 相同
      产品/DLL（tcmalloc.dll）不同触发组件。
      (原文: "aszbrowsehelper.exe looks for tcmalloc.dll DLL file according to the
      untrusted search order... Normal user has Full control over WindowsApps folder
      so anyone can place a malicious DLL file")
