  - url: "https://hackerone.com/reports/1008427"
    title: "DLL Hijacking when sending feedback and crash report leading to Privilege Escalation"
    author: "z3ron3"
    platform: "Acronis True Image 2021 (report_sender.exe)"
    severity: "Medium (CVSS 6.7)"
    bounty: "$250"
    note: >
      report_sender.exe 以 Administrator 权限运行（发送反馈/崩溃报告时触发），
      搜索多个不存在的 DLL（CSUNSAPI.dll、swift.dll、ubsec.dll 等）。
      %USERPROFILE%\AppData\Local\Microsoft\WindowsApps 位于 User PATH 中
      且普通用户有 Full Control 权限，植入恶意 DLL 后以 Admin 权限加载。
      进一步通过 schtasks 创建 SYSTEM 计划任务升级至 NT AUTHORITY\SYSTEM。
      攻击也可在崩溃报告自动发送时无交互触发。
  - url: "https://hackerone.com/reports/959017"
    title: "TrueImage for Acronis True Image 2020 - Untrusted DLL Search-Ordering lead to Privilege Escalation"
    author: "vanitas"
    platform: "Acronis True Image 2020 (TrueImage.exe)"
    severity: "Medium"
    bounty: "$250"
    note: >
      TrueImage.exe 由 TrueImageLauncher.exe 以管理员权限启动，
      搜索 tcmalloc.dll 时遍历 PATH 中包含 C:\Python27（低权限用户可写）。
      使用 ProcMon 过滤 TrueImage.exe + NAME NOT FOUND + Python27 路径确认。
      植入 msfvenom 生成的恶意 tcmalloc.dll 后获得管理员反弹 shell。
  - url: "https://hackerone.com/reports/530967"
    title: "UniFi Video v3.10.1 (Windows) Local Privileges Escalation to SYSTEM from arbitrary file delete and DLL hijack"
    author: "b0yd"
    platform: "Ubiquiti UniFi Video Server (Windows)"
    severity: "Medium (CVSS 6.7)"
    cve: "CVE-2020-8146"
    note: >
      no-content 公开。UniFi Video v3.10.1 的 .tsExport 文件夹权限和
      SafeDllSearchMode 注册表配置不当，允许低权限用户通过 DLL 劫持
      获取 SYSTEM 权限。修复方式：调整 .tsExport 文件夹权限 +
      安装时设置 SafeDllSearchMode 注册表项。
      approach 与已有条目一致：高权限服务进程 DLL 搜索路径中包含可写目录。
  - url: "https://hackerone.com/reports/1211160"
    title: "Node Installer Local Privilege Escalation"
    author: "deepsurface-robert"
    platform: "Node.js Windows Installer (v14.17.0)"
    severity: "Medium (CVSS 6.7)"
    bounty: "有赏金（金额未公开）"
    note: >
      Node.js Windows 安装器在非默认目录（如 C:\tools）安装时，安装目录继承
      驱动器根目录的宽松 ACL（BUILTIN\Users Allow *），且被添加到系统 PATH。
      攻击者可在安装目录放置恶意 npm.exe（.exe 优先于 .cmd），当特权用户
      运行 npm 时加载恶意可执行文件。同时 node.exe 从安装目录搜索多个 DLL
      （ProcMon 确认），可进行 DLL 劫持。CVE-2021-22921。
      同一模式也影响 RabbitMQ (CVE-2021-22117) 和 Erlang (CVE-2021-29221)。
  - url: "https://hackerone.com/reports/924493"
    title: "Acronis Sync Agent Service - Untrusted DLL Search-Ordering lead to Privilege Escalation"
    author: "vanitas"
    platform: "Acronis True Image ver.24.6.25700 (syncagentsrv.exe)"
    severity: "Medium (CVSS 6.9)"
    bounty: "$250"
    note: >
      Acronis Sync Agent Service (syncagentsrv.exe) 以 SYSTEM 权限运行，
      搜索 CSUNSAPI.dll 时遍历 PATH 中包含 C:\Python27（低权限用户可写）。
      使用 ProcMon 过滤 syncagentsrv.exe + NAME NOT FOUND + Python27 路径确认。
      植入 msfvenom 生成的恶意 CSUNSAPI.dll 后，重启机器触发服务加载，
