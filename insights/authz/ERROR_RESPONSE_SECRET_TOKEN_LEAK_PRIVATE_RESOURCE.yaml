name: "受限 Ajax 端点的错误响应泄露私有资源的授权令牌"
id: "ERROR_RESPONSE_SECRET_TOKEN_LEAK_PRIVATE_RESOURCE"
applicable: "blackbox"
phase: "authz"
also_phases: ["recon"]
tags: ["information-disclosure", "access-control", "token-leak", "error-response", "ajax", "private-video", "vimeo", "secret-parameter"]
source: "https://hackerone.com/reports/137502"

# ——— L3 核心 ———

observation: >
  Vimeo 的分享功能 Ajax 端点 /[VIDEO_ID]?action=share 在请求不属于当前用户的
  私有视频时返回错误消息，但该错误消息中包含了私有视频 config 文件的完整 URL，
  其中附带了授权令牌参数 s=[SECRET]。
  (原文: "If the Attacker send this request with a [VIDEO_ID] of a private video that
  he don't have access to, the server reply with an error message. However, this message
  contains the link to the config file of the private video including a token parameter
  s=[SECRET] which will grant the attacker access to the config file.")

hypothesis: >
  如果 Ajax 端点的错误响应中包含了内部资源 URL 或授权令牌，即使端点本身正确拒绝了
  内容访问，攻击者仍可利用泄露的令牌直接访问私有资源（视频文件、config 等）。
  (原文: "The config file contains all the info about the video including the actual video
  file links, video title, owner vimeo account, ... which means that the attacker has
  complete access to the video.")

action_result: >
  成功通过错误响应中泄露的 s=[SECRET] 参数，访问任意私有视频的 config 文件，
  获取视频源文件链接、标题、所有者信息等全部元数据，无需登录 Vimeo。
  (原文: "No need to be logged in Vimeo")
  研究者构建了 PoC 页面自动化完成：发送带 X-Requested-With: XMLHttpRequest 头
  的请求→解析错误响应中的 config URL→直接播放私有视频。

why_here_first: >
  未叙述（仅结果）——报告未说明为什么先检查 share 功能的 Ajax 端点，
  也未提及是否有其他尝试路径。但报告提示了导航信号：
  Ajax 端点（需 X-Requested-With 头）是常被忽略的攻击面，因为它们不在浏览器
  地址栏直接可见。
  (原文: "Because it is Ajax, the server is only replying if the Header
  X-Requested-With is set to XMLHttpRequest")

chaining: >
  错误响应泄露 config URL + 授权令牌 → 直接访问 config 文件获取视频源 URL →
  完整访问任意私有视频（含文件下载链接）。单步即 P1 级别数据泄露。
  研究者还发现 config 响应中包含 Firebase token，可能存在更深层的利用链。
  (原文: "This could lead to greater compromise, since the API returns the Firebase
  tokens for a few objects as well.")

# ——— 落地检查清单 ———

approach: >
  对受限资源（私有视频/文件/项目/订单等）的辅助操作端点（分享/嵌入/导出/预览），
  以无权限用户身份发送请求，检查错误响应中是否泄露了内部资源 URL、授权令牌、
  签名参数或 config 文件路径。特别关注 Ajax 端点（X-Requested-With 头限制）
  和辅助功能（?action=share/embed/export 等参数路由）。

reasoning_chain:
  - "问：目标是否有私有资源（私有视频/文件/项目/文档/订单）？这些资源有哪些辅助操作？"
  - "问：辅助操作端点（分享/嵌入/导出/预览）是否有独立的 Ajax 接口？（抓包检查 X-Requested-With 头的请求）"
  - "问：以无权限用户身份对这些 Ajax 端点传入受限资源的 ID，服务端返回什么？是纯 403 还是带有详细信息的错误消息？"
  - "如果错误响应中包含 URL → 该 URL 中是否有签名参数（s=, token=, key=, sig= 等）？"
  - "如果有签名参数 → 用该完整 URL 直接访问，是否能绕过权限检查获取私有资源内容？"
  - "问：泄露的 config/响应中是否还包含其他有价值的信息（Firebase token、API key、内部 ID）？"
  - "问：除 share 外，同类辅助端点（embed/oembed/export/thumbnail）是否也存在同样的泄露？"

vuln_root: >
  开发者假设错误响应不包含敏感信息，因此未对错误消息中引用的内部 URL 和授权令牌
  进行脱敏。权限检查拒绝了内容访问，但错误模板中嵌入了完整的资源引用（含签名令牌）。

transferable_to:
  - "视频平台的私有/付费视频（Vimeo、Dailymotion、自建视频系统的 config/manifest 端点）"
  - "云存储的分享/预览端点——错误响应是否泄露了签名 URL？"
  - "SaaS 产品的嵌入/导出/oembed 端点——请求不属于自己的资源时，错误消息中是否有内部 URL？"
  - "文件管理系统的预览/缩略图 API——受限文件的错误响应是否包含直接访问路径？"
  - "任何使用签名 URL（HMAC/时间戳令牌）保护资源的系统——令牌是否在错误流中泄露？"

