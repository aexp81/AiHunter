name: "前端隐藏但后端未鉴权的管理页面 URL——直接访问修改自身权限提权"
id: "HIDDEN_ADMIN_URL_NO_SERVER_ACL_PRIVESC"
applicable: "blackbox"
phase: "authz"
also_phases: ["recon"]
tags: ["privesc", "rbac", "hidden-ui", "direct-url-access", "group-management", "hackerone"]
source: "https://hackerone.com/reports/605720"

# ——— L3 核心 ———

observation: >
  HackerOne 平台对 Program 权限的团队成员隐藏了 Group Management 和 User Management 菜单，
  但直接访问 /TEAM/groups URL 却可以正常加载。
  (原文: "https://hackerone.com/TEAM/groups URL is accessible to team members
  with Program permission, even when 'Group Management' and 'User Management'
  menus aren't visible.")

hypothesis: >
  未叙述（仅结果）。报告者发现 URL 可访问后直接测试了修改权限操作。

action_result: >
  成功：通过直接访问 /TEAM/groups → 选择当前用户所在的组 → 添加 Admin 权限
  → 获得完整管理员权限（包括 Reward 和 Report 权限）。
  (原文: "I was able to grant all permissions to the user assigned to a group
  with Program permission")

why_here_first: "未叙述（仅结果）"

chaining: >
  直接 URL 访问隐藏管理页 → 修改自身组权限为 Admin → 获得 Reward/Report 等敏感操作权限。
  此外发现 /TEAM/groups.json 端点对任何有效权限的用户暴露 user IDs、组列表、组权限信息。
  (原文: "groups.json is accessible to users with at least 1 valid permission...
  allows disclosing user ids, assigned groups, groups permissions")

# ——— 落地检查清单 ———

approach: >
  对低权限用户隐藏了 UI 菜单/按钮但未在后端做 ACL 检查的管理页面，
  直接拼接已知管理路径 URL（如 /groups、/settings/permissions）访问并执行操作。

reasoning_chain:
  - "问：低权限用户的导航栏/侧边栏隐藏了哪些菜单项？（对比高权限用户或文档）"
  - "问：将隐藏菜单对应的 URL 直接输入浏览器，是否返回 200 而非 403？"
  - "如果 200：问：页面上的修改/保存操作是否也能成功执行？（前端隐藏 ≠ 后端鉴权）"
  - "问：对应的 .json 端点是否也可访问？是否泄露额外信息（用户 ID、权限映射等）？"
  - "问：修改自身所在组的权限后，是否立即生效（无需审批）？"

vuln_root: >
  开发者仅在前端 UI 层按角色隐藏管理菜单，未在后端对管理页面的 URL 和操作做独立的权限校验。

transferable_to:
  - "任何基于 RBAC 按角色隐藏 UI 元素但后端缺少独立 ACL 的 SaaS 平台"
  - "团队/组织管理功能——尤其是组权限编辑、用户角色修改等管理操作"
  - "前端 SPA 通过路由守卫控制可见性但 API 层未做对应鉴权的系统"

