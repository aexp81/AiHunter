    author: "jcow (Jason Kao)"
    platform: "AWS (Amazon QuickSight / Quick Suite)"
    severity: "None (AWS VDP)"
    bounty: "无赏金（VDP）"
    note: >
      AWS QuickSight 的 Custom Permissions 机制可配置为完全禁用 AI Chat Agent 功能，
      应用后前端隐藏了 Agent 侧边栏入口。但后端 API
      POST /sn/qbsproxy/quicksight/accounts/{account_id}/conversations/chat
      未检查 Custom Permissions，直接返回 200 OK 并给出 AI Agent 回复。
      且系统默认创建 SYSTEM chat agent（ARN 可预测：arn:aws:quicksight:{region}:{account}:agent/SYSTEM），
      无需创建自定义 agent 即可绕过。值得注意的是搜索 agent 的端点
      POST /search/agents 正确返回 401——说明同一功能的不同端点鉴权不一致。
      AWS IAM（SCP/RCP/IAM policy）也无法限制 Chat Agent 访问，Custom Permissions 是唯一控制手段。
      (原文: "What happens is AWS 'hides' the front-end components or the UI,
      but does not appropriately control the back end capabilities.")
      2026-02 报告，2026-05 公开。有完整 L3 叙事但 approach 命中已有模式。
