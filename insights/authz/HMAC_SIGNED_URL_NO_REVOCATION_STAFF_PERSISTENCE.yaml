name: "集成连接器的 HMAC 签名 URL 不绑定会话也不随权限移除而失效——被移除员工持续操控连接"
id: "HMAC_SIGNED_URL_NO_REVOCATION_STAFF_PERSISTENCE"
applicable: "blackbox"
phase: "authz"
also_phases: ["logic"]
tags: ["hmac", "signed-url", "staff-removal", "revocation-failure", "shopify", "flow-app", "connector", "persistent-access", "no-session-binding"]
source: "https://hackerone.com/reports/416983"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。报告者发现 Shopify Flow 应用连接 Google Sheets / Trello / Asana 时，
  鉴权完全依赖 URL 中的 path_hmac 参数，该 HMAC 是路径的签名，
  对所有 staff 成员相同，不绑定任何会话（session）。
  (原文: "the parameter path_hmac is the only way the application determines
  whether the user can modify the connection settings for that shop or not
  and it's the same for all staff members and doesn't depend on any session
  as it's hmac of the path /gsheet/connect?shop_domain=[shop].myshopify.com&shop_id=[shop-id]")

hypothesis: >
  未叙述（仅结果）。推断：如果 path_hmac 不绑定具体用户身份且永不过期，
  则任何曾获得该 URL 的员工在被移除后仍可使用它修改连接设置。

action_result: >
  成功：
  1. Owner 添加仅有 "Apps" 权限的 staff 成员
  2. Staff 成员访问 Flow connectors 页面，保存 Google Sheets / Trello / Asana 的连接 URL（含 path_hmac）
  3. Owner 移除该 staff 成员
  4. 被移除的 staff 使用之前保存的 URL 仍可修改连接设置
  (原文: "Login with the shop owner and remove the user you added.
  You can now use the links you saved to modify connectors settings.")

why_here_first: "未叙述（仅结果）"

chaining: >
  HMAC 签名 URL 持久有效 → 被移除员工修改 Google Sheets / Trello / Asana 连接 →
  将连接指向攻击者自己的账户 → 后续 workflow 数据（客户信息等）流向攻击者账户。
  (原文: "a removed staff member will be able to modify google spread sheet, trello and asana
  connections to connect his own accounts so that workflow actions regarding the connections
  go to his accounts and therefore he can still access the shop data.")

# ——— 落地检查清单 ———

approach: >
  对集成/连接器的管理端点，检查其鉴权是否完全依赖 URL 中的 HMAC/签名参数
  而不绑定用户会话或检查用户当前权限状态。特别关注：签名 URL 在用户权限被移除后
  是否仍然有效（签名材料不包含用户 ID 或时间戳）。

reasoning_chain:
  - "问：集成/连接器的管理 URL 中是否包含 hmac / signature / token 等参数？"
  - "问：该签名参数的签名材料是什么？是否包含用户 ID 或时间戳？"
  - "如果签名材料仅含路径和 shop ID → 问：所有 staff 成员看到的签名值是否相同？"
  - "如果相同 → 问：将该 URL 保存后，移除当前 staff 的权限，再用保存的 URL 访问，是否仍然可用？"
  - "如果仍可用 → 确认签名 URL 不绑定用户身份且不随权限变更而失效"
  - "扩展：其他依赖签名 URL 鉴权的端点（如 webhook 管理、API key 管理）是否存在同样的问题？"
  - "扩展：签名 URL 是否有 TTL / 过期时间？如果永不过期则风险更高"

vuln_root: >
  开发者用 HMAC 签名 URL 替代 session 认证来保护集成管理端点，但签名材料中
  只包含路径和 shop 标识，不包含用户 ID、时间戳或 nonce。
  这导致签名永不过期、不随权限变更而失效，任何曾获得 URL 的用户永久保留访问权。

transferable_to:
  - "SaaS 平台的 webhook / 集成 / connector 管理——使用签名 URL 而非 session 鉴权的场景"
  - "Partner / App 管理面板中的 OAuth 连接设置页面"
  - "任何使用 pre-signed URL 授权操作的系统——签名是否包含用户身份和有效期？"
  - "API 密钥/token 轮换功能——轮换后旧的签名 URL 是否仍有效？"
  - "员工离职流程审计——离职员工是否能通过保存的签名链接继续操作"

cases:
  - url: "https://hackerone.com/reports/416983"
    author: "zombiehelp54"
    platform: "Shopify (Flow App)"
    severity: "Low (CVSS 3.6)"
    bounty: "有赏金（金额未公开，H1-514 live hacking event）"
    note: >
      Shopify Flow 应用的 Google Sheets / Trello / Asana 连接器管理端点
      https://flow-connectors.shopifycloud.com/gsheet/connect 使用 path_hmac 参数鉴权，
      签名材料仅含路径和 shop ID，不含用户 ID 或时间戳。
      所有 staff 成员的 path_hmac 相同，被移除的 staff 使用保存的 URL 仍可修改连接设置。
      团队确认："signed URLs generated by Shopify Flow do not expire.
      This could allow a former staff member (or current staff member who no longer has Apps permission)
      to connect or disconnect Google Sheets, Trello and Asana accounts from Flow."
      2018-10 报告（H1-514 event），2019-06 公开。
  - url: "https://hackerone.com/reports/254588"
    author: "zombiehelp54"
    platform: "Shopify Partners"
    severity: "Medium (CVSS 5.0)"
    note: >
      同一研究者发现 Shopify Partners 创建 development store 时使用的 extra[affiliate_shop]
      签名参数对同一组织所有 staff 成员相同且永不过期。被移除权限的 staff 保存该签名后，
      仍可通过提交 signup 表单（POST https://app.shopify.com/services/signup/setup）
      创建与该组织关联的 development store。签名材料不包含用户 ID 或过期时间，
      导致权限移除后共享签名依然有效。
      (原文: "this signature is the same for all staff members of the same organization
      and it doesn't expire which means that if a staff member had 'Manage Shops'
      permission for only one time, then he was removed from the organization he will
      still be able to create development stores associated with the organization")
      2017-07 报告，2019-11 公开。$500 赏金。
  - url: "https://hackerone.com/reports/698708"
    author: "mariogh"
    platform: "Shopify (Flow App)"
    severity: "Medium"
    bounty: "有赏金（金额未公开）"
    note: >
      #416983 的绕过。Shopify 在 #416983 后为签名 URL 添加了 1 小时有效期（timestamp 参数），
      但被移除的 staff 可以在 60 分钟窗口内通过 Disconnect → Reconnect 操作刷新 timestamp 和 path_hmac，
      获得新的 60 分钟有效签名，从而无限延续访问权。
      此外，admin 生成新的签名不会使旧签名失效——两个 URL 同时有效。
      (原文: "click on Disconnect... click on Connect and use any Google Account.
      The account will successfully connect, a new timestamp and a new path_hmac will be generated,
      and they will give you unauthorized access to Flow connectors for an extra 60 mins.")
      2019-09 报告，2019-10 公开。
