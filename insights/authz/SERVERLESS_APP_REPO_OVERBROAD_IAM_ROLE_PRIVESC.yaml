      甚至 iam:* 对 * 资源的权限，可被恶意用户利用进行权限提升。
      (原文: "The role has the 'iam:CreateRole', 'iam:GetRole', 'iam:CreatePolicy',
      and 'iam:AttachRolePolicy' for '*' resources... The role has the 'iam:*' for
      '*' resources.")
