name: "任意文件读后不止读配置——历史命令和 SSH 私钥才是横向的跳板"
id: "LFI_HISTORY_TO_CREDENTIAL_CHAIN"
applicable: "blackbox"
phase: "chain"
also_phases: [input]
tags: [lfi, arbitrary-file-read, bash-history, ssh-key, lateral-movement, chain]
approach: "拿到任意文件读后按'凭证残留路径'递进：bash_history → 明文密码/密钥 → SSH/Web多站横向"
source: "https://mp.weixin.qq.com/s/gjr4EXjVLRl5_O8DE0MAtQ"

observation: '下载接口存在任意文件读（LFI），系统是 Java+PHP 混合环境，服务器有运维操作历史 (原文: "成了，那就尝试读取历史命令，看看有没有什么重要的信息...我发现了，既有 java 也有 php")'
hypothesis: "运维人员在命令行操作过 DB/中间件时可能把密码当参数敲进去，bash_history 里可能有明文凭证；SSH 配置里可能有无密码私钥"
action_result: '读 bash_history → 发现账号密码（明文出现在历史命令中） → 用该凭证登录进入 7 个站；读 SSH 配置 → 发现私钥 → 直接免密 SSH 登录拿 root (原文: "没想到吧，我也没想到，真有账号密码...竟然是七个站...读取 ssh 配置信息...有密钥，直接读取私钥，免密登录")'
why_here_first: '任意文件读能读到最多"人为痕迹"的地方就是 bash_history（运维操作直接记录）和 ssh 配置（密钥如果不需要密码就是直接 root）；这两个文件路径固定、信息密度高 (原文叙述的顺序即：先 history 再 ssh 配置)'
chaining: "上游：JSMAP_HIDDEN_ENDPOINT_DISCOVERY（发现下载接口）→ 本条（LFI 后递进利用）→ 凭证横向7站 + SSH root"

reasoning_chain:
  - "问：任意文件读接口是否可读绝对路径？（测试读 /etc/passwd 是否成功）"
  - "如果可读：问：读 /root/.bash_history 或 /home/<user>/.bash_history，历史命令中是否出现 -p / --password / mysql -u / redis-cli -a 等明文凭证形式？"
  - "问：读 /root/.ssh/config 或 /home/<user>/.ssh/config，是否配置了 IdentityFile 指向私钥？"
  - "如果有私钥路径：问：读取私钥文件（/root/.ssh/id_rsa 等），是否有 ENCRYPTED 标记？（无标记=免密）"
  - "如果无加密私钥：用 ssh -i <私钥> root@<host> 直接登录，确认是否 root 权限。"
  - "问：history 中出现的账号密码能否用于目标的其他 Web 入口（同 IP 的其他端口 / 同一组织的其他域名）？"
  - "如果能：测试密码复用，记录横向扩展路径。"

vuln_root: "运维人员将凭证/私钥以明文形式存于固定路径文件中，任意文件读一旦突破就能把运维失误转化为全量横向权限"
transferable_to:
  - "任何存在任意文件读/LFI/SSRF 落地文件读的场景（下载接口/导出接口/预览接口）"
  - "混合技术栈（Java+PHP / Python+Nginx）的服务器：多语言运维操作更可能在 history 留痕"
  - "内网渗透横向：已有 shell 时的信息收集路径（同样适用）"
cases:
  - note: "从登录页面到服务器登录拿下多个网站权限：LFI → bash_history → 7站凭证 + SSH root"
    source: "https://mp.weixin.qq.com/s/gjr4EXjVLRl5_O8DE0MAtQ"
