name: "快照恢复路径中状态字段独立重建导致安全不变量失效——绕过CVE补丁重现已修复漏洞"
id: "SNAPSHOT_RESTORE_STATE_DESYNC_PATCH_BYPASS"
applicable: "whitebox"
phase: "chain"
also_phases: ["logic"]
tags: ["snapshot-restore", "state-desync", "patch-bypass", "virtio", "pci", "oob-write", "vm-escape", "firecracker", "aws", "CVE-2026-5747", "hypervisor", "stale-pointer"]
source: "https://hackerone.com/reports/3738654"

# ——— L3 核心 ———

observation: >
  Firecracker v1.15.1 的 CVE-2026-5747 修复在 PCI common_config 的 queue 写入路径
  添加了 driver_status 检查，只允许在 ACKNOWLEDGE|DRIVER|FEATURES_OK (0xb) 状态下
  修改 queue 配置。但快照恢复路径从序列化状态中独立重建 queue 激活状态和 PCI driver_status，
  不验证两者的一致性。
  (原文: "The bypass exists because snapshot restore reconstructs queue activation state
  and PCI driver_status from different serialized fields, but does not validate
  that they are consistent with each other.")

hypothesis: >
  如果构造一个恶意快照，其中 VirtioDeviceState.activated=true 和
  VirtioPciDeviceState.device_activated=true（保持后端激活），
  但将 VirtioPciCommonConfigState.driver_status 回滚为 0xb，
  那么恢复后 PCI queue 写入检查会通过（因为 driver_status==0xb），
  而后端已经激活（raw pointers 已缓存），guest 可以修改 queue 配置制造 stale pointer，
  重现原始漏洞。
  (原文: "a hostile snapshot can restore: VirtioDeviceState.activated = true,
  VirtioPciDeviceState.device_activated = true,
  VirtioPciCommonConfigState.driver_status = 0xb")
  (原文: "That recreates the same stale-pointer condition that the original fix was meant to prevent.")

action_result: >
  成功：
  1. 构建正常快照 → 用 Rust patcher 工具将 driver_status 从 0xf 改为 0xb
     同时保持 transport_device_activated=true 和 backend_virtio_activated=true
  2. 恢复 patched 快照 → guest 中 split-probe 内核模块在 10 秒后修改 queue_size 为 65535
  3. Firecracker 收到 SIGSEGV（signal 11），crash backtrace 在 virtio queue used-ring
     写入路径 (process_entropy_queue)
  (原文: "queue_size mutated live to 65535; issuing 1 post-mutation request(s) through the stale queue state")
  (原文: "post-mutation request 1/1: pop avail.ring[65534], consume desc[1],
  and write used[65534] past guest RAM")
  (原文: "Shutting down VM after intercepting signal 11, code 1")

why_here_first: >
  未叙述（仅结果）。推断：研究者在分析 CVE-2026-5747 补丁后，
  检查了补丁依赖的安全不变量（driver_status 必须与设备激活状态一致），
  发现快照恢复路径是唯一可以打破该不变量的入口点。
  (原文间接锚定: "The fix in 1.14.4 / 1.15.1 adds a guard that only permits
  queue configuration writes while the device is in the virtio setup state...
  before DRIVER_OK and before backend activation is complete.")

chaining: >
  三环链：
  1. 恶意快照构造 → 篡改序列化的 driver_status 回滚到 setup 阶段 (0xb)，
     保持 backend activated=true
  2. 补丁绕过 → 恢复后 update_queue_field 检查通过（driver_status==0xb），
     guest 可修改已激活设备的 queue 配置（size/desc_table/avail_ring/used_ring 地址）
  3. 越界读写 → 修改 queue_size 为 65535 后通过 stale cached pointer
     在 guest RAM 之外执行 used-ring 写入导致 host crash（潜在提权）
  (原文: "out-of-bounds avail-ring read relative to the originally validated queue,
  out-of-bounds descriptor-table read relative to the originally validated queue,
  out-of-bounds used-ring write through the stale used_ring_ptr")

# ——— 落地检查清单 ———

approach: >
  审计已修复 CVE 的补丁，识别补丁依赖的安全不变量（如"某状态字段只能在特定阶段取特定值"），
  然后搜索应用中所有能重建/恢复该状态的路径（快照恢复、迁移、导入导出、克隆），
  检查这些路径是否验证了跨字段状态一致性——若序列化字段独立反序列化且无交叉验证，
  就能构造一个违反不变量的状态重现已修复漏洞。

reasoning_chain:
  - "问：目标系统是否有快照/备份/迁移/克隆功能可以序列化和恢复内部状态？"
  - "问：近期修复的 CVE 中，补丁添加的安全检查依赖哪些运行时状态字段？"
  - "白盒：diff 补丁 commit，列出所有新增的条件检查和它们依赖的状态变量"
  - "问：快照恢复路径是否独立反序列化这些状态字段？是否有跨字段一致性验证？"
  - "白盒：搜索 restore/deserialize/from_state 方法中对相关字段的赋值，确认是否有 assert/validate"
  - "问：能否构造一个快照使部分字段处于'已修复'值而另一部分处于'可利用'值？"
  - "问：恢复后的状态是否允许绕过补丁中新增的安全检查？"
  - "构造 PoC：修改序列化状态文件中的特定字段 → 恢复 → 验证是否重现原始漏洞行为"

vuln_root: >
  快照恢复路径独立反序列化不同组件的状态字段，不验证跨组件状态一致性，
  使攻击者可以构造一个违反运行时安全不变量的状态组合，
  绕过补丁中基于状态检查的安全防护。

transferable_to:
  - "所有支持快照/迁移/备份恢复的虚拟化平台（QEMU、Cloud Hypervisor、crosvm）"
  - "容器编排系统的 checkpoint/restore 功能（CRIU、Podman checkpoint）"
  - "数据库/应用的备份恢复功能中依赖运行时状态一致性的安全检查"
  - "任何通过序列化-反序列化传递安全关键状态的系统（JWT claim、session state）"
  - "游戏存档/save state 恢复中的反作弊检查绕过"

