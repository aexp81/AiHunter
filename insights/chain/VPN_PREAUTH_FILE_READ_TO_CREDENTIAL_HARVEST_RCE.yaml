name: "SSL VPN 补丁窗口攻击——Pre-Auth 文件读取到明文密码收割到 2FA 绕过到管理员命令注入 RCE"
id: "VPN_PREAUTH_FILE_READ_TO_CREDENTIAL_HARVEST_RCE"
applicable: "blackbox"
phase: "chain"
also_phases: ["recon", "auth"]
tags: ["ssl-vpn", "pulse-secure", "pre-auth", "path-traversal", "credential-harvesting", "plaintext-password-cache", "2fa-bypass", "session-hijacking", "command-injection", "patch-gap", "CVE-2019-11510", "CVE-2019-11539"]
source: "https://hackerone.com/reports/591295"

observation: >
  Orange Tsai 发现 Pulse Secure SSL VPN 存在 Pre-Auth 任意文件读取
  (CVE-2019-11510, CVSS 10)，供应商已发补丁但 Twitter 超过一个月未升级。
  (原文: 报告描述了 6 个 CVE 构成的完整攻击链)

hypothesis: >
  VPN 设备缓存了用户明文密码和活跃 session，文件读取漏洞的影响
  远超信息泄露——可以直接收割凭证、绕过 2FA、接管内网。
  (原文: data.mdb 中包含明文密码，mtmp/system 中包含 Duo 2FA 密钥)

action_result: >
  完整攻击链成功：Pre-Auth 读取系统文件 → 收割明文密码和 Duo 2FA 密钥
  → 劫持活跃 session 绕过 2FA → 通过 Web Proxy 访问管理员界面
  → Post-Auth 命令注入 RCE。
  (原文: 报告包含实际获取的 Twitter 员工明文密码和内网访问证明)

why_here_first: "未叙述（仅结果）"

chaining: >
  五环链：Pre-Auth 文件读取 → 明文密码缓存收割 → Duo 2FA 绕过/Session 重用
  → 管理员界面提权 → Post-Auth 命令注入 RCE

approach: >
  针对企业 SSL VPN 设备，利用已公开但未修补的 Pre-Auth 漏洞下载敏感系统文件
  （密码数据库、session 数据库、2FA 配置），提取明文凭证和活跃 session
  绕过 2FA，再通过 Post-Auth 漏洞达成 RCE。核心是补丁差分窗口攻击。

reasoning_chain:
  - "问：目标暴露了哪些网络设备到公网？版本号是否在已知 CVE 受影响范围内？"
  - "问：Pre-Auth 文件读取可以获取哪些高价值文件？"
  - "问：VPN 设备是否在本地缓存了用户明文密码或密码哈希？"
  - "如果有明文密码 → 问：2FA 配置密钥是否也存储在可读文件中？"
  - "问：是否有活跃 session token 存储在文件中可以直接劫持？"
  - "如果成功登录 → 问：是否存在 Post-Auth 命令注入可达成 RCE？"

vuln_root: "VPN 设备将明文密码缓存在文件中是架构级设计失误，极大放大了文件读取漏洞的影响。"

transferable_to:
  - "Pulse Secure、Fortinet FortiGate、Palo Alto GlobalProtect 等企业 SSL VPN"
  - "任何在本地存储用户凭证/session 的网络设备"
  - "补丁差分窗口攻击：监控 CVE 发布后大企业的补丁进度"

cases:
  - url: "https://hackerone.com/reports/591295"
    note: "Orange Tsai → Twitter VPN (Pulse Secure)，6 CVE，$20,160，Critical (CVSS 10)。"
