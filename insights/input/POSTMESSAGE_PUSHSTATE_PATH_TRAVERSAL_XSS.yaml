  - url: "https://hackerone.com/reports/662083"
    title: "Inject page in admin panel via Shopify.API.pushState"
    author: "tiago-danin"
    platform: "Shopify (your-store.myshopify.com)"
    severity: "Low"
    bounty: "$500"
    note: >
      Shopify Admin 嵌入式应用 API pushState 路径穿越：pathname 以 /../ 开头
      逃逸 /admin/ 前缀，在 Admin 面板 AppFrameMain 中加载攻击者控制的商店页面。
      恶意 JS 可读取 CSRF token 和 document.cookie。纯结果文，无导航叙事。
      (原文: "Shopify.API.pushState call the method handleRoutePushEvent...
      If we use the prefix `..` in `pathname` It will removes `admin`")
  - url: "https://hackerone.com/reports/868615"
    title: "Inject page in admin panel via Shopify.API.pushState with protocol invalid"
    author: "tiago-danin"
    platform: "Shopify (your-store.myshopify.com)"
    severity: "Low"
    bounty: "$500"
    note: >
      #662083 的绕过变种：原修复过滤了 `../` 路径穿越，但未测试无效协议前缀。
      使用 pathname: "invalid:pages/xss"（无效协议 + 路径）绕过过滤方法，
      仍可在 Admin 面板中加载攻击者控制的商店页面执行 JS。
      纯结果文，无导航叙事，仅说明"today I found a new payload"。
      (原文: "Today I found a new payload, invalid protocol are not tested
      correctly in filter method."
      "data: {pathname: \"invalid:pages/xss\"}")
  - url: "https://hackerone.com/reports/883867"
    title: "Inject page in admin panel via Shopify.API.pushState [New Payload]"
    author: "tiago-danin"
    platform: "Shopify (your-store.myshopify.com)"
    severity: "Low"
    bounty: "$500"
    note: >
      #868615 修复的第二次绕过：前次修复过滤了无效协议前缀，但未正确处理
      混合协议+路径穿越的组合。使用 pathname: "abc:d../pages/xss#//" 绕过过滤，
      通过 Shopify.API.replaceState（而非 pushState）仍可在 Admin 面板中加载
      攻击者控制页面，提取 CSRF token 和 Store 配置。纯结果文，无导航叙事。
      (原文: "The correction for #868615, allows you to use new payload"
      "data: {pathname: \"abc:d../pages/xss#//\"}"
      "Abuse the active admin session to extract data as: CSRF token. Store config.")
