  - url: "https://hackerone.com/reports/1374512"
    title: "The Host Authorization middleware in Action Pack is vulnerable to crafted X-Forwarded-Host values"
    author: "mshtawythug"
    platform: "Rails (Internet Bug Bounty)"
    severity: "Medium"
    cve: "CVE-2021-22942"
    bounty: "有赏金（金额未公开）"
    note: >
      CVE-2021-22881 修复了 Rails Host Authorization 中 X-Forwarded-Host 头的开放重定向，
      但修复代码中 forwarded_host 行缺少 .downcase 调用（origin_host 有 .downcase，
      forwarded_host 没有）。攻击者使用大小写混合的主机名（如 Evil.com / EVIL.COM）
      绕过修复：正则不匹配 → forwarded_host 赋值为 nil → nil? 检查通过 → 重定向到恶意域。
      典型的"已修复 CVE 的修复不完整"模式——修复只对 origin_host 做了 downcase 规范化，
      遗漏了对 forwarded_host 的同等处理。main 分支已通过 PR #41435 修复但未反向移植。
      (原文: "forwarded_host is missing a downcase after the .to_s, which results in nil
      assigned to forwarded_host, which then results in true... because of the nil? check")
