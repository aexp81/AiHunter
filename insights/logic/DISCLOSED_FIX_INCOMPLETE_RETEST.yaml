name: "已公开修复的功能再测——导出/批量操作绕过残留"
id: "DISCLOSED_FIX_INCOMPLETE_RETEST"
applicable: "blackbox"
phase: "logic"
also_phases: ["authz"]
tags: ["incomplete-fix", "regression", "export", "zip", "attachment-leak", "disclosure-retest"]
source: "https://hackerone.com/reports/186230"

observation: >
  已公开修复的报告 #182358 声称解决了 Export as .zip 泄露内部活动的问题，
  但研究者发现修复不完整——内部附件仍然包含在导出 zip 中。
  (原文: "This newly disclosed report: #182358 Partial disclosure of report activity through new 'Export as .zip' feature was not completely fix.")

hypothesis: >
  既然修复只针对了部分泄露（report activity），附件相关的导出路径可能未被覆盖。
  (原文: "I have found that i can still view the attachment after it is being removed on the thread.")

action_result: >
  导出已修复报告 #182358 的 zip 文件，解压后发现被移除的内部附件图片仍然存在于 zip 中。
  (原文: "Export the report as .zip ... You will see that the image is still there, but base on the thread, you guys removed it on disclosed report.")

why_here_first: >
  刚公开的修复报告本身就是最佳测试目标——修复声称移除了内部内容，
  直接用该报告验证修复是否彻底。
  (原文: "Best PoC is this #182358 since this is the newly fix and disclosed.")

chaining: "N/A — 单步信息泄露"

approach: >
  针对刚公开修复的报告/功能，用修复报告本身作为测试用例，
  验证导出/批量操作路径是否也已清理了受限内容。

reasoning_chain:
  - "问：最近有哪些安全修复被公开披露？修复的范围描述是否精确到所有入口？"
  - "问：修复的功能是否有多个导出/访问路径（如 API、zip导出、RSS、webhook 等）？"
  - "问：用修复报告中提到的相同对象（如同一附件/ID），通过其他路径访问，是否仍可获取？"
  - "如果仍可获取 → 修复不完整，存在残留泄露"

vuln_root: "修复只覆盖了主访问路径（页面展示），未覆盖辅助导出路径（zip 打包），导致内部附件仍然可被导出。"

transferable_to:
  - "任何有导出/批量下载功能的平台（zip导出、PDF导出、CSV导出）"
  - "已公开修复漏洞的同一功能区的不同入口"
  - "内容管理系统中 soft-delete/redact 后仍在缓存或归档中残留的场景"

cases:
  - url: "https://hackerone.com/reports/186230"
    note: "HackerOne Export as .zip 导出内部附件，修复 #182358 后残留，$12,500。"
  - url: "https://hackerone.com/reports/796808"
