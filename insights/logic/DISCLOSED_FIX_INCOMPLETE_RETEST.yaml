  - url: "https://hackerone.com/reports/1285226"
    title: "Improper access control for users with expired password, giving the user full access through API and Git"
    platform: "GitLab"
    severity: "Medium (CVSS 6.5)"
    note: >
      研究者此前报告 #1192460 导致 14.0.2 补丁修复了过期密码用户通过 GraphQL 的访问，
      加上 13.12.2 修复了 REST API 的访问。但一个为解决 LDAP 兼容性问题的 MR (#63466)
      合并后意外重新打开了所有三个通道（REST API、GraphQL、Git HTTP）。
      研究者跟踪了自己此前报告的修复链，注意到新 MR 的副作用后重新测试确认回退。
      (原文: "It seems that these patches caused some problem for users accessing GitLab
      instances using LDAP. And a merge request trying to address this problem got merged
      in one of the latests releases. Unfortenetly this new 'fix for LDAP' also seems to
      have opened up access for regular user accounts with expired passwords again.")
  - url: "https://hackerone.com/reports/1070889"
    title: "[Bypass #870709] Unauthorised access to pagespeed global admin"
    platform: "Palo Alto Software (webtools.paloalto.com)"
    severity: "Medium"
    bounty: "无赏金"
    note: >
      前序报告 #870709 修复了 /pagespeed-global-admin/ 的未授权访问，
      研究者复测发现只需添加 X-Forwarded-For: 127.0.0.1 请求头即可再次绕过访问限制。
      修复仅在网络层/IP 白名单层做了限制，未考虑 X-Forwarded-For 头伪造场景。
      (原文团队摘要: "Just by using X-Forwarded-For: 127.0.0.1 you can again get access
      to global admin page.")
      2021-01 报告，2021-02 公开。no-content 公开，纯结果文。
  - url: "https://hackerone.com/reports/1218680"
    title: "Improper authorization on /api/as/v1/credentials/ for Dev Role User with Limited Engine Access"
    author: "superman85"
    platform: "Elastic (cloud.elastic.co)"
    severity: "High"
    bounty: "有赏金（金额未公开）"
    note: >
      前序报告 #1168528 修复后，研究者对其他角色进行复测，发现 Dev 角色配合
      Limited Engine Access 仍可访问 /api/as/v1/credentials/ 获取所有 API key
      （包括 private-key、search-key）。修复仅覆盖了部分角色，未覆盖 Dev + Limited Engine Access 组合。
      (原文: "Since #1168528 was resolved. I have checking again for other roles.
      At Dev Role with Limited Engine Access, an user still can access API endpoint
      /api/as/v1/credentials/ to get all API keys (private-key, search-key ...)")
      2021-06 报告，2021-08 公开。
  - url: "https://hackerone.com/reports/2352957"
    author: "timon8"
    platform: "Node.js undici (Internet Bug Bounty)"
    severity: "Low"
    cve: "CVE-2024-24758"
    note: >
      研究者阅读了已公开的安全公告 GHSA-wqq4-5wpv-mx2g（undici 跨域重定向时清除
      Authorization 和 Cookie 头），发现修复不完整——Proxy-Authorization 头未被清除。
      典型的"读已公开修复 → 检查修复完整性"模式。修复版本 v5.28.3 / v6.6.1。
      (原文: "I read this security advisory https://github.com/nodejs/undici/security/advisories/GHSA-wqq4-5wpv-mx2g.
      It only clears authorization and cookie header during cross-domain redirect.
      As such this may lead to accidental leakage of 'Proxy-Authorization' to a 3rd-party site.")
      2024-02 报告，2024-03 公开。
  - url: "https://hackerone.com/reports/3334165"
