    author: "nyymi"
    platform: "curl / libcurl"
    severity: "Medium (CVSS 4.0)"
    cve: "无 CVE"
    bounty: "无赏金"
    note: >
      libcurl 7.72.0 起，CURLOPT_COOKIEJAR 写入已有文件时将权限重置为 umask 默认（644），
      无视原有 600 权限。由 commit b834890a 引入的回归。报告被标记为 N/A（curl 项目认为
      这是操作系统层面的权限管理责任），但该行为确实导致敏感 cookie 文件暴露。
