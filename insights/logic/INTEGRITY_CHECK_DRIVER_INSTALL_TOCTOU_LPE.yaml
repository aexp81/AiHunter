      after steam starting and before being installed (the first time streaming),
      the 'modified' driver will be installed instead of the original one")
  - url: "https://hackerone.com/reports/768110"
    title: "Race condition (TOCTOU) in NordVPN can result in local privilege escalation"
    author: "hexgold"
    platform: "NordVPN (Windows)"
    severity: "Medium (CVSS 4.5)"
    bounty: "有赏金"
    note: >
      NordVPN 6.26.8.0 修复了前一个 LPE（移除 engine 选项白名单），但未验证
      ServerDomain 参数（WCF 模型的 DomainName 字段），攻击者可控制 OpenVPN
      配置文件路径。NordVPN 服务先校验配置文件内容再启动 OpenVPN，
      在校验和启动之间存在 TOCTOU 窗口——利用 NTFS Opportunistic Lock
      （James Forshaw 的 BaitAndSwitch 工具）检测文件读取并在校验后替换为
      含 engine 指令的恶意配置，加载任意 DLL 实现 SYSTEM 权限代码执行。
      (原文: "NordVPN 6.26.8.0 mitigates a different local privilege escalation
      vulnerability by removing the engine option from the whitelist...
      A time-of-check-time-of-use (TOCTOU) race condition exists in the way
      OpenVPN configuration files are validated/used... NTFS opportunistic locks
      can be used to exploit this issue by detecting that a process is accessing
      a certain file. When this occurs, the file can be swapped for another file.")
