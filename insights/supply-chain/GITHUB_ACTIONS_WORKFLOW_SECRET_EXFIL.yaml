name: "GitHub Actions 工作流配置缺陷——通过 PR 触发窃取仓库 Secrets 或篡改发布包"
id: "GITHUB_ACTIONS_WORKFLOW_SECRET_EXFIL"
applicable: "blackbox"
phase: "supply-chain"
also_phases: ["authz"]
tags: ["ci-cd", "github-actions", "workflow", "secrets-exfiltration", "pull-request-target", "supply-chain", "hyperledger", "iroha"]
source: "https://hackerone.com/reports/1548870"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。报告标题为 "Unauthorized packages modification or secrets
  exfiltration via GitHub actions"，研究者在摘要中指向 pwnhub 工具
  (github.com/nikitastupin/pwnhub) 作为此类漏洞的参考资源。
  (原文: "You can learn more about this vulnerability type at
  https://github.com/nikitastupin/pwnhub")

hypothesis: >
  未叙述（仅结果）。推断：目标项目的 GitHub Actions 工作流中存在不安全的触发器配置
  （如 pull_request_target 结合 actions/checkout@PR-head），允许外部贡献者通过
  PR 提交恶意代码在拥有仓库 Secrets 权限的 runner 上执行。

action_result: >
  未叙述（仅结果）。报告被确认为 Resolved，赏金 $1,500。
  团队感谢研究者与 Iroha 团队紧密合作修复此问题。
  (原文团队摘要: "Thank you to @dusty_wormwood for working closely with the
  Iroha team to fix this issue.")

why_here_first: "未叙述（仅结果）"

chaining: >
  GitHub Actions 工作流权限滥用 → 窃取仓库 Secrets（如 npm/PyPI 发布令牌）
  → 篡改已发布的包/二进制文件 → 供应链攻击。

# ——— 落地检查清单 ———

approach: >
  审计目标组织的公开 GitHub 仓库的 .github/workflows/ 目录，寻找不安全的工作流配置：
  1) pull_request_target 触发器 + actions/checkout 检出 PR head（而非 base）
  2) workflow_run 触发器将不受信输入传入特权上下文
  3) 工作流中使用 ${{ github.event.* }} 等不受信输入进行命令拼接（注入风险）
  使用 pwnhub 等工具自动化扫描。

reasoning_chain:
  - "问：目标组织在 GitHub 上有公开仓库吗？有多少个？"
  - "问：仓库的 .github/workflows/ 目录中有哪些工作流文件？"
  - "问：是否有使用 pull_request_target 触发器的工作流？"
  - "如果有：问：该工作流是否 checkout 了 PR 的 head ref（${{ github.event.pull_request.head.sha }}）？"
  - "如果是 → 攻击者可以提交恶意 PR，工作流将以 base 仓库的 Secrets 权限执行 PR 中的代码。"
  - "问：工作流中是否有 ${{ github.event.issue.title }} 等不受信输入直接用于 run: 命令中？"
  - "如果是 → 命令注入风险。"
  - "问：工作流是否有 packages:write 或 contents:write 权限？是否可窃取发布令牌？"

vuln_root: >
  开发者假设 GitHub Actions 工作流的触发器会自动隔离外部 PR 的代码执行权限，
  但 pull_request_target 触发器设计为在 base 分支上下文中运行
  （拥有仓库 Secrets），如果同时 checkout 了 PR head 的代码，
  就等于让不受信代码在特权环境中执行。

transferable_to:
  - "所有在 GitHub 上维护公开仓库的开源项目和企业组织"
  - "使用 GitHub Actions 进行 CI/CD 和包发布的项目"
  - "类似的 CI/CD 平台（GitLab CI、Azure DevOps）中的不受信输入注入场景"
  - "开源基础设施项目（区块链、分布式系统）的 GitHub Actions 配置"

