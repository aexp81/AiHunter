    PERMISSION_MODEL_CHANNEL_TYPE_COVERAGE_GAP: 当目标运行时/沙箱/容器实现了权限模型或网络隔离时， 枚举其支持的所有通信通道类型（TCP、UDP、UDS、named pipe、IPC、shared memory、D-Bus 等）， 测试权限控制是否覆盖了每种通道类型—— 关键在于发现"开发者将'网络'仅理解为 TCP/IP，遗漏了本地 IPC 通道"的心智模型缺口。
    PERMISSION_MODEL_FD_VS_PATH_OPERATION_BYPASS: 当目标运行时/沙箱的权限模型基于路径（path）进行文件系统权限检查时， 枚举所有 fd-based 操作（fchown、fchmod、futimes、ftruncate、fsync 等）， 测试是否可以用只读 fd 执行修改操作—— 关键在于发现"权限检查只在 open() 时做，后续 fd 操作不再验证"的设计缺口。
    PERMISSION_MODEL_FS_API_NATIVE_VARIANT_COVERAGE_GAP: 当目标运行时/沙箱的权限模型在 JS 层对 fs 模块 API 设置权限检查钩子时， 枚举同一 API 的所有实现变体（sync/async/callback/promises/.native()）， 测试每个变体是否都经过相同的权限检查路径—— 关键在于发现".native() 等原生绑定变体走独立的 C++ 调用路径，跳过 JS 层拦截"的覆盖缺口。
    PERMISSION_MODEL_NON_FS_API_FILE_WRITE_BYPASS: 当目标运行时/沙箱的权限模型在 fs 模块（或文件系统 API 层）设置拦截点时， 枚举所有非 fs 模块但内部执行文件 I/O 的 API（如 process.report.writeReport()、 v8.writeHeapSnapshot()、worker_threads 日志输出、child_process 的 stdio 重定向等）， 测试这些 API 是否绕过了权限模型的文件系统检…
    PERMISSION_MODEL_PATH_FORMAT_PREFIX_ASSUMPTION_BYPASS: 当目标运行时/沙箱的权限模型使用路径字符串比较来判断访问权限时， 检查其对平台特有路径格式（Windows UNC \\server\share、 \\?\长路径、//?/ 设备路径、DOS 设备名等）的前缀解析逻辑—— 是否存在硬编码的前缀长度假设，导致非标准长度的路径前缀绕过权限检查。
    PKG_SERVICE_FILE_WORLD_WRITABLE_LPE: 审计软件包（deb/rpm/snap）分发的文件权限，重点检查 systemd unit、init.d 脚本、 tmpfiles.d 配置等由 root/init 系统加载执行的文件是否具有非预期的全局可写权限（0666/0777）。
    PLUGIN_ROLE_BLACKLIST_META_CAP_PRIVESC: 审计 CMS 插件/主题的角色权限控制时，检查是否通过黑名单（仅禁止特定角色） 而非白名单（仅允许特定操作）来限制低权限角色的用户管理操作。 特别关注：低权限角色是否拥有 edit_users / promote_user 等元能力， 以及 map_meta_cap 过滤器中是否只拦截了 administrator 角色。
    POS_EMBEDDED_APP_NAVIGATION_ESCAPE_PRIVESC: 在受限子应用（POS、嵌入式面板、合作伙伴门户）中，遍历所有管理链接， 特别关注那些"管理角色/管理权限/管理访问"类型的链接，检查是否能通过 多级跳转（内嵌链接 → 面包屑 → 设置页面）逃逸到主应用的高权限管理界面。
    PREMIUM_PAYWALL_API_PAGINATION_BYPASS: 对含付费墙/订阅限制的搜索/列表 API，在 UI 层看到 upsell 截断后， 直接修改底层 API 的分页参数（start/offset/page/cursor）跳过首页结果， 检查后端是否仅在首页请求时验证订阅状态而在翻页时遗漏权限校验。
    PREVIEW_API_BYPASSES_FILE_LEVEL_ACL: 对实现了文件级访问控制（tag-based ACL、folder-level ACL、sharing permission）的文件共享/协作系统， 测试派生内容 API（preview、thumbnail、search、export、转码预览）是否遵循同一 ACL 规则—— 关键在于派生内容端点常被视为"辅助功能"而遗漏主文件 ACL 的一致性校验。
    PROJECT_EXPORT_SERIALIZATION_TOKEN_LEAK: 对目标平台的数据导出/备份/归档功能，下载导出文件后检查序列化输出（JSON/XML/YAML）中 是否包含不应暴露的模型内部字段：认证令牌（authentication_token）、密码哈希、 API key、session secret 等。重点关注"关联对象"的序列化—— 当导出实体 A 时，关联的实体 B（如团队成员 User 对象）是否被完整序列化 而非仅包含公开字段。
    PROJECT_IMPORT_FOREIGN_KEY_INJECTION: 在项目导入的 export tarball 的 project.json 中注入 _ids 类外键字段， 利用 assign_attributes 未过滤这些属性将其他项目的私有对象关联到攻击者项目。 补丁仅过滤顶层时，通过嵌套 attributes 字段中的 _ids 绕过。
    PROJECT_IMPORT_TEMPLATE_INJECTION_GLOBAL_BACKDOOR: 在项目导入的 export JSON 中将 service 对象的 template 字段改为 true， 利用导入流程未校验 template 创建权限（admin-only），注入全局 service template， 使所有后续新建项目自动安装攻击者控制的 service（数据外泄/隐蔽后门）。
    QUICK_ACTION_CROSS_PROJECT_MODEL_SERIALIZATION_LEAK: 在任何涉及跨资源引用的功能中（Quick Actions、@mention、/move、/assign、链接预览）， 检查引用的对象是否经过字段过滤后再序列化返回。重点关注 commands_changes / preview / autocomplete 类响应中是否泄露了完整 Model 属性。
    RESHARE_IMPLIED_PERMISSION_PROPAGATION: 对支持"转授/reshare"的资源共享系统，测试转授时是否可以在 API 请求中 添加原始共享未授予的权限位（特别是 delete/write/admin）， 重点关注服务端是否因"隐含权限"或"内部标志"而允许权限升级。
    RESOURCE_ID_OVERWRITE_CLONE_RESTRICTED_AGENT: 在 AI agent / chatbot / 自动化平台中，成员可编辑自己资源的配置时， 尝试将资源标识符（sid/slug/name）覆写为管理员受限资源的标识符， 测试是否能克隆该资源并在原资源被禁用后持续使用。
    ROLE_DOWNGRADE_CACHED_VIEW_STALE_ACCESS: 测试"角色降级/移除后，用户先前订阅/缓存的聚合视图（仪表盘、Feed、通知、收藏列表） 是否仍能通过间接路径访问原本受限的资源"——检查的不是直接访问权限， 而是订阅关系是否随角色变更同步清退。
    ROLE_HIERARCHY_ACTION_PANEL_UPWARD_ABUSE: 在 RBAC 系统中，找到低权限角色可用的"管理性"动作面板（ban、mute、降级、删除等）， 测试该动作是否可以指向更高权限的角色（Admin/Owner）， 检查后端是否执行角色层级比较。
    ROLE_MISSING_ENDPOINT_ACL_SECRET_OVERWRITE: 用低权限角色（如 Builder/Viewer/Member）直接请求本应仅限管理员的敏感资源 CRUD 端点 （如 secrets/credentials/tokens），测试服务端是否对该端点做了角色级访问控制。 特别关注同名创建是否会静默覆写已有记录。
    SECONDARY_USER_TYPE_HIDDEN_EDIT_ROLE_BACKDOOR: 在有多种用户类型（Staff/POS User/Bot/Service Account 等）的应用中，找到管理 UI 上没有完整 CRUD 入口的次要用户类型，通过审查页面 HTML（如删除按钮、隐藏字段） 提取其 ID，拼接标准 CRUD 端点（/users/{id}/edit），检查该端点是否存在且缺少 角色/权限字段的 mass assignment 保护——将次要用户类型提升为 admi…
    SEQUENTIAL_TOKEN_UNAUTHENTICATED_DIRECT_OBJECT_ACCESS: 识别使用可预测标识符（时间戳、自增整数）的直接对象访问端点， 检查该端点是否缺少认证（未登录可访问）和/或授权（登录但无权限仍可访问）检查。 特别关注源码中的 TODO/FIXME 注释暗示的未完成安全检查。
    SERVERLESS_APP_REPO_OVERBROAD_IAM_ROLE_PRIVESC: 审计 AWS Serverless Application Repository / CloudFormation 模板 / Terraform 模块 等社区共享的基础设施即代码（IaC）资源，检查部署后创建的 IAM 角色是否包含 过宽权限（尤其是 sts:AssumeRole/iam:PassRole 对 "*" 资源）， 或者是否缺少权限边界（permissions boundary）限制。
    SERVICE_TOKEN_BOT_PRIVILEGE_SCOPE_ESCALATION: 在具有用户权限边界（如 external/internal/admin）的平台中， 关注自动创建的服务身份（bot user、service account、API token 关联用户） 是否正确继承了创建者的权限范围。测试方法：以受限用户身份创建 project token / deploy key / service account，检查其关联身份的有效权限是否超出创建者的权限边界。
    SETTINGS_PERMISSION_SECRET_CROSS_BOUNDARY_PRIVESC: 在具有细粒度 staff/role 权限的 SaaS 平台中， 检查设置/配置页面中暴露的 API 密钥、Secret、Token 是否授予了 超出当前 staff 权限范围的访问能力—— 关键是"密钥的作用域与查看该密钥所需的权限是否匹配"。
    SHARE_LINK_PATH_PREFIX_MATCH_UNAUTHORIZED_FILE_ACCESS: 在文件共享/下载功能中，当 URL 包含文件路径参数时，测试将路径修改为 原始文件名的扩展形式（加后缀、子目录），检查后端是否使用前缀匹配而非精确匹配 来验证路径是否属于共享范围。
    SLASH_COMMAND_ACL_ORDER_MEMBERSHIP_LEAK: 在具有频道/房间/群组概念的通信平台中，寻找需要指定目标用户+目标频道的管理命令 （如 /mute、/kick、/invite、/ban），测试对无权访问的私有频道执行这些命令时， 服务端是否先进行成员身份查询再进行权限验证—— 关键在于发现"检查顺序不当导致差异错误响应泄露私有频道成员信息"的逻辑缺陷。
    TEAM_MEMBERSHIP_IDOR_CROSS_TEAM_DESTRUCTIVE_ACTION: 对团队/组织成员管理 API（添加/移除/修改角色）中的 team_id 和 user_id 参数进行 交叉替换测试：用自己有管理权限的某个团队的身份去操作另一个团队的成员， 检查服务端是否对 team_id 做归属校验。
    THIRD_PARTY_API_CROSS_SERVICE_PRIVACY_LEAK: 当目标 Bug Bounty 新增 scope 域名或收购服务时，检查该服务是否通过 OAuth 与主服务同步用户数据，然后测试其 API 端点是否继承了主服务的隐私/可见性设置 ——第三方服务往往缓存了数据但未复制访问控制策略。
    THIRD_PARTY_APP_GRAPHQL_TOKEN_LEAK_PERSISTENT_ACCESS: 对平台上已安装的第三方应用（尤其是高权限应用如自动化/工作流工具）， 系统性审计其内部 API（GraphQL / REST）的响应体， 寻找是否在响应中暴露了宿主平台的 Access Token / API Key / Secret。 重点关注：(1) 应用的管理/配置/连接器页面通常传递认证材料； (2) 泄露的 token 在 staff 被移除后是否仍然有效（token 不与会话绑定）。
    THIRD_PARTY_APP_OFFLINE_TOKEN_USER_SCOPE_BYPASS: 在有第三方应用生态 + 多角色 RBAC 的平台上，以低权限用户打开已安装的第三方应用， 检查应用展示的数据是否超出当前用户的权限范围——如果应用使用的是"离线/永久" OAuth 令牌（绑定到租户而非用户），低权限用户可通过应用代理绕过 RBAC。
    THIRD_PARTY_SAAS_INVITE_API_SELF_ADD_ADMIN: 识别目标站点使用的第三方 SaaS 平台（如文档托管、CMS、Help Center）， 从 SaaS 公开页面源码提取项目/组织 ID，然后尝试调用 SaaS 平台的 邀请/加入 API 自添加为管理员。
    TOKEN_ENDPOINT_COARSE_PERMISSION_GATE: 在多权限类型的 RBAC 系统中，持有低权限（如 managed store access）时， 直接访问高权限操作的 token/签名对象获取端点，测试该端点是否只检查了 宽泛的权限类别（如"有任何 store 权限"）而未校验具体权限类型。
    UNQUOTED_SERVICE_PATH_EXE_HIJACK_CHAIN_LPE: 枚举目标系统上所有 Windows 服务的 ImagePath 注册表值，筛选未用引号包裹 且路径中包含空格的条目（如 C:\Program Files\...），确认服务运行权限（SYSTEM/Admin）。 若已有任意文件写入/移动漏洞，可在路径截断点（如 C:\Program.exe）植入恶意 可执行文件，等待服务重启加载实现提权。
    USER_ID_SYSTEM_PATH_COLLISION_DATA_DESTRUCTION: 检查多用户系统中用户 ID / 用户名是否直接作为文件系统路径的一部分使用； 如果系统在同一父目录下同时存放用户数据目录和系统数据目录， 且用户创建时不检查名称是否与已有系统目录冲突， 则可通过创建→删除用户来破坏系统目录。
    WORKFLOW_ALTERNATIVE_ENDPOINT_PERMISSION_BYPASS: 对 UI 中被限制的操作（如"需审批才能结账"），分析该工作流涉及的所有 API 端点， 寻找同一资源的替代操作端点（如 submit vs. update_checkout、 create vs. import、draft vs. publish），测试替代端点是否执行了相同的权限检查。 关键在于开发者通常只在"主流程"端点上实施权限控制，而忽略了 旁路/管理/批量/导入等替代端点。
    XPC_TEAMID_ONLY_OLD_VERSION_DYLIB_INJECT_AV_BYPASS: '逆向 macOS 安全产品的 XPC 服务 → 检查 shouldAcceptNewConnection: 是否仅做 Team ID 验证而缺少 bundle ID/版本/hardened runtime 检查 → 从官网下载该供应商的历史版本 应用（通常缺少 hardened runtime 或 library validation）→ 用 dylib proxying 注入代码到旧版进程 →…'
  auth:
    APACHE_REWRITE_PERCENT3F_ACL_BYPASS: 在 Apache + PHP-FPM 环境下，对所有受 Files 指令保护的敏感 PHP 文件， 尝试在文件名后附加 %3F（URL 编码的 ?）加任意后缀（如 %3Ftest.php）， 观察是否绕过认证/IP 限制直接获得响应。
    CICD_OAUTH_DOMAIN_UNRESTRICTED: 对暴露在公网的 CI/CD 平台（Jenkins/GitLab CI），测试 OAuth 登录是否限制了允许的邮箱域， 未限制则任意第三方账号可登录并接触 Script Console/构建日志等高危功能。
    CLIENT_RESPONSE_STATUS_FLIP_AUTH_BYPASS: 对管理后台/内部面板的登录 API，拦截响应并修改状态字段（status/success/authenticated） 为 true，测试前端是否仅依赖响应 JSON 布尔值做认证判断而未验证服务端 session/token。
    CORS_DYNAMIC_ORIGIN_REFLECTION: '对所有 API 接口发送带 Origin 头的请求，观察响应中是否动态反射 Origin 值 且同时设置 credentials: true；如有则尝试 null origin / 子域绕过 / URL 解析欺骗等变体。'
    EMAIL_CONFIRM_SENT_TO_WRONG_INBOX: 测试邮件变更流程中"确认链接的发送目标"： 确认链接应该发到新邮箱（待验证的），还是实际发到了旧邮箱（已登录的）； 若发到旧邮箱，则攻击者可在不拥有目标邮箱的情况下完成对任意邮箱的验证。
    EMAIL_IDENTITY_CHANGE_STALE_ACCESS_PERSISTENCE: 在支持多身份/邮箱绑定的多租户系统中，将账户的邮箱/身份标识替换为新邮箱后， 用旧邮箱尝试登录并访问之前通过该身份获取的资源权限， 验证身份变更是否同步撤销了旧身份的会话和资源级访问授权。
    EMAIL_REMOVAL_PENDING_TOKEN_NOT_INVALIDATED: 在支持多邮箱/多认证方式的账户系统中，添加新邮箱并获取确认链接后， 在 UI 中删除该邮箱，然后测试之前的确认链接是否仍然有效， 验证实体移除操作是否同步清理了相关的待处理令牌/链接。
    EMAIL_VERIFICATION_TOCTOU_RACE: 对修改邮箱和验证邮箱这两个独立端点并发请求，利用后端缺乏数据库事务/行锁的缺陷， 使 verification token 在邮箱已被替换为受害者地址后仍然生效。
    EMAIL_VERIFY_REQUEST_REWRITE_STATE_DESYNC: 在多步邮箱验证流程中，通过代理层（Burp match-and-replace）选择性改写请求中的 邮箱字段，制造前端/后端/数据库之间的邮箱身份不一致，使验证操作对攻击者未拥有的 邮箱生效。核心是利用流程中多个步骤分别处理邮箱且未做一致性校验的缺陷。
    EMBEDDED_FORM_BYPASS_SECURITY_CONTROLS: 对有安全控制（2FA 要求、黑名单、频率限制等）的功能， 寻找是否存在备用入口/嵌入式表单/Widget/API 版本/移动端 API 执行相同操作， 测试备用入口是否同步执行了相同的安全检查。
    HTTP_CLIENT_REDIRECT_SENSITIVE_HEADER_RESIDUAL_LEAK: 对 HTTP 客户端库的跨域重定向处理逻辑进行差分审计：对比已修复的敏感头清除列表 与实际应清除的完整集合（Authorization、Cookie、Proxy-Authorization、 x-auth-token 等），以及不同接口（fetch vs request/stream/pipeline）之间 的行为一致性，寻找遗漏的头或遗漏的代码路径。
    LOCAL_PORT_PREBIND_RPC_IMPERSONATION: 对本地运行的安全敏感 RPC/IPC 服务（钱包、密码管理器、2FA 代理等）， 检查其是否仅使用单向认证（只验证客户端不验证服务端）， 以及非特权用户是否可以抢占同一端口来冒充服务。 重点关注无 TLS mutual auth 的 HTTP RPC 和开机自启但无 GUI 反馈的场景。
    MICROSERVICE_JWT_SIGNATURE_BYPASS: 对使用 JWT 认证的内部微服务端点，测试签名验证缺陷：修改 payload 保留签名、 设置 alg=none、RS256→HS256 密钥混淆，绕过认证后链接存储型 XSS。
