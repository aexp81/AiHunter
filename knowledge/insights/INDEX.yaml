    API_SIDEEFFECT_STATE_RESET_BYPASS: 对 UI 中灰掉/报错的操作（如"账户已激活，不可邀请"）， 不只测试直接 replay 被禁用的端点，还测试相关联的其他端点的副作用： 先调用关联端点 A（即使报错），再调用目标端点 B， 检查 A 是否在服务端产生了重置前置条件的副作用。
    API_STATE_FIELD_DIRECT_WRITE_APPROVAL_BYPASS: 对需要审批/审核的工作流（广告投放、内容发布、账户认证）， 拦截 API 请求并在 PATCH/PUT 请求体中添加服务端控制的状态字段 （如 admin_approval、effective_status、is_verified、review_status）， 测试后端是否接受客户端对这些字段的直接赋值。
    ASYNC_PROVISION_STATE_WINDOW_BYPASS: 当应用中存在异步部署/安装/创建流程（如主题安装、应用配置、订阅开通）时， 在资源部署进行中（pending/installing 状态），尝试调用正常情况下需资源完全就绪后才允许的操作（publish、activate、export）， 测试权限检查和状态标志是否在部署完成前就已生效—— 关键在于找到"文件/数据已就位但限制标志未设置"的精确时间窗口。
    CICD_MIRROR_TRIGGER_OWNERSHIP_HIJACK: 寻找 CI/CD 平台中 Pipeline 执行身份的继承逻辑——当触发者（用户/组 Owner） 身份发生变更（删除、转移、降权）时，已配置的自动触发任务的执行身份是否跟随变更， 导致攻击者可通过精心编排身份转移使 Pipeline 以受害者身份运行。
    CONFIG_READ_FAILURE_SETUP_STATE_REENTRY: 对容器化/分布式部署的 Web 应用，审计其"已安装/已配置"状态判定逻辑—— 当配置文件（config.php、.env、settings.py）因存储后端瞬态故障而不可读时， 应用是否错误地回退到初始安装/Setup 状态； 若回退则检查安装向导是否校验数据库中已有数据/用户， 还是允许匿名创建新管理员覆盖现有系统。
    DISCLOSED_FIX_INCOMPLETE_RETEST: 针对刚公开修复的报告/功能，用修复报告本身作为测试用例， 验证导出/批量操作路径是否也已清理了受限内容。
    FILE_WRITE_SIDE_EFFECT_PERMISSION_RESET_LEAK: 审计命令行工具/库在写入已有敏感文件（cookie jar、token cache、key file）时， 检查是否保留了文件的原有权限——特别关注"删除+重建"式写入路径会导致权限降级为 umask 默认值。
    FRAMABLE_CHECKOUT_CLICKJACK_FORCED_PURCHASE: 找到涉及支付/结账/交易确认的页面，检查是否缺少 X-Frame-Options 或 CSP frame-ancestors 限制。如果可嵌套，构造隐藏 iframe 覆盖攻击， 验证是否能诱导已登录用户完成意外购买/交易。
    GDPR_EMAIL_SPOOF_ACCOUNT_DELETION: 检查目标平台的 GDPR/隐私数据处理流程是否通过邮件触发且缺少身份验证—— 使用 SMTP 伪造邮件模拟数据删除请求，测试是否被无验证执行。
    GROUP_MEMBERSHIP_MINIMUM_CONSTRAINT_BYPASS: 测试角色/组成员修改 API 是否强制执行"至少保留 N 个成员"等业务约束—— 尝试清空全部管理员、移除最后一个 owner、将成员数减至零等边界操作。
    INTEGRITY_CHECK_DRIVER_INSTALL_TOCTOU_LPE: 审计桌面应用中"完整性校验"与"特权安装/加载"操作之间的时间窗口（TOCTOU）， 检查校验通过后到实际加载/安装之间是否存在文件被替换的机会窗口。
    MULTI_ROLE_INVITE_HIDDEN_PERSISTENT_ACCESS: 在支持角色邀请的多租户系统中，测试同一用户能否被同一组织以不同角色多次邀请， 然后检查移除最后一个可见角色后，先前的高权限角色是否仍然生效—— 核心是角色记录的增删是否独立管理还是只操作最新的那条。
    PATCH_DIFF_NUMERIC_BOUNDARY_BYPASS: 找到近期安全补丁，分析底层库源码列出修复函数的所有错误返回条件， 对照补丁确认哪些条件未被覆盖，构造极端但合法的输入触发未修复路径。
    PAYMENT_GATEWAY_STATE_MACHINE_DOUBLE_SPEND: 对接第三方支付网关（PayPal/Stripe/etc.）的平台上，测试交易状态机中 异步回调、超时、取消等边界状态下资金借贷双方是否一致—— 特别关注"已完成提款但回调状态报告为失败/取消"的场景。
    RACE_CONDITION_ONE_TIME_LIMIT_BYPASS: 识别应用中"一次性限制"的操作（优惠码兑换、点赞、评价、投票、转账、礼品卡充值）， 在短时间内并发发送多个相同请求，检查限制是否被绕过。
    SNAP_RPC_CALLER_CONTROLLED_AUTHORIZE_BYPASS: 审计浏览器插件/Snap/扩展的 RPC handler 源码，查找安全关键的布尔参数 （如 enableAuthorize/requireConfirm/skipApproval）是否由外部调用方控制 且默认值或可传值允许跳过用户确认/授权弹窗。
    SOCIAL_LOGIN_NO_PASSWORD_REAUTH: 对支持社交登录（OAuth）的应用，测试社交登录用户在执行敏感操作 （修改邮箱、密码、绑定手机、删除账户、2FA 设置）时是否跳过密码验证， 这可作为 XSS/CSRF 攻击的串链突破口。
    SUBSCRIPTION_REVIEW_QUEUE_OUTLIVES_ENTITLEMENT: 在含"付费订阅 + 人工/异步审核"的平台上，在订阅即将到期时触发需要审核的操作 （如修改个人资料、提交内容审查），然后取消订阅；测试审核流程完成时 是否重新校验订阅/权益的有效性，还是直接恢复审核前的权益状态。
    SUID_COLOCATED_BINARY_UNLOCKED_VALIDATION_TOCTOU_LPE: 审计 SUID/SGID 二进制是否在运行时加载同目录下的其他二进制/库文件， 检查加载前的校验是否持有文件锁——若未持锁则存在 TOCTOU 竞态窗口。 硬链接 SUID 到可写目录可控制同目录查找路径。
    TWO_FA_ENROLLMENT_PHONE_SWAP_OTP_FLOOD_LOCKOUT: 在 2FA/MFA 注册流程（而非登录流程）中，拦截手机号提交请求并替换为目标号码， 然后反复触发 OTP 重发以耗尽服务端对该号码的发送配额/速率限制， 导致目标用户在自身登录时无法接收有效 OTP，实现跨账户 DoS 锁定。
    WEBSOCKET_CRYPTO_KEY_OVERRIDE_MITM_SESSION_TAKEOVER: 逆向移动端 WebSocket 通信协议的加密实现，发现消息处理路径中复用了初始化阶段的 setReceiverPublicKey 方法——攻击者在同一网络 ARP 欺骗后，通过构造特定 CryptoType 消息即可覆盖对方公钥，完全接管加密会话
    WEB_CACHE_DECEPTION_SENSITIVE_PAGE: 对使用 CDN/reverse proxy 的目标，在认证后的敏感页面 URL 末尾追加静态文件扩展名（如 /home.css、/profile.png）， 诱导受害者访问后，以无认证状态访问同一 URL，检查是否能从 cache 读取受害者的敏感内容。
  recon:
    AWS_NON_PROD_ENDPOINT_CLOUDTRAIL_BYPASS_ENUM: 系统性地测试 AWS 各服务的非生产/预发布 API 端点（通过 --endpoint-url 参数指定）， 确认这些端点是否接受标准 IAM 凭证调用、是否跳过 CloudTrail 日志记录， 从而实现静默权限枚举。
    COMMENTED_JS_CRED_LEAK: 前端凭证三级递进搜索：源码直搜 → devtools 搜已加载 JS → 遍历全部 JS 含注释/索引文件
    DIFFERENTIAL_RESPONSE_ENTITY_STATE_FINGERPRINT: 对平台上不同类型/状态的实体（如 private vs sandbox vs 不存在）， 测试辅助端点（CSV 导出、settings 页、管理 API）的 HTTP 响应差异 （200 vs 302 vs 404 vs 403），利用差异指纹识别实体的隐藏属性。
    DISTRIBUTED_SERVICE_DEFAULT_NO_AUTH_PORT_PROBE: 对目标子域名进行全端口扫描，识别分布式协调/消息中间件服务 （Zookeeper 2181 / etcd 2379 / Consul 8500 / Redis 6379 / Kafka 9092 等） 的默认端口，利用这些服务默认无认证的特性直接执行管理命令。
    DWR_DEBUG_PAGE_DEFAULT_ADMIN_EXPOSURE: 对 Java Web 应用探测 DWR（Direct Web Remoting）框架的默认调试页面 /dwr/index.html 和 /dwr/test/，如果未删除或未限制访问，则可枚举所有 暴露的 Java 类和方法（包括管理功能和测试方法），进而对低关注度的方法 执行注入测试。
    GITHUB_LEAKED_ARTIFACT_REPO_CREDS: 通过 GitHub 搜索/commit 历史回溯发现目标公司员工泄露的制品仓库凭据 （JFrog/Nexus/.npmrc），验证后评估读写权限，写入权限使供应链攻击成为可能。
    ORIGIN_IP_CDN_SSO_BYPASS: 通过 DNS 解析链、SSL 证书透明度日志、历史 DNS 记录等方式探测 CDN/WAF/LB 背后的源站真实 IP，然后直接访问源站 IP 测试是否能绕过前置的认证/授权网关。
    SPRING_ACTUATOR_HEAPDUMP_CREDENTIAL_LEAK: 在目标子域上扫描 Spring Boot Actuator 默认端点（/actuator/heapdump, /actuator/env, /actuator/mappings 等），获取 heapdump 后从内存中提取凭证和 token。
  supply-chain:
    CICD_BUILD_STEP_LOCAL_PACKAGE_PRIVESC: 对允许用户提供构建配置的 CI/CD 平台（代码分析、CI 构建、在线 IDE）， 检查构建步骤中的包安装机制是否接受本地路径（指向用户上传的源码目录）， 以及包安装脚本（postinst/preinst）是否以 root 权限运行，从而实现容器内提权。
    DEPENDENCY_CONFUSION_INTERNAL_PKG_HIJACK: 在目标公司的公开代码（GitHub、JS 文件、构建产物）中搜索内部包名， 检查这些包名是否在公共 registry（npm/PyPI/RubyGems）中未被注册， 若未注册则注册同名包（含 preinstall/callback 脚本）测试是否触发。
    GITHUB_ACTIONS_WORKFLOW_SECRET_EXFIL: 审计目标组织的公开 GitHub 仓库的 .github/workflows/ 目录，寻找不安全的工作流配置： 1) pull_request_target 触发器 + actions/checkout 检出 PR head（而非 base） 2) workflow_run 触发器将不受信输入传入特权上下文 3) 工作流中使用 ${{ github.event.* }} 等不受信输入进行命令拼接…
