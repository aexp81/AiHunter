    OPTION_KEY_INTERPOLATION_ADMIN_NOTICE_XSS: 白盒审查 CMS/平台插件的 admin notice 输出函数： 当 notice 消息中包含 HTML 标记（如 <strong>）时，开发者往往对整个消息跳过 esc_html() 而直接 echo——此时检查消息中是否插值了来自 DB/用户输入的变量 （尤其是 option key、文件名、用户名等"看似安全"的字段）。
