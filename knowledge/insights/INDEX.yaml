    MARKUP_SELECTOR_ATTRIBUTE_MISMATCH_XSS: 审计 HTML 过滤器中 CSS 选择器（匹配子节点属性）与实际取值逻辑（优先从父节点取）的不一致， 通过在父节点属性中注入含双引号的值逃逸 img/a 标签属性边界。
    NOSQL_REGEX_BLIND_FIELD_EXTRACTION: '对使用 MongoDB/NoSQL 后端的 Web 应用，在接受 JSON body 的登录/查询端点中， 将参数值替换为 $regex 操作符（如 {"email": {"$regex": "^a"}}）， 根据响应差异逐字符提取数据库字段值（邮箱、token、API key 等）， 类似 SQL 盲注但针对 MongoDB 操作符注入。'
