    KERNEL_FD_IDENTITY_CONFUSION_DOUBLE_FREE: 审计内核代码中用 fd 数字（而非 file 指针/结构体引用）标识对象的场景。 当内核子系统通过 getsock_cap()/fget() 获取引用并存储 fd 数字时， 用户空间可以 close 原 fd 后 open 新对象复用同一 fd 号，导致后续的 fdrop() 作用于错误对象——double-free + 引用泄露。
    KERNEL_SOCKET_OPTION_RACE_UAF_ARBITRARY_RW: 审计内核 socket option 处理代码中的锁使用情况，对 setsockopt / getsockopt 路径进行并发 race，在结构体被操作期间触发释放以构造 UAF， 劫持结构体中的指针获取内核任意读写原语实现提权。
    KERNEL_SYSCALL_RACE_STACK_POINTER_FREE_UAF: 审计内核 syscall 中"线程 A 将栈/局部变量指针存入共享结构 → 线程 B 释放该指针" 的模式。关注 CMD/ioctl handler 中使用局部栈缓冲区但将其指针暴露到 跨线程共享结构的代码路径——当其他线程在原线程返回前释放该指针时， 堆分配器对栈地址执行 free() 导致内存损坏。
    KNOWN_CVE_VENDORED_PROTOCOL_STACK: 识别目标固件/OS 中 vendored 或 fork 的开源协议栈（如 FreeBSD sppp、lwIP、OpenSSL）， 检索上游已修复但 fork 版本可能未回移的历史 CVE，直接验证。
