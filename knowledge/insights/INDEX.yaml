  input:
    ADMIN_INTEGRATION_SERVER_CONFIG_SSRF: 在应用管理面板中寻找需要配置外部服务器地址+端口的集成功能 （Jabber/XMPP、SMTP、LDAP/AD、Webhook、数据库备份目标等）， 将服务器地址设为 127.0.0.1 或内网 IP、端口设为目标端口， 观察服务端的连接行为和错误信息差异来实现 SSRF/端口扫描。 核心假设：集成功能提交后服务端会主动建立 TCP 连接到用户指定地址。
    ARCHIVE_UPLOAD_DANGEROUS_FILE_TYPE_EXTRACTION_RCE: 寻找接受归档文件（ZIP/TAR/SCORM/DOCX 等）并在服务器端解压的功能点， 检查解压逻辑是否过滤危险文件扩展名（.aspx/.jsp/.php/.py 等）， 以及解压目标目录是否在 Web 根下可直接访问。
    AUTOCOMPLETE_INNERHTML_UNESCAPED_XSS: 对新增功能的快捷命令/自动补全 UI，检查候选项文本是否用 innerHTML 渲染， 数据源（如 CRM 联系人姓名）是否为外部可控输入。
    BLIND_XSS_FORM_FIELD_ADMIN_REVIEW_SINK: 在目标的用户反馈/评论/投诉/联系表单的所有输入字段中批量注入 Blind XSS payload， 等待 payload 在内部管理员审核/审批面板中渲染触发。 核心假设：用户提交内容需管理员人工审核，内部审核界面在展示时未做 HTML 编码。
    BLIND_XSS_HTTP_HEADER_INTERNAL_DASHBOARD_SINK: 对目标域名的公开端点批量注入 Blind XSS payload 到 HTTP 请求头 （User-Agent / Referer / X-Forwarded-For），等待 payload 在 内部错误追踪系统（Sentry / ELK / Datadog / Splunk）或管理后台的 日志展示页面中渲染触发。核心假设：后端系统会将请求头原样存入日志/错误事件， 而内部看板在展示时未做 HT…
    BROWSER_EXTENSION_SHARED_CONTEXT_NATIVE_METHOD_HOOK_HIJACK: 审计浏览器扩展（特别是安全产品）的内容脚本是否与网页共享执行上下文； 若共享，枚举扩展脚本调用的原生 JS 方法（String/Array/Object 原型方法）， 通过 hook 这些方法的 getter/proxy 截获扩展内部对象引用， 借此控制扩展的特权命令接口。
    CLIENT_SUPPLIED_IDENTIFIER_XSS: 寻找允许客户端提供"标识符"类参数（UUID、user_id、device_id、session_name 等）的接口， 这些字段通常被开发者视为机器生成的安全值，不会对其做 HTML/JS 转义。 注入 XSS payload 后检查是否在管理面板或其他上下文中被渲染。
    CROSS_TENANT_GID_COMMENT_INJECTION_PAGE_CORRUPTION: 在支持内联资源引用（如 [#ID| text]）的评论/消息字段中， 注入当前租户无权访问的跨租户资源 GID，触发服务端未处理异常， 检查是否导致包含该内容的页面持久性渲染故障。
    DOUBLE_URL_ENCODING_SERVLET_PATH_TRAVERSAL: 对 Java Web 应用（servlet、Spring、GWT 等）的路径参数， 使用双重 URL 编码（%252f = / 和 %252e = .）测试路径穿越， 绕过前置反代/WAF 的单层 URL 解码过滤。
    EXIFTOOL_CONTENT_SNIFF_DJVU_EVAL_RCE: 上传文件经 ExifTool 处理时，利用工具按内容而非扩展名判定格式的行为， 将 DjVu 文件伪装为 jpg 触发 DjVu 解析器中的 eval 注入实现 RCE。
    FILE_UPLOAD_CONTENT_TYPE_MISMATCH_STORED_XSS: 在文件上传功能中，故意让文件扩展名与 Content-Type 不一致（如 .png 扩展名 配 text/html Content-Type），测试服务端是否按客户端声明的 Content-Type 而非 文件内容/扩展名白名单返回文件，若按原样返回则浏览器会渲染 HTML 执行 JS。
