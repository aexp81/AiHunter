    title: "Email Confirmation Bypass in your-store.myshopify.com which leads to privilege escalation"
    platform: "Shopify"
    severity: "Critical"
    note: >
      通过 Partner 账户创建商店 + Burp match-and-replace 制造邮箱状态不一致，
      验证任意邮箱后利用 Shopify ID 合并功能接管受害者商店和 Partner 账户。
      是 #791775、#796808 修复后的第三个独立变种。
