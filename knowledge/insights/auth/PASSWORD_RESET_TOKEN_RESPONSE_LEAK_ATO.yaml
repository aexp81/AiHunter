  - url: "https://hackerone.com/reports/746186"
    title: "Leak of authorization urls leads to account takeover (Bumble)"
    author: "0x3c3e"
    platform: "Bumble"
    severity: "N/A"
    note: >
      no-content 公开。团队摘要确认："The researcher was able to pass
      verification to another account by finding confirmation data in
      response from the server." 核心 approach 相同：验证/授权流程中的
      敏感 token/confirmation data 泄露在 HTTP 响应中，攻击者截获即可
      绕过验证完成 ATO。
  - url: "https://hackerone.com/reports/229619"
    title: "Ability to verify any email address you don't own - accounts.shopify.com"
    author: "zombiehelp54"
    platform: "Shopify"
    severity: "High"
    note: >
      full-content 公开。accounts.shopify.com 修改邮箱后，UI 显示的"重新发送验证邮件"
      链接中直接包含 confirmation token：
      https://accounts.shopify.com/email-change/<TOKEN>/resend。
      访问 /email-change/<TOKEN>/ 即可确认任意邮箱，无需拥有该邮箱。
      approach 相同：验证 token 泄露在客户端可见路径（UI 链接而非 HTTP 响应 body），
      攻击者截获即可绕过 OOB 验证。
      (原文: "Copy the resend link [...] Go to
      https://accounts.shopify.com/email-change/<Confirmation-TOKEN>/
      and the email will be verified even though you don't own it.")
  - url: "https://hackerone.com/reports/1061736"
    title: "Unauthorized access to PII leads to MASS account Takeover"
    author: "takester"
    platform: "U.S. Dept Of Defense"
    severity: "Critical"
    bounty: "无"
    note: >
      未认证的顺序可枚举 API 端点直接返回用户 PII（姓名、手机号、邮箱、密码重置 PIN），
      攻击者递减 URL 中的数字 ID 即可批量获取所有用户的邮箱和 PIN，
      用泄露的 PIN 通过忘记密码流程重置任意账户密码。
      approach 相同：敏感凭证/token 暴露在可访问的 HTTP 端点响应中。
      纯结果文，无导航叙事。
      (原文: "I found a critical endpoint which disclosed the personal information
      which can use to takeover any account" 及 "After entering mail address
      enter the pin as '████' as █████████ is at the endpoint.")
