name: "密码重置 HTTP 响应泄露 reset token——攻击者发起重置即可接管任意账户"
id: "PASSWORD_RESET_TOKEN_RESPONSE_LEAK_ATO"
applicable: "blackbox"
phase: "auth"
also_phases: []
tags: ["password-reset", "token-leak", "ato", "account-takeover", "uber", "response-body", "information-disclosure"]
source: "https://hackerone.com/reports/173551"

# ——— L3 核心 ———

observation: >
  密码重置请求的 HTTP 响应体中直接包含了 reset token。
  攻击者只需知道受害者邮箱即可发起重置并从响应中获取 token。
  (原文团队摘要: "the reset token was exposed in the response of a
  password reset HTTP request")

hypothesis: "未叙述（仅结果）"

action_result: >
  成功：攻击者用受害者邮箱发起密码重置 → 从 HTTP 响应中直接获取 reset token
  → 用该 token 设置新密码 → 完整账户接管。
  无扑空叙述（no-content 公开，仅团队摘要描述）。
  $10,000 bounty, Critical severity。
  (原文团队摘要: "it was possible to take over that account because the
  reset token was exposed in the response of a password reset HTTP request.
  This meant an attacker could initiate password reset for an account
  and immediately receive the reset token for that account.")

why_here_first: "未叙述（仅结果）"

chaining: >
  单独即可完成完整 ATO，无需串链。
  可结合用户枚举漏洞实现批量账户接管。

# ——— 落地检查清单 ———

approach: >
  对密码重置、邮箱验证、手机验证等发送一次性 token 的 API 端点，
  检查 HTTP 响应（body/header/redirect URL）是否泄露了本应只通过
  邮件/短信等 out-of-band 渠道送达的 token。

reasoning_chain:
  - "问：密码重置 API 的 HTTP 响应体（JSON/HTML）中是否包含 token/code/link？"
  - "问：响应 header（Location/Set-Cookie/X-*）中是否包含 token？"
  - "黑盒：用 Burp 拦截密码重置请求的响应，全文搜索 token/code/reset/verify 等关键词。"
  - "问：是否存在 debug 模式导致的额外信息泄露（如 debug=true 参数）？"
  - "问：API 版本差异——旧版 API（/v1/）是否比新版（/v2/）泄露更多信息？"
  - "问：不同 Content-Type（Accept: application/json vs text/html）的响应是否不同？"
  - "问：移动端 API 与 Web API 的响应是否不同？移动端通常返回更多数据。"
  - "如果 token 泄露 → 用该 token 直接访问重置链接，验证是否可设置新密码。"

vuln_root: >
  开发者将 password reset token 包含在 API 响应中（可能为了前端跳转或
  debug 目的），而 token 本应只通过 out-of-band 渠道（邮件/短信）送达——
  攻击者无需访问受害者邮箱即可获得 token。

transferable_to:
  - "任何实现密码重置/邮箱验证/手机验证的 Web 应用"
  - "移动端配套 API——通常比 Web 前端返回更多 JSON 字段"
  - "旧版 / 内部 API——可能保留 debug 时期的完整响应"
  - "短信验证码场景——OTP code 泄露在响应中"
  - "邮箱验证链接——verification token 泄露在响应中"
  - "邀请链接——invite token 泄露在响应中"

cases:
  - url: "https://hackerone.com/reports/173551"
    title: "password reset token leaking allowed for ATO of an Uber account"
    author: "procode701"
    platform: "Uber"
