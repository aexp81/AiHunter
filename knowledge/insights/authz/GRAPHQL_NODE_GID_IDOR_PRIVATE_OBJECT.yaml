approach: >
  通过 GraphQL node(id: gid://...) 接口用可枚举的全局 ID 直接拉取
  本应受权限保护的对象，重点关注新上线或变更的 Document type。

reasoning_chain:
  - "问：目标 GraphQL API 是否暴露了 Relay Global Object Identification（node(id:) 接口）？"
  - "如果暴露 → 问：通过 introspection 或 schema diff，最近是否新增了 type？"
  - "问：新增 type 的 GID 格式是什么？id 中是否包含可枚举的数字段？"
  - "问：以低权限/未认证身份查询 node(id: gid://app/NewType/known_id)，是否返回了数据？"
  - "如果返回 → 确认授权检查缺失，评估可泄露的数据范围"

vuln_root: "GraphQL node 接口对新增 type 缺少授权校验，允许通过可枚举 GID 读取私有数据。"

transferable_to:
  - "任何暴露 Relay/Global Object Identification 的 GraphQL API"
  - "内部索引文档类型（*Index::*Document）的搜索/缓存投影层"
  - "SaaS 多租户平台中使用复合键作为 GID 的场景"

