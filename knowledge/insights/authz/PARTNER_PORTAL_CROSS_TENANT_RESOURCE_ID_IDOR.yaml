name: "B2B 合作伙伴门户中替换资源 ID 跨租户获取全部敏感资源（CD key/license/凭证）"
id: "PARTNER_PORTAL_CROSS_TENANT_RESOURCE_ID_IDOR"
applicable: "blackbox"
phase: "authz"
also_phases: []
tags: ["idor", "access-control", "multi-tenant", "partner-portal", "resource-id", "cross-tenant", "steam", "valve", "cd-key"]
source: "https://hackerone.com/reports/391217"

observation: >
  Steam 合作伙伴管理门户的 /partnercdkeys/assignkeys/ 端点允许已认证合作伙伴下载自己游戏的 CD key。
  (原文团队摘要: "a path to download previously-generated CD keys for a game which they would not
  normally have access by passing specific parameters to the /partnercdkeys/assignkeys/ endpoint")

hypothesis: "未叙述（仅结果）"

action_result: >
  成功获取任意游戏的全部已生成 CD key。
  (原文标题: "Getting all the CD keys of any game"，
  团队摘要: "an authenticated user could download previously-generated CD keys
  for a game which they would not normally have access")

why_here_first: "未叙述（仅结果）"
chaining: "N/A — 单步 IDOR 即可获取全部 CD key"

approach: >
  在 B2B/合作伙伴管理门户中，识别涉及敏感资源分配或下载的端点
  （密钥分发/license 管理/报表导出），以合法低权限账户抓取正常请求后
  替换资源标识符（appid/gameid/packageid）为其他租户的资源 ID，
  检查服务端是否缺少所有权/归属验证。

reasoning_chain:
  - "问：目标是否有 B2B 管理门户（partner.*、admin.*、manage.* 等子域）？"
  - "问：门户中有哪些涉及敏感资源分配/下载的端点（密钥/license/凭证/报表）？"
  - "问：正常请求中哪些参数是资源标识符（数字 ID、UUID、slug）？"
  - "问：将资源标识符替换为其他租户的 ID 后，服务端是否返回了数据而非拒绝？"
  - "如果返回 → 确认跨租户 IDOR，评估可获取的数据量和批量可利用性"

vuln_root: "合作伙伴门户假设认证即授权，未在资源操作时验证资源归属。"

transferable_to:
  - "多租户 SaaS/PaaS 合作伙伴管理门户"
  - "游戏平台的发行商/开发者后台"
  - "涉及 license/密钥/凭证分发的管理接口"
  - "电商平台的商家后台订单/库存管理"
  - "任何 B2B 平台的跨租户数据访问场景"

