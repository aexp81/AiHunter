name: "运行时/沙箱权限模型未覆盖所有通信通道类型——通过未纳管通道绕过网络限制"
id: "PERMISSION_MODEL_CHANNEL_TYPE_COVERAGE_GAP"
applicable: "both"
phase: "authz"
also_phases: ["logic"]
tags: ["permission-model", "sandbox-bypass", "unix-domain-socket", "uds", "node.js", "network-restriction", "channel-coverage", "ipc"]
source: "https://hackerone.com/reports/3465156"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。Node.js 权限模型（--permission）中 --allow-net 限制仅覆盖 TCP 网络连接，
  但 Unix Domain Socket (UDS) 连接未被纳入检查范围，
  attacker-controlled 输入（如 URL 或 socketPath 选项）可通过 net、tls 或 undici/fetch 连接到任意本地 socket。
  (原文团队摘要: "A flaw in Node.js's permission model allows Unix Domain Socket (UDS)
  connections to bypass network restrictions when --permission is enabled.
  Even without --allow-net, attacker-controlled inputs (such as URLs or socketPath options)
  can connect to arbitrary local sockets via net, tls, or undici/fetch.")

hypothesis: >
  未叙述（仅结果）。推断：权限模型在设计时将"网络"等同于"TCP/IP"，
  未将 UDS（属于 AF_UNIX 地址族）视为网络通道纳入 --allow-net 的拦截范围，
  导致安全边界存在通道类型覆盖缺口。

action_result: >
  未叙述（仅结果）。CVE-2026-21636 已分配，影响 Node.js v25（权限模型实验阶段），
  已确认可通过 UDS 连接绕过 --permission 限制，访问本地特权服务。
  (原文团队摘要: "This breaks the intended security boundary of the permission model
  and enables access to privileged local services, potentially leading to privilege escalation,
  data exposure, or local code execution.")

why_here_first: >
  未叙述（仅结果）。推断：研究者针对 Node.js v25 实验性权限模型的新功能进行边界测试，
  系统性检查 --allow-net 是否覆盖了所有可能的连接类型。

chaining: >
  UDS 连接可直达本地特权服务（如 Docker socket、数据库 socket、Redis socket），
  实现权限提升、数据泄露或本地代码执行。
  (原文团队摘要: "potentially leading to privilege escalation, data exposure,
  or local code execution")

# ——— 落地检查清单 ———

approach: >
  当目标运行时/沙箱/容器实现了权限模型或网络隔离时，
  枚举其支持的所有通信通道类型（TCP、UDP、UDS、named pipe、IPC、shared memory、D-Bus 等），
  测试权限控制是否覆盖了每种通道类型——
  关键在于发现"开发者将'网络'仅理解为 TCP/IP，遗漏了本地 IPC 通道"的心智模型缺口。

reasoning_chain:
  - "问：目标运行时/沙箱是否实现了网络权限控制（如 --allow-net、network policy、seccomp 规则）？"
  - "问：权限控制的拦截点在哪一层？（系统调用级、库 API 级、DNS 解析级？）"
  - "问：除了 TCP 连接，运行时是否支持其他通道类型？（AF_UNIX/UDS、named pipe、UDP、IPC 消息队列）"
  - "对每种通道类型 → 尝试在禁用网络权限的情况下建立连接，观察是否被拦截"
  - "问：UDS/named pipe 连接到本地特权服务（Docker socket、MySQL socket、Redis socket）是否被权限模型拦截？"
  - "问：第三方库（如 undici/fetch）的 socketPath 选项是否走了同一条权限检查路径？还是直接调用底层 net 模块？"
  - "如果发现覆盖缺口 → 测试能否访问本地特权服务（/var/run/docker.sock 等），评估提权影响"

vuln_root: >
  权限模型的设计者将"网络"等同于"TCP/IP 连接"，
  未将 Unix Domain Socket 等本地 IPC 通道纳入网络权限的覆盖范围，
  导致安全边界存在通道类型覆盖缺口。

transferable_to:
  - "Node.js --permission 权限模型的其他版本和其他通道类型（UDP、named pipe）"
  - "Deno 的 --allow-net 权限控制——是否覆盖 UDS？"
  - "浏览器沙箱/Service Worker 的网络隔离——是否覆盖 WebSocket over UDS？"
  - "容器网络策略（NetworkPolicy）——是否覆盖 hostPath 挂载的 socket 文件？"
  - "任何实现了网络权限控制的运行时沙箱——系统性检查通道类型覆盖完整性"

cases:
  - url: "https://hackerone.com/reports/3465156"
    author: "winfunc"
    platform: "Node.js"
    severity: "Medium (CVSS 5.8)"
    cve: "CVE-2026-21636"
    bounty: "无赏金"
    note: >
      Node.js v25 的 --permission 权限模型中，--allow-net 限制未覆盖 UDS 连接，
      攻击者可通过 net.connect({path: '/var/run/docker.sock'}) 等方式绕过网络限制，
      访问本地特权服务。影响实验性权限模型用户。
  - url: "https://hackerone.com/reports/3559715"
    title: "Node.js Permission Model bypass: UDS server bind/listen works without --allow-net"
    author: "xavlimsg"
    platform: "Node.js"
    severity: "Medium (CVSS 5.3)"
    cve: "CVE-2026-21711"
    bounty: "无赏金"
    note: >
      Node.js v25 的权限模型中，--allow-net 限制覆盖了 UDS 客户端连接（上条 case），
      但 UDS 服务端操作（bind/listen）仍未被纳入权限检查范围。
      在 --permission 模式下不授予 --allow-net，代码仍可创建并暴露本地 IPC 端点
      （Unix Domain Socket server），允许同主机其他进程通过该 socket 通信，
      突破预期的网络限制边界。与上条 case 形成互补：客户端连接 vs 服务端监听。
      no-content 公开，visibility 受限，仅有团队摘要。
      (原文团队摘要: "A flaw in Node.js Permission Model network enforcement
      leaves Unix Domain Socket (UDS) server operations without the required
      permission checks, while all comparable network paths correctly enforce them.")
