    author: "simonscannell"
    platform: "WooCommerce (Automattic)"
    severity: "High"
    bounty: "有赏金（金额未公开）"
    note: >
      WooCommerce 的 wc_modify_map_meta_cap() 在 edit_user / remove_user / promote_user /
      delete_user 操作时，仅检查目标用户是否为 administrator——如果不是则放行。
      shop_manager 拥有 edit_users 权限，可以将 customer 改为 editor
      （拥有 unfiltered_html），再通过 Stored XSS 提权至 admin。
      此外，如果安装了 BackWPup 等插件，shop_manager 可将用户设为
      BackWpUp Admin 角色，直接获得备份下载权限。
      2018-08 报告，2019-12 公开。
