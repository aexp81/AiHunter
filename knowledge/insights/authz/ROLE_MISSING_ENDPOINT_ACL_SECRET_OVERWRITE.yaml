name: "低权限角色直接调用敏感资源端点——服务端缺少角色级 ACL 导致枚举和覆写"
id: "ROLE_MISSING_ENDPOINT_ACL_SECRET_OVERWRITE"
applicable: "blackbox"
phase: "authz"
also_phases: []
tags: ["rbac", "missing-acl", "secrets-management", "privilege-escalation", "builder-role", "dust", "api-endpoint", "overwrite"]
source: "https://hackerone.com/reports/3103755"

observation: "未叙述（仅结果）"

hypothesis: "未叙述（仅结果）"

action_result: >
  以 Builder 角色发送 GET /api/w/[workspace_id]/dust_app_secrets 成功列出所有 secret 名称；
  再发送 POST 同一端点传入已有 secret name → 静默覆写 secret 值，无报错。
  (原文: "A user with the Builder role — a role that is not expected to manage secrets — can:
  List all existing secret names in the workspace. Create new secrets.
  Overwrite existing secrets simply by using the same name.")

why_here_first: "未叙述（仅结果）"

chaining: "N/A — 单步权限绕过即可枚举和覆写工作区 secrets"

approach: >
  用低权限角色（如 Builder/Viewer/Member）直接请求本应仅限管理员的敏感资源 CRUD 端点
  （如 secrets/credentials/tokens），测试服务端是否对该端点做了角色级访问控制。
  特别关注同名创建是否会静默覆写已有记录。

reasoning_chain:
  - "问：目标平台有哪些用户角色（Owner/Admin/Builder/Viewer/Member），各角色的文档权限边界是什么？"
  - "问：是否存在管理敏感资源（secrets/credentials/API keys/tokens）的专用 API 端点？"
  - "问：以低权限角色身份直接 GET 该端点，是否返回资源列表（即使值被遮蔽）？"
  - "如果返回列表 → 确认枚举权限缺失"
  - "问：以低权限角色 POST 该端点创建新资源，是否成功？"
  - "如果成功 → 问：使用与已有资源相同的 name/key 发送创建请求，是否静默覆写？"
  - "如果覆写成功 → 确认同名覆写无保护，低权限用户可篡改其他用户/管理员创建的敏感资源"
  - "扩展：DELETE 端点是否也缺少角色检查？是否可以删除其他角色创建的资源？"

vuln_root: >
  敏感资源管理端点（secrets CRUD）缺少角色级访问控制检查，
  仅验证用户属于工作区但未验证其角色是否有权操作该类资源。

transferable_to:
  - "AI/LLM 平台（如 Dust/LangChain/Dify）的 workspace secrets/credentials 管理端点"
  - "CI/CD 平台（GitHub Actions/GitLab CI）的 secrets/variables 端点对不同角色的权限"
  - "SaaS 平台中 Builder/Developer 角色对环境变量/配置项/密钥的 CRUD 权限"
  - "多角色协作工具中'仅管理员可管理'的资源是否对其他角色开放了 API"

