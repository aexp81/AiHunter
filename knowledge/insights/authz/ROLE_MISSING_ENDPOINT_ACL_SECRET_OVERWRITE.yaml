  - url: "https://hackerone.com/reports/1084904"
    title: "[h1-2102] User with Store Management Permission can Make convertUsersFromSaml/convertUsersToSaml"
    author: "ngalog"
    platform: "Shopify Plus (shopify.plus)"
    severity: "Medium (CVSS 4.3)"
    bounty: "有赏金（金额未公开）"
    note: >
      与同一研究者的 #1084939 完全同场景同事件（h1-2102 live hack event）。
      Shopify Plus 中仅拥有 "Store Management" 权限的用户可通过 GraphQL
      调用 convertUsersFromSaml 和 convertUsersToSaml mutation，
      将其他用户从/到 SAML 认证模式进行转换。该操作本应仅限 "User Management" 权限。
      可导致目标用户登录被中断（SAML 绑定/解绑影响认证流程）。
      (原文: "User with Store management permission... is able to convert users
      account from SAML and to SAML using the graphql...
      This could potentially disable the user's ability to login")
      2021-01 报告（h1-2102 CTF），2022-04 公开。纯结果文，无导航叙事。
      approach 相同：拥有权限 A 的角色直接调用应仅限权限 B 的 GraphQL mutation。
  - url: "https://hackerone.com/reports/56626"
    title: "Shop admin can change external login services"
