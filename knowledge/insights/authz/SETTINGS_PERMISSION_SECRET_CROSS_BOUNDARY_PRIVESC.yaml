name: "设置权限暴露跨边界 secret——低权限 staff 通过功能密钥访问受限资源"
id: "SETTINGS_PERMISSION_SECRET_CROSS_BOUNDARY_PRIVESC"
applicable: "blackbox"
phase: "authz"
also_phases: ["logic"]
tags: ["privesc", "permission-boundary", "secret-leak", "multipass", "shopify", "staff-permission", "cross-boundary", "settings-page"]
source: "https://hackerone.com/reports/541606"

# ——— L3 核心 ———

observation: >
  Shopify Multipass 功能的密钥存放在 Settings/Checkout 页面，
  拥有 Settings 权限的 staff 可以启用 Multipass 并获取密钥，
  但该密钥可用于代表任意客户登录——等同于 Customer 权限。
  (原文: "the multipass secret is located in the Settings part of shopify,
  so it means if a shopify staff has no permission to view/edit customer's details
  but has the permission to view/edit the settings of the shopify account,
  then this secret would help him to gain access to customer's details")

hypothesis: >
  Multipass 密钥的设计假设为"只有店铺所有者或高权限管理员管理设置"，
  未考虑 Shopify 的细粒度权限模型下 Settings-only staff 可以启用此功能，
  从而获得跨越权限边界的密钥。
  (原文: "quoting from the multipass page FAQ: 'If your secret ever leaks....
  everybody who knows the secret can potentially access every customer account!'")

action_result: >
  研究者因无 Shopify Plus 权限未能完全验证步骤 4-5，但推理链条清晰：
  1. 创建仅有 Settings 权限的 staff → 2. 访问 Checkout 设置 → 3. 启用 Multipass
  → 4. 获取密钥 → 5. 用密钥访问任意客户账户。
  报告被 Shopify 确认并修复（$500）。
  (原文: "Step 4 and 5 are not verified yet, if it works, it means this multipass feature
  helps a staff member to escalate access from settings to customers")

why_here_first: >
  研究者阅读 Shopify Multipass API 文档时注意到安全提示"密钥泄露=所有客户账户被控"，
  随即检查密钥存放位置是否与权限模型匹配。
  (原文: "This page talks about the multipass, and quoting from the multipass page FAQ:
  Security considerations: 'If your secret ever leaks.... everybody who knows the secret
  can potentially access every customer account!'")

chaining: >
  Settings 权限 → 启用 Multipass → 获取密钥 → 代表任意客户登录 → 完全访问客户数据。
  (原文: "It means anyone with this secret can get access to every customer
  in this shopify instance.")

# ——— 落地检查清单 ———

approach: >
  在具有细粒度 staff/role 权限的 SaaS 平台中，
  检查设置/配置页面中暴露的 API 密钥、Secret、Token 是否授予了
  超出当前 staff 权限范围的访问能力——
  关键是"密钥的作用域与查看该密钥所需的权限是否匹配"。

reasoning_chain:
  - "问：目标平台是否有细粒度的 staff/role 权限模型？（如仅 Settings、仅 Products、仅 Customers）"
  - "问：Settings/Configuration 页面中是否有 API 密钥、Secret、Token、Webhook URL？"
  - "问：这些密钥的作用域是什么？是否可以访问其他权限域的资源？（如 Customer 数据、订单数据、支付信息）"
  - "问：查看/启用这些密钥需要哪个权限？是否与密钥的作用域在同一权限域？"
  - "如果密钥的作用域超出查看权限的范围 → 问：低权限 staff 能否通过密钥访问受限资源？"
  - "扩展：Webhook Secret、Integration Token、SSO 密钥等其他类型的凭据是否存在类似的跨边界问题？"

vuln_root: >
  功能密钥（Multipass Secret）的查看/启用权限归属于 Settings 域，
  但密钥的实际能力（代表任意客户登录）跨越到 Customer 域，
  开发者未验证密钥的作用域与访问该密钥所需的权限是否匹配。

transferable_to:
  - "Shopify 及类似电商平台的 API 密钥、Storefront Token、Webhook Secret"
  - "任何有细粒度 staff 权限 + 密钥/token 管理的 SaaS 平台"
  - "企业 SSO 平台中 SSO 密钥的存放位置与管理权限"
  - "CI/CD 平台中构建 Secret 的查看权限 vs 部署能力的关系"
  - "云平台中 IAM 角色可查看其他服务的 API Key/Secret 的场景"

cases:
  - url: "https://hackerone.com/reports/541606"
    author: "ngalog"
    platform: "Shopify"
    severity: "Low (CVSS 3.4)"
    bounty: "$500"
    note: >
      Shopify Plus 中仅有 Settings 权限的 staff 可以启用 Multipass 并获取密钥，
      该密钥可用于代表任意客户登录，实现从 Settings 权限到 Customer 权限的提升。
      研究者因无 Plus 账号仅完成概念推理但报告被确认。
  - url: "https://hackerone.com/reports/1084892"
    author: "ngalog"
    platform: "Shopify Plus (shopify.plus)"
    severity: "Medium (CVSS 4.3)"
    bounty: "有赏金（金额未公开）"
    note: >
      Shopify Plus 组织中仅有 Store Management 权限的用户，通过 GraphQL mutation
      changeDomainEnforcementState 可修改域名强制状态（enforce/unenforce），
      该操作应仅限 User Management 权限。用户先通过 stores/api 端点查询 organization.domains.id，
      再用该 ID 调用 mutation。服务端 GraphQL 端点未按细粒度权限校验。纯结果文，无导航叙事。
      (原文: "User with Store management permission only, is able to change
      user management settings using the graphql")
      H1-2102 CTF 期间报告，2022-04 公开。
