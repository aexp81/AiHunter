    author: "Orange Tsai (Black Hat USA 2024)"
    cves: ["CVE-2024-38475", "CVE-2024-38476"]
    note: >
      核心 primitive：DocumentRoot Confusion Primitive 2-2 (Local Gadgets Manipulation)
      + Primitive 2-3 (Jailbreak from Local Gadgets)。
      论文展示了 20+ 利用技术，覆盖信息泄露、XSS、LFI、SSRF、RCE。
      Redmine RCE 案例：双重软链接 (/usr/share/redmine/ → /var/lib/redmine/ → /etc/redmine/)
      读取 secret_key.txt，串链到 Rails Marshal Deserialization RCE。
      与 LFI_RAILS_SECRET_TO_RCE 思路一致但触发点不同（RewriteRule vs UploadsRewriter）。
      修复：Apache 2.4.60 修复部分问题，但架构性缺陷仍存在，建议审计所有 RewriteRule。
