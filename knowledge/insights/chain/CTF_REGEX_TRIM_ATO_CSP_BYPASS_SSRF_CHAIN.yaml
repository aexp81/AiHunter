name: "注册邮箱正则修剪绕过→CSP bypass Blind XSS→客服审核泄露内部URL→IDOR更新用户→Stored XSS+Headless Chrome SSRF"
id: "CTF_REGEX_TRIM_ATO_CSP_BYPASS_SSRF_CHAIN"
applicable: "blackbox"
phase: "chain"
