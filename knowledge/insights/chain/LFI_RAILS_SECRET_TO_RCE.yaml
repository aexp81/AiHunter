name: "任意文件读取框架 secret_key_base 后伪造序列化 cookie 实现 RCE"
id: "LFI_RAILS_SECRET_TO_RCE"
applicable: "blackbox"
phase: "chain"
also_phases: ["input"]
tags: ["lfi", "arbitrary-file-read", "rails", "deserialization", "rce", "secret-key", "cookie-forgery"]
source: "https://hackerone.com/reports/827052"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。报告者直接展示了从路径穿越读文件到最终 RCE 的完整利用链，
  未记录"为什么先看这里"或"尝试过哪些失败路径"。

hypothesis: >
  未叙述（仅结果）。推断思路：一旦确认 LFI 可读任意文件，
  Rails 应用的框架配置文件（secrets.yml / credentials.yml.enc + master.key）
  是最高价值目标——获取 secret_key_base 后可伪造任意 session cookie，
  进而触发反序列化 RCE。

action_result: >
  成功：
  1. 在 issue 描述中插入路径穿越 payload，移动 issue 触发 UploadsRewriter 读文件
  2. 读取 /etc/passwd 确认 LFI 可行
  3. 读取 /opt/gitlab/embedded/service/gitlab-rails/config/secrets.yml 获得 secret_key_base
  4. 使用 secret_key_base 构造含 ERB 模板的 Rails cookie（利用 DeprecatedInstanceVariableProxy 小工具链）
  5. 发送伪造 cookie 到 /users/sign_in，触发服务器端反序列化执行任意命令
  无扑空叙述（报告直接给出成功路径）。

why_here_first: >
  未叙述（仅结果）。

chaining: >
  单独的 LFI（任意文件读）通常被认为是"信息泄露"，危害评级偏低。
  关键跳跃：LFI → Rails secret_key_base → cookie 反序列化 RCE。
  Rails secret_key_base 的泄露本质上等同于 RCE：
  任何人持有该值都可以伪造服务器信任的 session，
  而 Rails 的 cookie 反序列化机制允许在其中嵌入可执行的 Ruby 对象。
  (报告中明确展示了从 LFI 到 RCE 的完整命令序列)

# ——— 落地检查清单 ———

approach: >
  拿到 LFI 后优先读框架 secret/key 文件：Rails secrets.yml / credentials.yml.enc+master.key，
  获得 secret_key_base 后构造反序列化 cookie 触发 RCE，而不是停在"信息泄露"评级。

reasoning_chain:
  - "问：目标是否是 Rails 应用？（响应头 X-Runtime、Set-Cookie 中含 _session_id 等特征）"
  - "问：确认 LFI 可读绝对路径后，尝试读 /path/to/app/config/secrets.yml 或 /path/to/app/config/master.key，是否返回 secret_key_base？"
  - "黑盒：Rails 默认部署路径参考 /var/www/<app>/config/secrets.yml；GitLab 等知名项目路径可查文档（如 /opt/gitlab/embedded/service/gitlab-rails/config/secrets.yml）"
  - "如果获得 secret_key_base：问：目标 Rails 版本是否存在已知的反序列化 gadget chain？（DeprecatedInstanceVariableProxy、ERB gadget 等）"
  - "如果有 gadget chain：用 rails-rce 工具或 ysoserial-style payload 构造序列化对象，base64 编码后设置为 cookie 值发送"
  - "问：服务器是否执行了 payload 中的命令？（通过 DNS/HTTP 回调、文件写入、命令回显等方式验证）"
  - "如果无已知 gadget：问：是否可读源码？有无 eval / send / constantize 等动态执行点被 cookie 值污染？"

vuln_root: >
  开发者将框架的 secret_key_base 视为"仅用于 session 签名"；
  实际上一旦泄露，攻击者可构造任意受信任的 session 对象，
  利用 Rails 反序列化机制中的 gadget chain 执行任意代码。

transferable_to:
  - "任何存在 LFI 的 Rails 应用（Gitlab、Redmine、Discourse 等自托管 Ruby 应用）"
  - "Django 应用：读取 settings.py 获得 SECRET_KEY，用于伪造 signed cookie / CSRF token"
  - "Laravel 应用：读取 .env 获得 APP_KEY，用于伪造加密 cookie（同样可触发反序列化）"
  - "任何使用对称密钥签名 session 且 session 经过反序列化的框架"

cases:
  - url: "https://hackerone.com/reports/827052"
    title: "Arbitrary file read via the UploadsRewriter when moving an issue"
    platform: "GitLab"
    severity: "High"
    bounty: "$12,000"
    note: >
      触发点：GitLab UploadsRewriter 正则 MARKDOWN_PATTERN 提取 file 参数后直接读文件，
      未对路径穿越进行净化。Payload：/uploads/11111111111111111111111111111111/../../etc/passwd。
      通过移动 issue 触发文件重写操作。GitLab 12.9.1 修复。
      关联报告：#653125、#658013、#826361（同类路径穿越变种）。

  - source: "https://blog.orange.tw/posts/2024-08-confusion-attacks-en/"
    author: "Orange Tsai (Black Hat USA 2024)"
    title: "Apache DocumentRoot Confusion to Redmine RCE via Symlink Jailbreak"
    severity: "Critical"
    cve: "CVE-2024-38475"
    note: >
      触发点：不安全 RewriteRule（substitution 前缀可控）+ Path Truncation（%3F 截断后缀）
      → DocumentRoot Confusion（同时尝试有/无 DocumentRoot 路径）
      → Symlink Jailbreak（/usr/share/redmine/instances/ → /var/lib/redmine/ → /etc/redmine/default/）
      → 读取 secret_key.txt → Rails Marshal Deserialization RCE。
      关键：双重软链接绕出 /usr/share/ 限制。
      与 GitLab 案例思路一致（LFI → Rails secret → RCE），但触发点完全不同（Apache RewriteRule vs GitLab UploadsRewriter）。
