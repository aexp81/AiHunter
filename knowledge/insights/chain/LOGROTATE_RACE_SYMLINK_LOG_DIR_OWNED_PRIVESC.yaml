    note: "GitLab Omnibus /var/log/gitlab/ 由 git 用户拥有，logrotate 以 root 运行处理 *.log，利用 logrotten 竞态条件将日志目录替换为符号链接指向 /etc/bash_completion.d，root 登录后触发反弹 shell。"
