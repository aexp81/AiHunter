name: "JS 文件泄露 session token 后追溯其真实用途而非停在 CSRF 假设上"
id: "XSSI_TOKEN_TRACE_TO_CREDENTIAL_LEAK"
applicable: "blackbox"
phase: "chain"
also_phases: ["recon", "auth"]
tags: ["xssi", "token-leak", "csrf-token", "captcha", "credential-exposure", "auth-flow", "paypal"]
source: "https://medium.com/@alex.birsan/the-bug-that-exposed-your-paypal-password-539fc2896da9"

# ——— L3 核心 ———

observation: >
  在探索 PayPal 认证流程时，发现一个 JS 文件（reCAPTCHA 相关）中包含
  看起来像 CSRF token 和 session ID 的字段。
  (原文: "While exploring PayPal's main authentication flow, I noticed a javascript
  file containing what appeared to be a CSRF token and a session ID")

hypothesis: >
  JS 文件中的 session 数据通常允许跨域读取（XSSI），
  持有这些 token 应该能发动某种攻击——首先假设是 CSRF。
  (原文: "providing any kind of session data inside a valid javascript file usually
  allows it to be retrieved by attackers")

action_result: >
  第一轮（扑空）：尝试用 _csrf 替换认证请求中的 CSRF token → 无法发动经典 CSRF 攻击。
  (原文: "After countless attempts to replace regular CSRF tokens inside authenticated
  requests on PayPal's platform with the value of _csrf, I came to the conclusion
  that a classic cross-site request forgery attack was not possible")

  第二轮（扑空）：尝试用 _sessionID 冒充受害者身份 → 不足以登录。
  (原文: "a victim's _sessionID was unfortunately not enough to impersonate them
  on PayPal's site")

  转向：回溯 JS 文件，顺着 token 找到它们被使用的真实场景 →
  发现两个 token 用于 /auth/validatecaptcha（安全挑战验证端点）。
  (原文: "I went back to the vulnerable script and followed the tokens to find what
  they were actually used for. This led to a deep dive into one of PayPal's main
  protection mechanisms...the security challenge")

  最终成功：captcha 验证响应中包含自动提交表单，表单内含用户最近一次登录的明文邮箱和密码。
  (原文: "it contains a self-submitting form with all the data provided in the user's
  latest login request, including their email and plain text password")

why_here_first: >
  认证流程是最高价值的测试起点；JS 文件中出现 session 类数据本身就是异常信号。
  (原文: "When hunting for security issues, the pursuit for uncharted assets and
  obscure endpoints often ends up taking the focus away from obvious, but still
  critical, functionality...If you approach a target like you are the first person
  to ever perform a security assessment on it, and check everything thoroughly")

chaining: >
  单独的 XSSI（能读 JS 文件中的 token）危害有限。
  串链路径：
  1. XSSI 泄露 _csrf + _sessionID（低危）
  2. 在受害者浏览器发起若干次失败登录 → 触发安全挑战机制（无需受害者感知）
  3. 受害者用同一浏览器正常登录 → 真实凭证被写入 captcha 流程缓存
  4. reCAPTCHA token 不绑定 session，攻击者可独立获取
  (原文: "recaptcha was the token provided by Google upon solving a reCAPTCHA
  challenge. It was not tied to a specific session")
  5. 攻击者以受害者 session 发送 /auth/validatecaptcha → 响应中获得明文密码
  同样适用于未认证结账页面（信用卡数据）。
  (原文: "the same vulnerable process was also used on some unauthenticated checkout
  pages, allowing plain text credit card data to be leaked")

# ——— 落地检查清单 ———

approach: >
  发现 JS 文件含 session/CSRF token 后，不停在"能不能直接用于 CSRF"的假设，
  而是回溯 token 在整个认证流程中的真实用途，寻找更高危害的消费场景
  （尤其是身份验证二次确认/挑战流程）。

reasoning_chain:
  - "问：目标的认证/登录 JS 文件中是否出现 csrf / session / token / key 等字段？"
  - "黑盒：用 <script src='https://target.com/auth.js'> 跨域加载，检查 window 全局变量或函数参数中是否可读到 token 值（XSSI 测试）。"
  - "如果可读：问：直接用该 token 替换正常认证请求中的 CSRF token，能否触发 CSRF？（验证第一假设）"
  - "如果 CSRF 假设失败：问：这个 token 在整个认证流程中实际用于哪个端点？（grep JS / 观察登录流程中所有 POST 请求的 body 参数）"
  - "问：目标是否有二次挑战机制（reCAPTCHA / OTP / 邮件验证）？挑战完成后的响应中是否包含此前登录请求的任何数据回放？"
  - "如果挑战完成响应回放了登录数据：问：响应中是否包含明文密码、邮箱或其他凭证？（这是认证流程设计缺陷，独立于 token 泄露）"
  - "问：触发挑战所需的其他参数（如 reCAPTCHA token）是否绑定到具体 session？若不绑定，攻击者可自行获取。"
  - "如果所有条件满足：构建 PoC，从攻击者页面完成完整串链，验证是否可在不知道受害者密码的情况下获取明文凭证。"

vuln_root: >
  开发者为了在 CAPTCHA 验证后"恢复认证流程"，将用户最近一次认证请求的完整数据
  （含明文密码）嵌入 captcha 验证响应中；
  当 captcha 请求所需的 token 可被第三方获取时，这个"恢复机制"变成了凭证泄露通道。

transferable_to:
  - "任何带二次挑战机制（CAPTCHA / OTP / 邮件验证）的登录页面，挑战完成后需要'重放'原始登录请求的场景"
  - "任何将 session/CSRF token 嵌入动态 JS 文件（而非 HTTP-only cookie）的认证实现"
  - "结账/支付流程中的 CAPTCHA 挑战——明文信用卡数据同样可能被回放"
  - "SPA 应用中通过 JS 变量传递认证 token 的模式（XSSI 风险面更大）"

cases:
  - url: "https://hackerone.com/reports/739737"
    medium_writeup: "https://medium.com/@alex.birsan/the-bug-that-exposed-your-paypal-password-539fc2896da9"
    title: "Token leak in security challenge flow allows retrieving victim's PayPal email and plain text password"
    platform: "PayPal"
    severity: "High (CVSS 8.0)"
    bounty: "$15,300"
    note: >
      两次扑空后转向是核心导航价值：_csrf 无法直接 CSRF，_sessionID 无法冒充身份，
      但两者组合用于触发 captcha 验证端点可获取明文密码。
      reCAPTCHA token 不绑定 session 是利用的关键前提。
      同一漏洞链也适用于未认证结账页面（信用卡数据泄露）。
  - url: "https://hackerone.com/reports/139192"
    title: "Ability to collect users' ids that have visited a specific web page with malicious code"
    author: "saeedhashem"
    platform: "Bumble (Badoo)"
    severity: "Medium"
    bounty: "有赏金（金额未披露）"
    note: >
      Badoo 的 Service Worker JS（/worker-scope/chrome-service-worker.js?ws=1）
      包含当前登录用户的 user_id，且可被任意外部网站通过 <script src=...> 跨域加载。
      攻击者在自己页面嵌入该脚本后，读取全局变量 user_id，将访问者的 Badoo 身份
      发送到攻击者服务器，实现大规模用户去匿名化（隐私侵犯）。
      approach 相同：跨域 JS 包含泄露用户特定数据（XSSI 模式），本案简化版仅泄露 user_id。
      (原文: "This script being contained information dependent on the currently logged
      in user" 以及 "The same script being public, and can be called and fetched by any
      rogue script on any website")
