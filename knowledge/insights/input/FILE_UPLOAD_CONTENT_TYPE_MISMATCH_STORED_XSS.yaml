  - url: "https://hackerone.com/reports/149589"
    title: "CSRF to add admin [wordpress] — Flash file upload with trusted extension"
    author: "abdullah"
    platform: "WordPress"
    bounty: "有奖金（金额未公开）"
    severity: "未公开"
    note: >
      上传 Flash（SWF）内容文件但使用可信文件扩展名（如 .jpg 等），
      Flash 插件会基于文件实际内容而非扩展名/Content-Type 加载执行。
      攻击者通过此方式在 WordPress 中实现 CSRF → 添加管理员账户。
      WordPress 修复方案：对上传文件实施更严格的文件类型检查以阻止 Flash 文件上传。
      no-content 公开，仅团队摘要，无导航叙事。
