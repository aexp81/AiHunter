    note: >
      GitLab.com，u3mur4 报告，$12,000 赏金，Critical（CVSS 9.6）。
      通过仓库镜像 + 组 Owner 删除账号实现以任意用户身份运行 Pipeline，
      窃取 CI_JOB_TOKEN 访问受害者私有仓库和 registry。
