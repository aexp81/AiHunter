name: "社交登录用户修改敏感操作无需密码验证——账户接管绕过"
id: "SOCIAL_LOGIN_NO_PASSWORD_REAUTH"
applicable: "blackbox"
phase: "logic"
also_phases: ["auth"]
tags: ["oauth", "social-login", "password-reauth", "email-change", "account-takeover", "authentication-bypass"]
source: "https://www.geekboy.ninja/blog/airbnb-bug-bounty-turning-self-xss-into-good-xss-2/"

# ——— L3 核心 ———

observation: >
  未叙述（仅结果）。作者在测试 AirBnb 邮箱修改功能时，
  发现通过社交登录（Google/Facebook OAuth）注册的用户在修改邮箱时不需要输入原密码验证。
  (原文: "Social Login users don't have password re-authentication while changing the email")

hypothesis: >
  未叙述（仅结果）。推断：若社交登录用户修改邮箱无密码验证，
  结合其他漏洞（如 XSS、CSRF、Session Fixation）可在受害者浏览器中直接修改其邮箱，
  进而通过密码重置流程接管账户。

action_result: >
  成功串链：
  1. Self-XSS（通过 True-Client-IP 头注入，存储在登录历史）
  2. Login CSRF（强制受害者登出 → 登入攻击者账户）
  3. 攻击者账户的 XSS 在受害者浏览器执行 → 4 步 iframe 操作：
     a. 登出攻击者账户
     b. 通过 Google OAuth 登入受害者自己的账户
     c. 提取 Profile Setting 页面的 CSRF token
     d. 修改受害者邮箱为攻击者控制的邮箱
  4. 通过密码重置接管账户

  关键点：X-Frame-Options: sameorigin 允许同域 iframe 完成所有操作。
  (原文完整 JS 代码展示了 iframe 嵌套执行流程)

why_here_first: >
  未叙述（仅结果）。推断：作者在发现 Self-XSS 后，
  寻找将其升级为可利用漏洞的路径——测试关键操作（修改邮箱、密码、2FA）
  是否有充分的身份验证保护。社交登录用户是常被忽略的特殊用户群体。

chaining: >
  单独的"社交登录用户修改邮箱无密码验证"需要攻击者已在受害者浏览器中执行代码（XSS/CSRF）。
  串链升级路径：
  1. Self-XSS + Login CSRF → 强制受害者登入攻击者账户 → XSS 在受害者浏览器执行
  2. XSS 通过 iframe 自动化操作：登出 → OAuth 登入受害者账户 → 修改邮箱
  3. 修改邮箱后通过密码重置接管账户

  核心跳跃：普通用户修改邮箱需要密码验证（无法利用），
  但社交登录用户跳过了这一验证 → 成为攻击链的突破口。

# ——— 落地检查清单 ———

approach: >
  对支持社交登录（OAuth）的应用，测试社交登录用户在执行敏感操作
  （修改邮箱、密码、绑定手机、删除账户、2FA 设置）时是否跳过密码验证，
  这可作为 XSS/CSRF 攻击的串链突破口。

reasoning_chain:
  - "问：目标是否支持社交登录（Google、Facebook、GitHub、Twitter OAuth）？"
  - "问：如何区分社交登录用户和普通用户？注册两个测试账户（一个 OAuth、一个邮箱+密码）。"
  - "黑盒测试：用普通账户修改邮箱 → 观察是否要求输入当前密码验证。"
  - "黑盒测试：用 OAuth 账户修改邮箱 → 观察是否也要求密码验证（或直接允许修改）。"
  - "如果 OAuth 账户跳过密码验证：问：修改请求是否有 CSRF 保护（CSRF token / SameSite Cookie）？"
  - "如果无 CSRF 保护：构造 CSRF payload 直接修改 OAuth 用户邮箱 → 密码重置 → 账户接管。"
  - "如果有 CSRF 保护但存在 XSS：问：XSS 能否在同域执行？能否通过 iframe 提取 CSRF token 并修改邮箱？"
  - "扩展测试：问：其他敏感操作（修改密码、删除账户、2FA 设置）是否也对 OAuth 用户跳过验证？"
  - "白盒审计：搜索修改邮箱/密码的 controller，检查是否有 `if user.oauth? skip_password_verification` 逻辑。"
  - "问：OAuth 用户是否有设置密码的选项？若无密码，修改邮箱应要求 OAuth re-authentication 而非跳过验证。"

vuln_root: >
  开发者假设社交登录用户"没有密码"所以无法要求密码验证，
  于是直接跳过敏感操作的身份验证环节；
  未意识到应该要求 OAuth re-authentication（重新跳转到 OAuth 提供商验证）
  或其他替代验证方式（邮件确认、2FA）来保护敏感操作。

transferable_to:
  - "任何支持社交登录（OAuth）的 Web 应用，且未对 OAuth 用户的敏感操作做充分验证"
  - "常见受影响场景：修改邮箱、绑定手机号、删除账户、关闭 2FA、修改密码（若允许 OAuth 用户设置密码）"
  - "SaaS 平台（Notion、Trello、Asana 等）允许 OAuth 登录且支持邮箱修改"
  - "社交媒体平台（Twitter、LinkedIn、Instagram）OAuth 用户修改关键设置"
  - "电商平台（Shopify、Etsy）OAuth 买家/卖家账户修改支付/收款邮箱"

