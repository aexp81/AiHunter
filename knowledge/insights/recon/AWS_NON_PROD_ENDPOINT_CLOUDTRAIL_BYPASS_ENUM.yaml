name: "AWS 非生产端点绕过 CloudTrail 日志——静默权限枚举"
id: "AWS_NON_PROD_ENDPOINT_CLOUDTRAIL_BYPASS_ENUM"
applicable: "blackbox"
phase: "recon"
also_phases: []
tags: ["aws", "cloudtrail", "logging-bypass", "iam", "permission-enumeration", "stealth", "cloud-security", "forecast"]
source: "https://hackerone.com/reports/3022516"

# ——— L3 核心 ———

observation: >
  AWS 某些服务存在非生产 API 端点，这些端点可以使用标准 IAM 凭证调用，
  但不会生成 CloudTrail 日志记录。
  (原文: "We have found 4 non-production endpoints for the Forecast service which can be
  used with standard IAM credentials, and do not log to CloudTrail.")

hypothesis: >
  攻击者获取窃取的 AWS IAM 凭证后，通常会测试凭证权限（枚举哪些 API 可调用），
  这会产生大量失败的 API 调用日志，是防御者检测的黄金机会。
  如果能通过非生产端点枚举权限而不产生日志，攻击者可以隐身执行这一阶段。
  (原文: "Typically, when an adversary gains access to stolen AWS IAM credentials they will
  frequently test those credentials to see what access they have... For defenders and security
  professionals, this behavior serves as a golden opportunity for detection as it likely involves
  generating a large number of failed API call attempts. If an adversary could enumerate permissions
  without logging to CloudTrail, they could perform this activity invisibly.")

action_result: >
  针对 Forecast 服务发现 4 个非生产端点，用标准 IAM 凭证调用 list-datasets 等操作
  并附加 --endpoint-url 指向非生产端点，API 正常返回结果但不生成 CloudTrail 日志。
  研究者已在 10+ 个 AWS 服务中发现类似问题（events, elasticache, datazone,
  docdb-elastic, devicefarm, cloudwatch, bedrock, bedrock-agent, ssm 等）。
  (原文: "aws forecast list-datasets --region us-west-2 --endpoint-url ████████
  After waiting 5-10 minutes (or longer), notice that it does not generate a log in CloudTrail.")

why_here_first: >
  研究者是云安全领域专家，此前在 Black Hat USA 2023 和 fwd:cloudsec 2023 做过
  同类研究报告，系统性地扫描各 AWS 服务的非生产端点。
  (原文: "This general technique? Yes, a lot actually. I've blogged about it [here] and
  spoke about it at Black Hat USA 2023 and fwd:cloudsec 2023")

chaining: >
  单独看是"日志逃逸"（低危），但与凭证窃取结合后意义重大：
  窃取 IAM 凭证 → 通过非生产端点静默枚举权限 → 精准选择有效权限的 API 调用 →
  减少检测窗口。防御者依赖 CloudTrail 告警的整个检测链被绕过。

# ——— 落地检查清单 ———

approach: >
  系统性地测试 AWS 各服务的非生产/预发布 API 端点（通过 --endpoint-url 参数指定），
  确认这些端点是否接受标准 IAM 凭证调用、是否跳过 CloudTrail 日志记录，
  从而实现静默权限枚举。

reasoning_chain:
  - "问：目标云环境是否使用 AWS？获取的凭证是 IAM 用户/角色凭证吗？"
  - "问：AWS 各服务是否存在非生产 API 端点？（通过域名模式探测：beta-*, gamma-*, preprod-* 前缀）"
  - "如果找到非生产端点 → 用窃取的凭证对该端点调用 API（如 list-* 操作），观察是否正常返回。"
  - "问：调用非生产端点后，等待 10-15 分钟，CloudTrail 中是否有对应日志？"
  - "如果无日志 → 该端点可用于静默权限枚举：逐个测试不同服务的不同操作，根据成功/失败判断凭证权限。"
  - "问：枚举出的权限中，哪些可用于横向移动或数据访问？（如 s3:ListBuckets, iam:ListRoles 等）"
  - "红队视角：将非生产端点枚举作为凭证窃取后的第一步，在 CloudTrail 告警触发前完成侦察。"

vuln_root: >
  AWS 假设非生产/内部端点不会被外部访问者使用，因此未为这些端点配置 CloudTrail 日志记录。
  但这些端点仍然接受标准 IAM 凭证并执行正常的权限检查，创造了一个日志盲区。

transferable_to:
  - "所有 AWS 服务的非生产/预发布端点（研究者已在 10+ 服务中发现）"
  - "其他云平台（GCP、Azure）可能存在类似的非生产端点日志盲区"
  - "任何依赖审计日志作为安全检测核心的系统——预发布/灰度环境是否同步了日志？"
  - "CI/CD 环境中的 staging API——是否与生产共享凭证但缺少日志？"

