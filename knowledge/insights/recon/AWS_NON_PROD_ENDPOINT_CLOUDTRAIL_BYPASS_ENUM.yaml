  - url: "https://hackerone.com/reports/3022516"
    author: "nick_frichette_dd"
    platform: "AWS Forecast Service"
    severity: "Medium"
    note: >
      发现 Forecast 服务 4 个非生产端点可用标准 IAM 凭证调用但不记录 CloudTrail 日志，
      可用于静默权限枚举。研究者此前已在 events, elasticache, datazone,
      docdb-elastic, devicefarm, cloudwatch, bedrock, bedrock-agent, ssm 等
      10+ 服务中发现同类问题。系统性研究（BH USA 2023 / fwd:cloudsec 2023）。
  - url: "https://hackerone.com/reports/3014785"
    author: "nick_frichette_dd"
    platform: "AWS Datazone Service"
    severity: "Medium"
    note: >
      Part 2：同一研究者通过证书透明度监控发现 Datazone 服务新增 3 个非生产端点，
      与上一报告手法完全相同——用标准 IAM 凭证调用 list-domains 操作并指定
      --endpoint-url，API 正常返回但不记录 CloudTrail 日志。
      (原文: "just minutes ago I found 3 more endpoints which exhibit the vulnerable
      behavior. They just came down through my certificate transparency monitoring
      so I think they were created in the past 24 hours.")
  - url: "https://hackerone.com/reports/2981210"
    author: "nick_frichette_dd"
    platform: "AWS Datazone Service"
    severity: "Medium (CVSS 5.0)"
    note: >
      同一研究者发现 Datazone 服务 44 个非生产端点可用标准 IAM 凭证调用但不记录 CloudTrail 日志，
      端点中疑似包含 AWS 员工名称/别名（测试环境）。
      手法与此前报告完全相同：aws datazone list-domains --endpoint-url <non-prod-endpoint>，
      API 正常返回但等待 5-10 分钟后 CloudTrail 无日志。
      (原文: "We have found 44 non-production endpoints for the Datazone service which can be
      used with standard IAM credentials, and do not log to CloudTrail."
      "these endpoints appear to include AWS employee names or aliases in them.
      Presumably these are for test environments or something similar.")
