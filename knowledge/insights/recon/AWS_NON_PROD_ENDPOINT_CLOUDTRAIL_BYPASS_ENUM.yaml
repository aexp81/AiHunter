  - url: "https://hackerone.com/reports/2926361"
    author: "nick_frichette_dd"
    platform: "AWS SSM Service"
    severity: "Medium (CVSS 5.0)"
    note: >
      同一研究者发现 SSM 服务 18 个非生产端点可用标准 IAM 凭证调用但不记录 CloudTrail 日志。
      两类端点行为不同：Category 1（14 个端点）仅对 DescribeInstanceInformation 和
      DescribeInstanceProperties 两个操作不记录日志，其他操作会记录；
      Category 2（4 个端点）范围更广，DescribeParameters/GetOpsSummary/ListCommandInvocations
      等多个操作均不记录日志。虽无法访问客户分区数据，但可用于静默权限枚举。
      (原文: "We have found 18 non-production endpoints for the ssm service which can be
      used with standard IAM credentials, and do not log to CloudTrail."
      "Category 1: These endpoints do not log to CloudTrail only for the
      ssm:DescribeInstanceInformation and ssm:DescribeInstanceProperties actions."
      "Category 2: These endpoints are not nearly as limited as Category 1.
      While they still can't access the customer partition, they have a wider variety
      of actions they can perform without logging to CloudTrail.")
      2025-01 报告，2025-04 公开。
