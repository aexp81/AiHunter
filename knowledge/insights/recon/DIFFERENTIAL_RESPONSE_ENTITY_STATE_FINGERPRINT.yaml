name: "差异化 HTTP 响应指纹识别隐藏实体类型/状态——辅助端点返回差异泄露私有/沙箱分类"
id: "DIFFERENTIAL_RESPONSE_ENTITY_STATE_FINGERPRINT"
applicable: "blackbox"
phase: "recon"
also_phases: ["authz"]
tags: ["differential-response", "enumeration", "program-type", "private-vs-sandbox", "csv-export", "fingerprint", "hackerone"]
source: "https://hackerone.com/reports/2381253"

# ——— L3 核心 ———

observation: >
  研究者在测试自己沙箱程序的设置时发现，advanced_vetting 页面对无权限用户也能加载
  （虽然 GraphQL 正确限制了数据），且该页面包含一个 CSV 下载链接。
  (原文: "when we go to any program's advanced vetting page hackerone.com/$handle/advanced_vetting,
  it loads up regardless of permission, granted no other confidential info is displayed since the
  GraphQL request appropriately restricts unauthorized users")

hypothesis: >
  CSV 下载端点可能也未做权限校验；如果 sandbox 和 private 程序对此端点的响应不同，
  就可以用来区分程序类型。
  (原文: "I decided to experiment with this link and sure enough, I found some risky behavior")

action_result: >
  成功：对 sandbox 程序访问 /$handle/terms_acceptance_data.csv 返回 200 并下载文件；
  对真正的 private 程序访问同一路径则请求不通过（不同的响应/重定向）；
  对不存在的 handle 返回 404 页面。三种差异化响应组合可完整指纹任意 handle 的程序类型。
  (原文: "when any HackerOne user goes to /$SANDBOXED_PROGRAM/terms_acceptance_data.csv the request
  goes through... now let's take for example [private program] we can see that the request doesn't
  go through... when we try with a handle that doesn't exist it shows the Hackerone default 404 page")

why_here_first: >
  研究者正在浏览自己沙箱程序的 advanced_vetting 设置页面，注意到该页面对无权限用户也能加载，
  由此发现了 CSV 下载链接。
  (原文: "I was looking through the settings of one of my sandboxed programs I use for testing
  and I noticed some weird behavior")

chaining: >
  差异化响应枚举 → 确认哪些公司在 HackerOne 有私有程序 → 社会工程/定向攻击。
  与 handle 字典（常见公司名）结合可批量扫描。
  (原文: "we can build a script or just try manually using company names that we might believe
  have a private program in Hackerone and check if they actually have one")

# ——— 落地检查清单 ———

approach: >
  对平台上不同类型/状态的实体（如 private vs sandbox vs 不存在），
  测试辅助端点（CSV 导出、settings 页、管理 API）的 HTTP 响应差异
  （200 vs 302 vs 404 vs 403），利用差异指纹识别实体的隐藏属性。

reasoning_chain:
  - "问：目标平台是否存在基于 handle/slug 的辅助端点（CSV 导出、设置页、高级配置页）？"
  - "问：这些端点对已知的 public 实体、private 实体、不存在的 slug 返回的 HTTP 状态码/响应体是否不同？"
  - "如果不同 → 构建差异化指纹矩阵：200=sandbox/test, 302/403=private, 404=不存在"
  - "问：能否用字典/枚举脚本批量探测，识别出平台上所有私有实体？"
  - "问：辅助端点本身是否还返回了额外的敏感信息（如 CSV 内容、元数据）？"

vuln_root: >
  平台对核心 API 做了权限校验，但辅助端点（导出、设置页面加载）未统一执行相同的访问控制，
  导致 HTTP 响应差异泄露了实体的类型或存在性。

transferable_to:
  - "多租户 SaaS 平台中通过 slug/handle 可访问的辅助端点"
  - "任何区分 public/private/sandbox/archived 实体类型的平台"
  - "导出功能（CSV/PDF/报表）的端点通常权限检查比主 API 松"
  - "CMS/Bug Bounty/项目管理平台中基于 slug 的资源路由"

