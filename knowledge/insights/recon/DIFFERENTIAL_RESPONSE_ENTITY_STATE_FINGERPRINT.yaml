    bounty: "无赏金"
    note: >
      通过 /reports/<id>.json 端点的差异化响应指纹报告提交状态：
      已提交但无权限的报告返回空白页（0 长度），
      未提交的报告 ID 返回 {"status":"404","error":"Not Found"}（36 字节）。
      研究者编写 Python 脚本轮询递增 ID，通过响应长度差异实时监控平台报告提交活动。
      (原文: "If the report is already submitted and the logged in user has no access to it
      the JSON response will return a blank page, zero length. And if the report id
      passed to the endpoint hasn't been submitted yet, the JSON response will return
      {\"status\":\"404\",\"error\":\"Not Found\"}")
      2016-08 报告，同日公开。结果为 N/A（非安全漏洞）。
