name: "Spring Actuator 端点暴露——heapdump/env 泄露凭证与会话"
id: "SPRING_ACTUATOR_HEAPDUMP_CREDENTIAL_LEAK"
applicable: "blackbox"
phase: "recon"
also_phases: ["chain"]
tags: ["spring-boot", "actuator", "heapdump", "env", "credential-leak", "misconfiguration", "java"]
source: "https://hackerone.com/reports/838635"

observation: >
  目标子域上的 Spring Boot Actuator 端点 /heapdump 和 /env 可公开访问，
  暴露高度敏感应用的内部状态。
  (原文: "it was possible to access the Spring Boot Actuator endpoints /heapdump and /env")

hypothesis: "未叙述（仅结果）"

action_result: >
  从暴露的 Actuator 端点获取了敏感信息；同时发现认证库存在 token 未过期失效的问题，
  允许重放攻击。
  (原文: "old tokens were not expiring and being properly invalidated, allowing for replay attacks that should not have been possible")

why_here_first: "未叙述（仅结果）"

chaining: >
  Actuator /heapdump 泄露内存中的 token/凭证 → 结合认证库 token 不过期的缺陷 →
  可重放 token 访问高敏感应用。

approach: >
  在目标子域上扫描 Spring Boot Actuator 默认端点（/actuator/heapdump, /actuator/env,
  /actuator/mappings 等），获取 heapdump 后从内存中提取凭证和 token。

reasoning_chain:
  - "问：目标是否使用 Java/Spring Boot 技术栈？（响应头、错误页面、/actuator 路径特征）"
  - "问：/actuator/heapdump、/actuator/env、/actuator/mappings 等端点是否可未授权访问？"
  - "如果 /heapdump 可下载 → 用 Eclipse MAT 或 jhat 分析内存，搜索 password/token/secret 字符串"
  - "如果 /env 可访问 → 检查数据库连接串、API key、第三方服务凭证"
  - "问：提取到的 token 是否仍然有效？是否存在 token 不过期的问题？"
  - "如果 token 有效 → 尝试重放访问敏感接口，评估横向影响"

vuln_root: "Spring Boot Actuator 端点未配置访问控制，默认暴露了运行时内存和环境变量中的敏感信息。"

transferable_to:
  - "任何使用 Spring Boot 的 Java Web 应用"
  - "微服务架构中的内部服务（可能通过 SSRF 访问内网 Actuator）"
  - "云环境中部署的 Spring Boot 应用（heapdump 可能包含云凭证）"
  - "类似框架的调试端点：Django debug page、Rails /rails/info、Node.js /debug"

cases:
  - url: "https://hackerone.com/reports/838635"
    note: "LINE 子域 Spring Actuator /heapdump + /env 暴露，结合 token 重放，$12,500。"
  - url: "https://hackerone.com/reports/2891449"
    title: "Object Level access control leads to reading user's full requests, sessions, and error messages (Yelp)"
    author: "mester_x"
    platform: "Yelp (proze.yelp.com)"
    severity: "Medium"
    note: >
      .NET ELMAH 错误日志端点 /tmwebapi/elmah.axd 在内部管理工具 Tailored Mail 上
      未授权暴露，泄露管理员完整 HTTP 请求（含 session/cookie）和错误信息。
      approach 同源：扫描框架默认调试/错误日志端点（ELMAH / Actuator / Django debug /
      Rails info）寻找未授权暴露的凭证数据。
  - url: "https://hackerone.com/reports/1121972"
    title: "admin password disclosure via log file"
    author: "darkdream"
    platform: "Acronis (devicelock.com)"
    severity: "Medium"
    bounty: "$100"
    note: >
      full-content 公开。公开可访问的 /log.txt 文件中记录了管理员密码修改操作，
      明文暴露了 admin 用户的 MD5 密码哈希。
      (原文: "Module: change password (4.1.2) change_password=yes;/forum/forum_auth.php;
      login=admin;md5=2bca2f877b7a727861b59f4a4039d2e9")
      approach 同源：扫描常见日志/调试端点（log.txt / error.log / debug.log /
      trace.axd 等）寻找未授权暴露的凭证数据。
  - url: "https://hackerone.com/reports/1417635"
    title: "Default credentials lead to Spring Boot Admin dashboard access"
    author: "sparroww"
    platform: "8x8 (*.8x8.com)"
    severity: "Medium"
    note: >
      no-content 公开。Spring Boot Admin 管理面板实例使用默认凭据暴露，
      虽团队声称"不含敏感数据"但暴露了 Spring Boot 应用的管理界面。
      (团队摘要: "An instance hosting Spring Boot Admin was left exposed
      with default credentials set. The related instance did not contain
      anything sensitive. The issue has been rectified.")
      approach 同源：扫描 Spring Boot 管理端点（/admin, /spring-boot-admin）+
      尝试默认凭据访问。
  - url: "https://hackerone.com/reports/651355"
    title: "Unsecured Dropwizard Admin Panel on display.uber-adsystem.com exposes sensitive server information"
    author: "healdb"
    platform: "Uber (display.uber-adsystem.com)"
    severity: "Medium"
    bounty: "$500"
    note: >
      no-content 公开。Dropwizard 框架的 AdminServlet 面板未设认证，
      任意匿名用户可查看线程信息、CPU 指标等生产服务器遥测数据。
      (团队摘要: "The dropwizard instance running on display.uber-adsystem.com
      is unsecured, meaning any unauthenticated user can view and use it's admin
      tools. These tools expose sensitive information on Uber production servers,
      including the current threads running, info on the CPU, and more server info.")
      approach 同源：扫描框架默认管理面板端点（Dropwizard AdminServlet /
      Spring Actuator / Django debug / ELMAH）寻找未授权暴露的服务遥测与凭证。
  - url: "https://hackerone.com/reports/954818"
    title: "Default Creds Spring Boot Admin"
    author: "testingforbugs"
    platform: "8x8 (cloud8.8x8.com)"
    severity: "High (CVSS 7.5)"
    bounty: "无赏金"
    note: >
      no-content 公开。Spring Boot Admin 实例使用默认凭据暴露。
      (团队摘要: "An instance hosting Spring Boot Admin was left exposed
      with default credentials set.")
      approach 同源：扫描 Spring Boot 管理端点 + 尝试默认凭据访问。
      与 #1417635 同目标（8x8）不同报告者。
  - url: "https://hackerone.com/reports/241116"
    title: "Admin Salt Leakage on DoD site"
    author: "mr_r3boot"
    platform: "U.S. Dept Of Defense (ColdFusion)"
    severity: "Medium"
    note: >
      ColdFusion adminapi 的 administrator.cfc 组件的 getSalt 方法可被直接调用
      （GET /adminapi/administrator.cfc?method=getSalt），返回管理员认证用的 salt。
      结合 salt + 其他信息可用哈希破解工具暴力破解管理员密码。
      approach 同源：扫描框架默认管理 API 端点（ColdFusion adminapi /
      Spring Actuator / Django debug / ELMAH）寻找未授权暴露的敏感凭证数据。
