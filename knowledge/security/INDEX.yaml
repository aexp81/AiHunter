# 测试触发索引
# 作用：测试开始时加载此文件，根据发现的攻击面决定加载哪些 SPA 文件
# 规模：控制在 120 行以内，不放任何思维链，只做路由
#
# 使用方式：
# 1. 侦查阶段识别目标的攻击面类型
# 2. 查此索引找到对应 SPA 文件路径
# 3. 加载对应文件，按 observe→infer→question→verify→extend 逐步执行
# 4. 不允许跳过任何一步

version: "3.0"

# ============================================================
# 按攻击面类型触发（路径指向 spa/<domain>/<ID>）
# ============================================================
triggers:

  # 任何认证/登录接口
  auth_endpoint:
    - spa/auth/emptyCredentialAuthBypass
    - spa/auth/firstUserRegistrationRace

  # 文件操作（upload / download / file / attachment）
  file_operation: []

  # 带 ID 参数的接口（/api/resource/{id}）
  id_parameter: []

  # 接受 JSON body 的创建/更新接口
  json_mutation: []

  # 接受 URL 参数的功能（webhook / image_url）
  url_parameter: []

  # 富文本/Markdown 渲染
  rich_text: []

  # 分级共享资源（shared / permission / role）
  shared_resource: []

  # 本地/桌面/二进制提权
  local_binary: []

# ============================================================
# 白盒专用触发（有源码时额外加载）
# ============================================================
whitebox_triggers:

  auth_endpoint: []

  file_operation: []

  id_parameter: []

  json_mutation: []

  url_parameter: []

  rich_text: []

  local_binary: []
