id: DEFAULT_CREDENTIAL
name: "默认/弱凭证测试"
applicable: blackbox
category: auth
cwe: CWE-521

trigger:
  - "任何需要登录的系统，首次接触时必须执行"
  - "私有化部署的商业软件（运维平台、管理后台）"
  - "容器管理（Portainer）、监控（Grafana）等开源组件"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：系统类型是什么？（私有化部署 / 开源组件 / 自研系统）"
  - "问：尝试 admin:admin → 响应是什么？"
  - "问：尝试 admin:password → 响应是什么？"
  - "问：尝试 admin:admin123 → 响应是什么？"
  - "问：尝试 admin:123456 → 响应是什么？"
  - "问：尝试 admin:Password@1 / Admin@123 / Admin123 → 响应是什么？"
  - "问：如果是 Grafana，尝试 admin:admin → 响应是什么？"
  - "问：如果是 Portainer，检查 /api/system/status 是否显示 initialized:false？"
  - "如果未初始化 → 可直接 POST /api/users/admin 设置任意管理员密码"
  - "问：登录成功后，profile 接口是否返回明文密码字段？"
  - "问：is_original_password 类接口是否确认密码从未修改过？"
  - "如果明文密码返回 → 记录为敏感数据泄露（高危）"
