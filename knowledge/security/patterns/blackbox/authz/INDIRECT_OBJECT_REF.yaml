id: INDIRECT_OBJECT_REF
name: "间接对象引用：借自有资源引用他人对象"
applicable: blackbox
category: authz
cwe: CWE-639

trigger:
  - "资源可引用其他对象 ID（file_id / base_model_id / collection）"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：能否获取他人对象 ID？（从分享链接 / citation / 响应泄露）"
  - "问：把他人 file_id 附加到自己的 chat/folder，返回 200 吗？"
  - "如果 200：通过自有资源读取该文件内容，能否拿到他人数据？"
  - "问：通过自有资源对他人对象发起 remove/delete，是否删除了他人资源？"
  - "问：创建 wrapper model 设 base_model_id=受限模型，访问 wrapper 是否拿到受限数据？"
  - "验证：用受害者账户确认其文件被读取/删除，或受限模型数据经 wrapper 泄露"
