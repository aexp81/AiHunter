id: PERMISSION_LEVEL_CONFUSION
name: "只读身份执行写操作"
applicable: blackbox
category: authz
cwe: CWE-863

trigger:
  - "资源支持只读共享且有 pin/update/toggle 等操作"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：用只读账户 B 调 update/delete → 是否 403？（确认基线）"
  - "问：用只读账户 B 调 pin/unpin/save/toggle/restore → 是否仍 200？"
  - "如果 update 被拒但 pin/save 成功 → 读写权限错位"
  - "问：Socket.IO / WebSocket 协作事件用只读身份发送是否生效？"
  - "验证：操作后换资源所有者视角确认状态确实被改变"
