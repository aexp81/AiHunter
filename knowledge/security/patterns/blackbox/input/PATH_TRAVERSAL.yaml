id: PATH_TRAVERSAL
name: "文件上传路径穿越"
applicable: blackbox
category: input
cwe: CWE-22

trigger:
  - "发现文件上传功能"
  - "上传后可以访问文件（预览/下载）"
  - "文件 URL 包含文件名"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：正常上传 test.txt 后，响应里文件 URL/ID 是什么格式？（记录基准）"
  - "问：filename 改成 ../../tmp/pwned.txt，响应码是 200 还是 400？"
  - "问：filename 改成 ..%2f..%2ftmp%2fpwned.txt（URL 编码），响应是否不同？"
  - "问：filename 改成 ..%252f..%252ftmp%252fpwned.txt（双重编码），响应是否不同？"
  - "问：filename 改成 ....//....//tmp//pwned.txt，响应是否不同？"
  - "问：filename 改成 ..\\..\\tmp\\pwned.txt（Windows 反斜线），响应是否不同？"
  - "如果任一返回 200：问：能否从下载/预览接口读到穿越后的文件？"
  - "问：filename 传 null / 数组 / 整数，响应是否触发不同行为？"
  - "问：multipart 里同时传两个 filename 字段，服务端用哪个？"
  - "问：响应或错误信息里是否回显了完整路径？（路径泄露也是信息泄露）"
  - "如果穿越确认：问：能否写到 ~/.ssh/authorized_keys 或 web 根目录？"
