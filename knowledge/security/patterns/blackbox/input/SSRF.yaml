id: SSRF
name: "SSRF：服务端请求伪造"
applicable: blackbox
category: input
cwe: CWE-918

trigger:
  - "任何接受 URL 参数的功能：webhook / 头像 URL / 图片代理 / PDF 生成 / RAG 导入"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：提交带 Burp Collaborator 的公网 URL，是否收到服务端发起的 DNS/HTTP 请求？"
  - "如果收到 → 确认 SSRF 存在，进入绕过测试"
  - "问：直接提交 http://127.0.0.1 / http://169.254.169.254，是否被拦？"
  - "如果被拦：问：公网 302 重定向到 http://127.0.0.1（redirect-to?url=...），是否返回内网内容？"
  - "问：http://127.0.0.1\\@public.com（backslash 混淆）是否绕过？"
  - "问：http://[::1] / http://[::ffff:127.0.0.1]（IPv6）是否绕过？"
  - "问：http://100.64.0.1 / http://203.0.113.1（IANA 保留段）是否绕过？"
  - "如果在 GCP/AWS/Azure 环境：问：http://169.254.169.254/latest/meta-data/ 是否返回元数据？"
  - "如果元数据可读且在 GCP：问：实例属性里是否有 kube-env（含 K8s 私钥）？"
  - "问：http://file:///etc/passwd / http://gopher:// 等协议是否被接受？"
