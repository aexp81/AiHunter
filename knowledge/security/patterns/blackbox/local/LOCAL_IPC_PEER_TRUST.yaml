id: LOCAL_IPC_PEER_TRUST
name: "本地 IPC/socket/RPC 端点的调用方身份可伪造或抢占"
applicable: blackbox
category: local
cwe: CWE-287
# 覆盖 insight: SNAPD_AFUNIX_SOCKET_UID_INJECTION / LOCAL_PORT_PREBIND_RPC_IMPERSONATION /
#   PERMISSION_MODEL_CHANNEL_TYPE_COVERAGE_GAP(UDS 侧)

trigger:
  - "本地有以 root 运行的 daemon 监听 AF_UNIX socket / named pipe / localhost RPC 端口"
  - "端点用调用方身份（peer uid / Digest/Basic 认证）做授权决策"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：本地有哪些特权 socket/端口？（ss -xlnp、ls -l /run/*.socket；netstat -anp 看 localhost 监听）"
  - "问：普通用户能否连接？（socket 文件权限 SocketMode / 端口 >1024 任意用户可 bind）"
  - "问：端点暴露什么 API？（nc -U /run/x.socket 发 HTTP；对 localhost 端口直接发请求）"
  - "问：服务端如何认定我的身份？只认证 client→server（Digest/Basic）还是有双向/peercred 校验？"
  - "问：peer credential 是否经过'拼接成字符串再 split 解析'？分隔符(; , :)能否被 socket 文件名/remoteAddr 注入？（dirty_sock 类）"
  - "如果可注入 → 构造文件名含 ';uid=0;' 的 socket bind 后连接，测试是否拿到 root API"
  - "问：若仅认证客户端且无服务端身份校验 → 抢占同一端口冒充服务，捕获敏感操作（建账户/转账/令牌）"
  - "验证：用伪造/抢占身份调用高权限端点（create-user / install / 命令执行）确认成功"
