id: UNAUTH_ENDPOINT
name: "未认证端点检测"
applicable: blackbox
category: universal
cwe: CWE-306

trigger:
  - "任何已知的 API 路径，无条件执行此检查"
  - "每个接口在首次测试时必须先跑无 token 版本"

# 执行规则：对每个接口，在带 token 测试之前，先执行无 token 版本
reasoning_chain:
  - "问：去掉所有认证 header（Authorization / X-Auth-Token / Cookie），直接请求，响应是什么？"
  - "如果 200 → 问：响应内容是否包含敏感数据（用户信息/凭证/内部配置/系统状态）？"
  - "如果 200 + 敏感数据 → 未认证信息泄露，记录具体泄露内容"
  - "问：同一路径前缀下的邻近端点，是否有的需要认证有的不需要？（单点遗漏特征）"
  - "问：该端点是否触发昂贵计算（embedding / PDF / 图像处理）？"
  - "如果无认证 + 昂贵计算 → DoS/计费风险"
  - "问：不同 HTTP 方法（GET/POST/PUT/DELETE）的认证要求是否一致？"
  - "如果 GET 需要认证但 POST 不需要 → 方法级认证遗漏"

behavior_signals:
  high_value: "200 + 返回 token / password / secret / 内网地址 / 系统配置"
  medium_value: "200 + 返回版本信息 / 用户列表 / 许可证信息"
