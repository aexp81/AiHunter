id: PARAMETER_BINDING_EXPOSURE
name: "内部参数经框架自动绑定被外部可控"
applicable: both
category: input
cwe: CWE-915

trigger:
  - "路由处理器函数签名含非 body 参数（query/header/cookie）"
  - "参数名未出现在文档化 API 规范中（bypass_/internal_/base_/override_）"
  - "参数默认值为特权值（bypass=True / admin）"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，grep 命令必须实际运行，不允许跳过"
  - "问：路由处理器函数签名中是否存在非 body 参数？"
  - "白盒：grep -rn '@router\\.\\(post\\|get\\|put\\)' --include='*.py' -A 10 | grep 'bypass\\|base_model\\|admin\\|filter'"
  - "问：该参数是否在 API 文档 / OpenAPI spec 中定义？"
  - "白盒：grep -rn '<参数名>' docs/ openapi.json README.md"
  - "问：调用方是否只在内部递归时传该参数（如 bypass_filter=True）？"
  - "如果：参数在路由签名 + 未文档化 + 默认特权值 → 外部可经 query string 注入"
  - "验证：在请求追加 ?bypass_filter=true / ?base_model_id=X，观察响应从 403→200 或返回新数据"
