id: PRIVILEGED_FILE_OP_TOCTOU
name: "高权限文件操作的校验-使用竞态（源码审计）"
applicable: whitebox
category: local
cwe: CWE-367

trigger:
  - "审计 root/SYSTEM 进程对低权限可控路径做文件操作的代码"
  - "代码里有'先 stat/校验签名/检查路径，再 open/write/exec'的两段式逻辑"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，命令必须实际运行，不允许跳过"
  - "问：高权限进程对哪些路径做操作？这些路径是否在低权限用户拥有的目录下？"
  - "白盒：grep -rniE 'open\\(|fopen|CreateFile|chmod|chown|rename|unlink|extract' 找文件 sink，回溯路径来源"
  - "问：check 与 use 之间是否重新解析了路径？还是校验的是路径、使用的是同名但可被换掉的 inode？"
  - "白盒：grep -rniE 'realpath|canonicaliz|GetFinalPathName|lstat' 看是否做了规范化；对比校验对象与使用对象是否同一 fd"
  - "问：校验期间是否持有文件锁？"
  - "白盒：grep -rniE 'flock|fcntl.*F_SETLK|LockFile' 看 check→use 全程是否加锁"
  - "问：保护/监控服务拦截的操作清单里是否漏了 Rename/move/junction？"
  - "白盒：定位 minifilter/hook 注册的 IRP/操作类型，对照是否覆盖 FILE_RENAME / 目录联接"
  - "问：logrotate 配置是否缺 su 指令、是否用通配符（放大窗口）？"
  - "白盒：grep -rn 'su \\|create\\|\\*\\.log' /etc/logrotate.d/"
  - "如果：无锁 + 路径可被换 inode/符号链接 → TOCTOU 成立，构造 symlink/hardlink 竞态验证"
