id: SANDBOX_POLICY_COVERAGE_GAP
name: "沙箱/权限模型的 API 变体或通道覆盖盲区（源码审计）"
applicable: whitebox
category: local
cwe: CWE-862

trigger:
  - "审计带权限模型的运行时源码（Node Permission Model、Deno、自研沙箱）"
  - "策略在某一层做拦截，但同效果存在多个 API/路径/通道入口"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，命令必须实际运行，不允许跳过"
  - "问：权限检查的拦截点在哪一层？是否每个 sink 都经过它？"
  - "白盒：定位 permission.check / has() 调用点，grep -rn 'permission' src/ 看哪些 API 调用了、哪些没调用"
  - "问：path-based 与 fd-based 操作是否都被覆盖？fchmod/fchown/futimes/ftruncate 是否漏检？"
  - "白盒：grep -rniE 'fchmod|fchown|futimes|ftruncate|fdatasync' 对照其是否走权限检查分支"
  - "问：网络拦截是否只覆盖 TCP？UDS/named pipe/UDP/第三方库 socketPath 是否走同一检查路径？"
  - "白盒：grep -rniE 'socketPath|AF_UNIX|createConnection|pipe' 看是否绕过 net 权限层"
  - "问：路径规范化用的内置工具函数是 C++ 不可覆写还是 JS 可被用户覆写？覆写后检查是否失效？"
  - "白盒：看 normalize/resolve 是否在 JS 层定义、能否被 preload/模块加载顺序提前替换"
  - "问：路径形态假设是否完备？UNC(\\\\?\\)、//server/share、native binding 变体是否绕过前缀判断？"
  - "白盒：grep -rniE 'startsWith|path.resolve|toNamespacedPath' 看前缀比较是否覆盖所有形态"
  - "如果：任一 API/通道/路径形态未过检查 → 写 PoC 触达受限资源验证"
