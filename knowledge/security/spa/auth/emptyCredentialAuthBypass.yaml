id: emptyCredentialAuthBypass
name: "空凭据认证绕过"
applicable: both
domain: auth
severity: critical
priority: P1
accessRequired: unauthenticated
vulnRoot: "Auth endpoint accepts empty password without validation, backend grants session"

observe:
  - "Login page has LDAP / AD / domain account option"
  - "Error messages mention LDAP / Directory / bind"
  - "Auth endpoint has no rate limiting (unlike local auth)"
  - "Login uses client-side password hashing (SHA256/MD5 + timestamp) before submission"
  - "Auth endpoint accepts GET with query params for credentials"

infer:
  - "Assumes app validates password non-empty before auth → framework model accepts empty string by default"
  - "Assumes LDAP server rejects empty password → RFC 4513 §5.1.2: empty = Unauthenticated Bind"
  - "Assumes client-side hashing provides security → omitting hash params may bypass validation entirely"

question:
  - target: "Does app validate password non-empty before auth"
    method: "Submit password='' or omit password, check for valid token"
    priority: high
    effort: low
  - target: "Does omitting client-side hash parameters change server behavior"
    method: "Send request without timestamp/hash fields that client normally includes"
    priority: high
    effort: low

verify:
  blackbox:
    - action: "POST/GET auth endpoint with password=''"
      onMatch: "401 or error → non-empty validation exists"
      onMismatch: "Returns token → auth bypass confirmed"
    - action: "Omit password field entirely"
      onMatch: "400 field missing → framework-level required"
      onMismatch: "Returns token → same bypass"
    - action: "If client-side hashing exists: send without hash/timestamp params"
      onMatch: "Error → server requires hash"
      onMismatch: "Returns token → hash validation is client-side only"
    - action: "Try password: null / '%00' / ' '"
      onMatch: "Rejected → only empty string works"
      onMismatch: "Returns token → broader null-value bypass"
  whitebox:
    grepTargets:
      - grep: "ldap|simple_bind|bind_s|ldap3"
        reviewPoint: "LDAP init and bind call site"
      - grep: "if not password|len(password)|password == ''|min_length"
        reviewPoint: "Any non-empty validation before bind/auth"
      - grep: "class.*Form.*password.*str"
        reviewPoint: "Model — does password field have min_length?"
    codeReviewFocus: "Trace password from form/query → handler → auth call; check if any validation in between"

extend:
  - check: "Other auth endpoints (OAuth/SAML/SSO) also missing empty credential validation"
    reasoning: "(derived: multi-path inconsistency)"
  - check: "Same app's other security-critical string fields with no min_length — API keys, tokens, codes"
    reasoning: "(derived: framework model accepts empty by default)"
  - check: "Client-side hashing — what other validations are client-only"
    reasoning: "(derived: if timestamp can be omitted to bypass, other client controls may too)"
  - check: "Auth endpoint rate limiting vs other auth endpoints"
    reasoning: "(source: LDAP endpoint had no rate limiting unlike local auth)"

evidence:
  - id: CVE-2026-44551
    source: "https://github.com/open-webui/open-webui/security/advisories/GHSA-2r4p-jpmg-48f4"
    product: "Open WebUI <= 0.8.12"
    rootCause: "LdapForm no min_length on password; empty string reaches bind(); success per RFC 4513 §5.1.2"
    fix: "Patched >= 0.9.0 (added non-empty check before bind)"
    learned: "Pydantic str accepts empty by default; LDAP endpoint lacked rate limiting"
  - id: FT-20260625-001
    source: "47.98.53.122 (DJI FlightHub 2)"
    product: "DJI FlightHub 2 v17.2.5-pro-0617"
    rootCause: "GET /manage/api/v1/account-auth?account=admin&password= without timespan returns valid token; server skips hash verification when timestamp omitted"
    fix: "unknown"
    learned: "Non-LDAP system same pattern; client-side SHA256+timestamp hash bypassed by omitting timestamp"
