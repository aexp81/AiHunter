# Open WebUI 漏洞挖掘模式库 - 白盒代码审计版
# 从 30+ 真实 CVE 中提炼，适用于有源码访问权限的代码审计场景

version: "1.0-whitebox"
source: "Open WebUI GitHub Advisory 2024-2026"
target_scenario: "代码审计 / 内部安全评估 / SDL 安全审查"
assumption: "有完整源码访问权限，通过代码逻辑分析定位漏洞"

# ============================================================
# 白盒审计工具链
# ============================================================
whitebox_tools:
  static_analysis:
    - tool: "Semgrep"
      usage: "规则化漏洞检测，可自定义规则"
      example: "semgrep --config=auto ."
    - tool: "CodeQL"
      usage: "数据流分析，追踪污点传播"
      example: "codeql database analyze"
    - tool: "Bandit (Python)"
      usage: "Python 代码安全扫描"
    - tool: "gosec (Go)"
      usage: "Go 代码安全扫描"

  manual_review_patterns:
    file_operations:
      - "grep -r 'open(' --include='*.py'"
      - "grep -r 'shutil.copy' --include='*.py'"
      - "grep -r 'os.path.join' --include='*.py'"

    auth_bypass:
      - "grep -r 'ldap.simple_bind' --include='*.py'"
      - "grep -r 'password.*=.*None' --include='*.py'"
      - "grep -r '@login_required' -A 5 --include='*.py'"

    permission_checks:
      - "grep -r 'current_user' -B 3 -A 3 --include='*.py'"
      - "grep -r 'owner_id\\|user_id' --include='*.py'"
      - "grep -r 'DELETE\\|PUT\\|PATCH' --include='*.py' | grep -v 'permission\\|check\\|owner'"

    dangerous_functions:
      - "grep -r 'eval(' --include='*.py'"
      - "grep -r 'exec(' --include='*.py'"
      - "grep -r 'pickle.loads' --include='*.py'"
      - "grep -r 'yaml.load' --include='*.py' | grep -v 'safe_load'"

  git_forensics:
    - "git log --all --grep='security\\|fix\\|vuln\\|race' --oneline"
    - "git log -p --all -S 'password' --since='1 year ago'"
    - "git blame -L <start>,<end> <file>  # 追踪代码历史"
    - "git diff <commit1> <commit2> -- '*.py'  # 对比版本差异"

# ============================================================
# 模式 1: 用户可控字符串 → 文件系统操作
# ============================================================
patterns:
  - name: "用户可控路径直接用于文件操作"
    id: "PATH_TRAVERSAL_FILE_OP"
    cwe: "CWE-22"
    severity: "Critical"

    trigger:
      - "看到文件上传 API"
      - "看到文件下载 API"
      - "任何接受 filename / filepath / path 参数的接口"
      - "代码中有 open(user_input, ...) / shutil.copy(user_input, ...)"

    attacker_mindset: |
      我控制了文件名，那它写入哪里？
      → 检查：路径是字符串拼接 还是 安全 API（如 pathlib.resolve）
      → 检查：有没有 basename() / 白名单过滤 / 路径规范化
      → 没有？尝试 ../../ 穿越

    reasoning_chain:
      - "问：上传的文件最终存储在服务器什么位置？(追踪数据流)"
      - "问：存储路径是完全硬编码，还是包含了用户可控输入（如 filename）？"
      - "问：如果包含用户输入，拼接方式是什么？(f-string / os.path.join / pathlib)"
      - "问：拼接前有没有路径规范化？检查点："
      - "  - os.path.basename() 提取纯文件名？"
      - "  - pathlib.Path().resolve() + 边界检查？"
      - "  - os.path.abspath() + startswith(BASE_DIR) 验证？"
      - "如果答案是：用户输入参与 + 字符串拼接 + 无规范化 → 漏洞存在"
      - "构造 payload: ../../tmp/pwned.txt 验证是否穿越成功"
      - "问：若用了 startswith 做边界检查，base 末尾是否带 os.sep？"
      - "白盒：grep -rn 'startswith' --include='*.py' | grep -iE 'abspath|dir|path'"
      - "如果 startswith(BASE) 缺 trailing os.sep → sibling-prefix 绕过（/cache 放行 /cache_evil）"
      - "问：扩展名/路径段是否用 filename.split('.')[-1] 提取而未过滤 '/'？"
      - "白盒：grep -rn \"split('\\\\.')\\[-1\\]\\|split(\\\".\\\")\\[-1\\]\" --include='*.py'"
      - "如果命中：filename 含 / 可注入路径段（绕过 basename 的另一 sink）"

    access_required: "已认证用户（需要上传权限）"

    prerequisite:
      - "目标存在文件上传功能"
      - "Web 服务进程有写入权限（否则穿越也写不进去）"

    practical_notes:
      - "Windows 环境用 ..\\..\\，Linux/Mac 用 ../../"
      - "某些框架会自动 basename，测试前先确认"
      - "即使有 basename，也要测试双重编码：%2e%2e%2f"
      - "写入位置选择：/tmp（测试用）、~/.ssh/authorized_keys（持久化）、/var/www/html（webshell）"
      - "startswith 边界检查 off-by-one：'看似有校验'比'无校验'更隐蔽，必须验证校验的精确语义"
      - "httpx/浏览器客户端会规范化 ..，测 sibling-prefix 类要用 raw HTTP / ASGI 投递 payload"

    verify:
      - "curl -H 'Authorization: Bearer TOKEN' -F 'file=@/tmp/test.txt;filename=../../tmp/pwned.txt' http://target/rag/api/v1/doc"
      - "确认 /tmp/pwned.txt 出现在服务器上"
      - "sibling-prefix：base 名为 cache 时发 /cache/../cache_backup/x，看 200/404"

    vuln_root: "信任了用户提供的文件名，没有在 I/O 操作前规范化路径（或规范化逻辑边界有缺陷）"

    transferable_to:
      - "任何 Web 应用的文件上传接口"
      - "文件下载接口中的 path 参数"
      - "日志写入路径中包含用户输入"
      - "任何 open(user_input) 的代码路径"
      - "ZIP/TAR 解压（Zip Slip 变种）"
      - "任何用 startswith 做路径/前缀边界检查的场景"

    cases:
      - cve: "CVE-2026-44566"
        ghsa: "GHSA-9pgh-j74g-qj6m"
        note: "Open WebUI /rag/api/v1/doc，KoreLogic 发现，PoC 公开"
        affected_version: "<= 0.1.123"
      - cve: "CVE-2026-54014"
        note: "startswith 缺 trailing os.sep，sibling-prefix 绕过读 /cache_x"
      - cve: "CVE-2026-44565"
        note: "upload filename 直接拼接无 basename，任意写/删 (KoreLogic)"
      - cve: "CVE-2026-28786"
        note: "扩展名 split('.')[-1] 含 / 注入路径，错误回显泄露 DATA_DIR"

  # ============================================================
  # 模式 2: 局部修复未同步到所有代码路径（Fix Inconsistency）
  # ============================================================
  - name: "局部安全修复未覆盖所有等效代码路径"
    id: "FIX_INCONSISTENCY"
    applicable: "whitebox"
    cwe: "CWE-269 + CWE-362"
    severity: "High"

    trigger:
      - "代码中看到安全相关注释（'avoid race', 'prevent bypass', 'security fix'）"
      - "某个功能有多条执行路径（如 email注册/LDAP/OAuth/SSO 并存）"
      - "Changelog/commit 中有安全修复，但只改了一处"
      - "不同版本的相似功能实现不一致"

    attacker_mindset: |
      开发者在注释里说"已修复 X 漏洞"，证明他知道这类问题存在。
      → 搜索相同功能的其他入口点：是否都同步了这个修复？
      → 如果没有，那些未同步的路径就是漏洞点。

    reasoning_chain:
      - "问：代码中有没有安全相关注释或修复标记？(grep 'security', 'race', 'fix', 'bypass', 'prevent')"
      - "问：这个注释/修复针对的是什么功能点？(如：首次用户分配 admin)"
      - "问：实现同一功能的入口点有几个？(如：email注册 / LDAP / OAuth / SSO / API)"
      - "问：每个入口点都有相同的防护措施吗？逐一对比实现"
      - "如果发现某个入口缺少相同的防护 → 该入口存在未修复的同类漏洞"
      - "验证：使用未防护的入口重现已知漏洞"

    access_required: "未认证（首次用户注册场景）或低权限用户"

    prerequisite:
      - "必须能访问源代码或 commit 历史（本模式核心依赖阅读代码注释/changelog，纯黑盒不适用）"
      - "系统存在多个等效入口（如 LDAP/OAuth 并存的认证）"

    practical_notes:
      - "git blame 和 git log 是发现局部修复的最快方式，先于读代码"
      - "竞态验证工具：Turbo Intruder（Burp）/ ffuf 并发请求"
      - "不只是认证：密码重置、邮件验证、激活码等都有多路径问题"
      - "白盒定位漏洞后，验证阶段可退化为黑盒（用未修复入口重放攻击）"

    verify:
      - "部署全新实例（无用户）"
      - "并发发送多个 LDAP/OAuth 认证请求"
      - "检查数据库：是否有多个 admin 用户"

    vuln_root: "安全修复只应用到部分代码路径，相同逻辑的其他路径未同步"

    transferable_to:
      - "多种登录方式并存的系统（SAML + LDAP + 本地账号）"
      - "新旧 API 版本共存（/api/v1 修了，/api/v2 没修）"
      - "移动端 + Web 端共享后端，但逻辑不一致"
      - "微服务架构中，某个服务修了但其他服务没修"

    cases:
      - cve: "CVE-2026-45675"
        ghsa: "GHSA-h3ww-q6xx-w7x3"
        note: "Open WebUI LDAP/OAuth，signup 已修但其他路径未同步"
        affected_version: "<= 0.8.12"
      - cve: "CVE-2026-44567"
        note: "部分端点用 get_current_user（只验 JWT）而非 get_verified_user（验 role!=pending），依赖用错导致 pending 用户绕过"

  # ============================================================
  # 模式 3: LDAP 空密码认证绕过
  # ============================================================
  - name: "LDAP Simple Bind 空密码匿名绑定"
    id: "LDAP_NULL_PASSWORD"
    cwe: "CWE-287"
    severity: "Critical"

    trigger:
      - "目标启用了 LDAP 认证"
      - "使用 Simple Bind 方式（而非 SASL）"
      - "登录表单未强制校验密码非空"

    attacker_mindset: |
      LDAP Simple Bind 有一个协议级特性：空密码 = Unauthenticated Bind。
      → 是否生效取决于服务器配置（OpenLDAP 2.5+ / AD 2019+ 默认拒绝，旧版或宽松配置可能允许）
      → 应用层如果没在传入 LDAP 前校验密码非空，就会把这个判断完全交给服务器。
      → 尝试：任意有效用户名 + 空密码

    reasoning_chain:
      - "问：目标是否使用 LDAP 认证？(检查登录表单或配置文件)"
      - "问：LDAP 使用 Simple Bind 还是 SASL？(Simple Bind 才有此问题)"
      - "问：应用在调用 LDAP bind 前是否验证了密码非空？"
      - "  - 检查：password != '' / len(password) > 0 / required 验证"
      - "问：目标 LDAP 服务器是否允许 Unauthenticated Bind？"
      - "如果：未校验密码 + 服务器允许 Unauthenticated Bind → 认证绕过"
      - "验证：提交空密码，观察是否登录成功"

    access_required: "未认证（公开登录页面）"

    prerequisite:
      - "目标 LDAP 服务器允许 Unauthenticated Bind（OpenLDAP 2.5+ 默认拒绝，AD Windows Server 2019+ 默认拒绝，需确认目标版本和配置）"
      - "应用使用 Simple Bind（ldap.simple_bind_s / ldap3 simple bind）"
      - "注意：Unauthenticated Bind ≠ 匿名绑定，是 RFC 4513 §5.1.2 规定的特殊行为"

    technical_details:
      rfc_reference: "RFC 4513 Section 5.1.2 - Unauthenticated Authentication Mechanism"
      mechanism: |
        - DN 非空 + password 空 → Unauthenticated Bind (resultCode=0)
        - DN 空 + password 空 → 匿名绑定 (另一个变种)
        - LDAP 服务器返回 success 不代表用户被认证，只是 bind 操作成功
        - 应用如果只检查 resultCode==0 就放行，即存在漏洞

    variants:
      - attack: "空密码 Unauthenticated Bind"
        condition: "DN 非空，password 为空字符串"
      - attack: "匿名绑定"
        condition: "DN 和 password 都为空"
      - attack: "空格密码"
        condition: "某些实现将纯空格也视为空密码"

    practical_notes:
      - "测试时用 Burp 直接删除 password 字段或设为空字符串"
      - "有些前端会阻止空密码提交，抓包绕过前端验证"
      - "AD 默认配置可能禁用了 Unauthenticated Bind，OpenLDAP 默认允许"
      - "Python python-ldap / Go ldap / Java JNDI 都受影响"

    verify:
      - "尝试登录：任意有效用户名，密码留空"
      - "或用 Burp 将 password 字段置空发送"

    vuln_root: "没有在 LDAP bind 操作前验证密码非空，触发了 LDAP 协议的匿名绑定特性"

    transferable_to:
      - "所有使用 LDAP Simple Bind 认证的 Web 应用"
      - "任何调用 ldap.simple_bind_s() 但未预校验的代码"

    cases:
      - cve: "CVE-2026-44551"
        ghsa: "GHSA-2r4p-jpmg-48f4"
        note: "Open WebUI LDAP 认证模块，空密码触发匿名绑定"
        affected_version: "<= 0.8.12"

  # ============================================================
  # 模式 4: 第三方库安全配置过于宽松
  # ============================================================
  - name: "第三方渲染库的宽松安全配置"
    id: "THIRD_PARTY_LOOSE_CONFIG"
    cwe: "CWE-1188 / CWE-79"
    severity: "High"

    trigger:
      - "应用使用富文本渲染（Markdown/Mermaid/MathJax）"
      - "用户输入会被直接送入第三方渲染库"
      - "看到 marked.js / mermaid.js / highlight.js 等库的初始化配置"
      - "库的 securityLevel / sanitize / allowHtml 等选项设置不当"

    attacker_mindset: |
      Mermaid/Markdown 渲染器默认的安全级别是什么？
      → 如果配置为 securityLevel: 'loose' / allowHtml: true，意味着允许注入
      → 查看初始化代码中是否启用了严格模式
      → 没有？尝试在图表/Markdown 中嵌入 <script> 或 onclick

    reasoning_chain:
      - "问：应用前端使用了哪些富文本渲染库？"
      - "白盒：grep -r 'mermaid.initialize\\|marked\\|KaTeX' --include='*.js' --include='*.jsx' --include='*.ts'"
      - "问：库的初始化配置在哪？参数是什么？"
      - "白盒：定位到初始化代码（如 mermaid.initialize({ ... })），查看 securityLevel / allowHtml / sanitize 等选项"
      - "问：配置是否为宽松模式？"
      - "  Mermaid: securityLevel === 'loose'？(默认 'strict')"
      - "  Markdown: allowHtml === true / sanitize === false？"
      - "  KaTeX: trust === true？"
      - "如果是宽松模式且用户输入会被渲染 → 存储型 XSS 风险"
      - "问：渲染前是否有额外清理层（如 DOMPurify）？"
      - "白盒：grep -r 'DOMPurify\\|sanitizeHtml' --include='*.js'"
      - "如果无清理 → 漏洞确认，构造 payload 验证"

    verify:
      - "在聊天消息或文档中插入 Mermaid 代码块，嵌入 JavaScript"
      - "以其他用户身份查看，观察是否执行脚本"

    access_required: "已认证用户（能发布内容的权限）"

    prerequisite:
      - "应用使用了第三方渲染库（Mermaid/Markdown/KaTeX）"
      - "用户输入会被送入渲染库"
      - "渲染库配置为宽松模式（securityLevel: loose / allowHtml: true）"

    practical_notes:
      - "先检查前端引入的库版本和初始化配置"
      - "Mermaid 的 loose 模式允许 click 回调和内联 HTML"
      - "Markdown 的 allowHtml: true 允许任意 HTML 标签"
      - "测试不只是 <script>，试试 onclick / onerror / <svg> 等事件处理"

    vuln_root: "第三方渲染库配置为宽松模式，未启用内置的安全限制"

    transferable_to:
      - "所有使用 Mermaid / PlantUML / KaTeX 的应用"
      - "Markdown 渲染器未配置 DOMPurify 清理"
      - "Jupyter Notebook / Notion 类工具的富文本渲染"
      - "WYSIWYG 编辑器未限制 HTML 标签"

    cases:
      - cve: "CVE-2026-54011"
        ghsa: "GHSA-v8qj-hxv7-mgvv"
        note: "Open WebUI Mermaid 图表渲染，securityLevel: loose 导致 XSS"
      - cve: "CVE-2025-64495"
        note: "'Insert Prompt as Rich Text' 开启时 prompt body 经 marked 后直赋 innerHTML 无 sanitize"
      - cve: "CVE-2025-46719"
        note: "MarkdownTokens.svelte 对特定 iframe src 前缀 token 走 {@html} 白名单逃逸"
      - cve: "CVE-2024-8017"
        note: "HTML tooltip 构造函数注入 (<=0.3.8)"
        affected_version: "<= 0.8.12"
      - cve: "CVE-2026-44549"
        ghsa: "GHSA-jwf8-pv5p-vhmc"
        note: "Excel 文件预览，单元格内容未转义直接渲染"

  # ============================================================
  # 模式 5: 权限检查缺失或不完整
  # ============================================================
  - name: "资源操作缺少所有权验证"
    id: "MISSING_OWNERSHIP_CHECK"
    cwe: "CWE-639 / CWE-862"
    severity: "High"

    trigger:
      - "看到 /api/xxx/{id} 格式的 API，接受对象 ID"
      - "操作资源（读取/修改/删除）时只验证登录，不验证所有权"
      - "没有 user_id == resource.owner_id 的检查"

    attacker_mindset: |
      这个 API 接受一个 ID，它会检查这个资源是不是我的吗？
      → 抓包改 ID，尝试访问其他用户的资源
      → 如果能成功，说明缺少所有权检查（IDOR）

    reasoning_chain:
      - "问：API 端点接受对象 ID 参数？(路径参数 /{id} 或 query ?id=)"
      - "问：这个操作是读取、修改还是删除？(DELETE/PUT 比 GET 危害更大)"
      - "问：后端代码是先查数据库，还是直接按 ID 操作？"
      - "  - 安全: db.get(id, user=current_user) 带所有权过滤"
      - "  - 不安全: db.get(id) 不带所有权过滤"
      - "如果不带所有权过滤 → IDOR 存在"
      - "验证：用账户 B 的 token + 账户 A 的资源 ID，发起请求"

    access_required: "低权限认证用户（测试横向）/ 任意账户（测试纵向）"

    prerequisite:
      - "能注册至少两个账户（横向 IDOR）"
      - "或能访问到其他用户资源的 ID"

    practical_notes:
      id_discovery:
        - "注册两个账户，A 创建资源，用 B 的 token 访问 A 的资源 ID"
        - "通过 API 响应中泄露的其他用户 ID（列表接口、共享内容）"
        - "UUID 不代表安全，只要能获取到 ID 就能测"
        - "先测 GET（确认 ID 存在），再测 DELETE/PUT（实际危害）"
      vertical_idor:
        - "用普通用户 token 访问 /api/admin/{id} 类管理接口"
        - "修改请求中的 role/permission 字段（如果没有服务端验证）"
        - "访问 /api/user/{other_user_id} 读取他人个人信息"
      common_mistakes:
        - "只测了主资源，没测子资源（/api/chat/{id}/messages）"
        - "只测了 GET，没测 DELETE / PUT / PATCH"
        - "只测了数字 ID，没测 UUID（UUID 同样可以枚举如果能获取到）"
        - "只测了横向（用户间），没测纵向（权限提升）"

    vuln_root: "资源操作只验证了用户已登录，未验证用户对该资源的所有权"

    transferable_to:
      - "所有 RESTful API 的资源操作"
      - "对象存储中的文件删除（S3 key 可被枚举）"
      - "多租户 SaaS 应用的跨租户访问"

    cases:
      - note: "Open WebUI 中大量 API 存在此类问题（批量学习 2026-06-19 新增以下确认案例）"
        pattern: "delete_chat / update_prompt / delete_file 等均缺少所有权检查"
      - cve: "CVE-2026-45301"
        note: "全部 /files/ 端点仅 get_verified_user，可列/读/删全实例文件"
      - cve: "CVE-2026-28788"
        note: "process/files/batch 内部 helper 暴露为路由，任意覆写+RAG投毒"
      - cve: "CVE-2026-45666"
        note: "notes {id} 端点枚举 UUID 读他人笔记"
      - cve: "CVE-2026-44570"
        note: "memories API 跨用户查/删/恢复并回显内容"
      - cve: "CVE-2026-45345"
        note: "models update?id= 改他人 private 模型（含 access_control 提权）"
      - cve: "CVE-2026-45349"
        note: "chat/completions 用他人 chat_id 继续他人对话"
      - cve: "CVE-2026-44554"
        note: "process/web overwrite 默认 True 删除替换他人 KB"
      - cve: "CVE-2026-45399 / CVE-2025-63681"
