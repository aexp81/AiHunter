# 认证接口参数完整性测试
# 来源：2026-06-24 实测发现（account-auth 接口，只传 account 不传 password 直接绕过）
# 核心价值：打破 AI 被前端代码/文档锚定参数列表的执行框架

id: AUTH_PARAM_COMPLETENESS
name: "认证接口参数完整性测试"
applicable: blackbox
category: auth

# 触发条件：遇到任何认证接口时无条件执行，不依赖接口特征判断
trigger:
  - "任何需要账号+密码的登录/认证接口"
  - "任何带辅助参数（timespan/nonce/token/code）的认证接口"
  - "任何 OAuth / SSO / 本地账号认证流程的接口"

# ================================================================
# 执行规则（强制）：
# 以下每条必须逐一执行，不允许因为"已经理解了这个接口"而跳过任何一条
# 特别注意：即使前端JS/文档告诉你需要N个参数，仍然必须测试"少于N个参数"的场景
# ================================================================
reasoning_chain:

  # --- 基准建立 ---
  - "问：这个接口正常需要哪些参数？记录完整参数列表作为基准（不要假设，要实测）"
  - "问：正常请求返回什么？（记录成功响应的 code / token / redirect_url 作为对比基准）"

  # --- 逐个去掉参数（最重要，今天漏洞的根因）---
  - "问：只传 account/username，完全不传 password 字段，响应是什么？"
  - "问：只传 password，完全不传 account/username 字段，响应是什么？"
  - "问：只传辅助参数（timespan/nonce），不传 account 和 password，响应是什么？"
  - "问：完全不传任何参数，响应是什么？"
  - "如果任一变体返回 200 或有效 token → 认证绕过，立即验证 token 权限级别"

  # --- 参数值变体（空/null/特殊类型）---
  - "问：password 字段传空字符串 \"\"，响应是什么？"
  - "问：password 字段传 null（JSON null），响应是什么？"
  - "问：password 字段传空字节 %00，响应是什么？"
  - "问：password 字段传空格 \" \"，响应是什么？"
  - "问：password 字段传数组 []，响应是什么？"
  - "问：password 字段传对象 {}，响应是什么？"
  - "如果任一变体绕过校验 → 后端对该类型做了 falsy 判断而非严格 string 非空校验"

  # --- 辅助参数变体（针对带 timespan/nonce 的接口）---
  - "问：timespan/nonce 传极大值（9999999999999）或极小值（0/1），响应是否不同？"
  - "问：timespan/nonce 不传，只传 account+password，响应是什么？"
  - "问：timespan/nonce 传已使用过的旧值（重放），响应是什么？"

  # --- HTTP 方法变体 ---
  - "问：接口是 POST，换 GET 传参（?account=x&password=y），响应是什么？"
  - "问：接口是 GET，换 POST 传 body，响应是什么？"
  - "如果方法切换后行为不同 → 可能存在认证逻辑不一致"

  # --- 参数名变体 ---
  - "问：参数名换大小写（Password/PASSWORD/ACCOUNT），服务端是否接受？"
  - "问：account 换成 username/email/user，响应是否不同？"

  # --- HTTP 参数污染 ---
  - "问：同时传两个 password 字段（一个合法一个空），服务端用哪个？"
  - "问：同时传两个 account 字段，服务端用哪个？"

  # --- 验证阶段 ---
  - "如果发现任何绕过：问：返回的 token 能访问哪些接口？权限级别是什么？"
  - "问：用返回的 token 访问最高权限接口（/admin/users 或 /organizations），是否成功？"
