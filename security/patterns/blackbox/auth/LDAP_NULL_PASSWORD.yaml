id: LDAP_NULL_PASSWORD
name: "认证接口空密码/缺失密码绕过"
applicable: blackbox
category: auth
cwe: CWE-287

trigger:
  - "登录页面有 LDAP / AD / 域认证选项"
  - "登录表单提示企业账户登录"
  - "错误信息提到 LDAP / Directory"
  - "任何本地账号登录接口（与 AUTH_PARAM_COMPLETENESS 配合使用）"

# 执行规则：以下每条必须逐一执行，不允许跳过
reasoning_chain:
  - "问：登录请求的字段格式是什么？（JSON 还是 form-encoded）"
  - "问：前端是否阻止空密码提交？（如阻止需直接打 API 绕过前端校验）"
  - "问：POST {account: 'admin', password: ''} → 响应是 token 还是错误？"
  - "问：POST {account: 'admin'} 省略 password 字段 → 响应是什么？"
  - "问：POST {account: 'admin', password: null} → 响应是什么？"
  - "问：POST {account: 'admin', password: '%00'} 空字节 → 响应是什么？"
  - "问：POST {account: 'admin', password: ' '} 空格 → 响应是什么？"
  - "如果任一返回有效 token → 认证绕过确认，验证 token 权限"
  - "如果返回 'Password cannot be empty' → 有非空校验，此路不通"
  - "如果返回 'LDAP bind failed' → 服务器端拒绝了 Unauthenticated Bind"
  - "问：不同账号名（存在 vs 不存在）的错误消息是否不同？（用户枚举）"
  - "如果错误消息区分账号存在/不存在 → 记录用户枚举漏洞"

behavior_signals:
  bypass_confirmed: "返回有效 JWT / session cookie / redirect_url 含 token"
  not_vulnerable: "返回 Password cannot be empty / Invalid credentials / LDAP bind failed"
