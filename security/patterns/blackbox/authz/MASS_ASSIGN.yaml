id: MASS_ASSIGN
name: "Mass Assignment：请求体注入敏感字段"
applicable: blackbox
category: authz
cwe: CWE-915

trigger:
  - "任何 create/update 端点接收 JSON 对象"
  - "注册/创建账号接口"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：正常 create 请求的响应体里有哪些字段？（记录 user_id/id/role/status 等）"
  - "问：注入 \"role\":\"admin\" 或 \"is_admin\":true，响应里 role 是否变成注入值？"
  - "问：注入 \"user_id\":\"<他人UUID>\"，响应里 user_id 是否变成注入值？"
  - "如果变成注入值 → Mass Assignment 成立"
  - "问：还能注入哪些敏感字段？逐个试 id / role / is_admin / status / org_id / owner_id"
  - "问：前端 JS 里是否有角色↔ID 的映射表？（搜 role/owner/admin/type）"
  - "如果前端有映射 → 用管理员对应的 ID 值注入注册请求，检查新账号权限"
  - "问：注入后用新账号访问之前 403 的接口，是否变成 200？"
