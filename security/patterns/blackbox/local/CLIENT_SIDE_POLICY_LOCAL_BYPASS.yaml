id: CLIENT_SIDE_POLICY_LOCAL_BYPASS
name: "客户端侧强制的桌面/VPN/AV 策略被本地手段旁路"
applicable: blackbox
category: local
cwe: CWE-602
# 覆盖 insight: CLIENT_CLI_BYPASS_LOCKED_DESKTOP_POLICY / BROWSER_EXTENSION_SHARED_CONTEXT_NATIVE_METHOD_HOOK_HIJACK

trigger:
  - "端点安全产品（VPN/WARP/EDR/AV）或浏览器扩展把策略强制放在客户端"
  - "管理员启用了 Lock/强制连接/锁定模式，但本地仍有 CLI/配置/扩展可达"

# 执行规则：以下每条必须逐一执行
reasoning_chain:
  - "问：客户端有哪些本地接口？（CLI 子命令、配置文件、注册表/plist、环境变量、扩展消息接口）"
  - "问：非管理员能否调用这些接口？有没有 trust/exclude/whitelist/disconnect 类命令？"
  - "问：管理员锁定策略时，这些本地接口是否被同等限制？还是只锁了 GUI？"
  - "如果未同等限制 → 执行该命令/改该配置后，客户端是否断开或切到非保护模式？"
  - "问（浏览器扩展）：内容脚本是否跑在与页面共享的 JS 上下文（非 isolated world）？"
  - "问：扩展是否保护了它用到的所有原生方法？遗漏 indexOf/push/toString 等可被页面 hook 劫持其特权命令接口"
  - "验证：确认策略不再执行（Zero Trust 失效 / 扩展特权命令被页面触发）"
