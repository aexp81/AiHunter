id: WRITABLE_LOAD_PATH_HIJACK
name: "高权限进程的加载路径落在低权限可写目录"
applicable: blackbox
category: local
cwe: CWE-427
# 覆盖 insight: DLL_SEARCH_ORDER_HIJACK / UNQUOTED_SERVICE_PATH_EXE_HIJACK /
#   MSI_REPAIR_DLL_HIJACK / OPENSSL_HARDCODED_CONFDIR / PKG_SERVICE_FILE_WORLD_WRITABLE / XPC_TEAMID_DYLIB

trigger:
  - "有本地低权限 shell，目标主机上跑着以 SYSTEM/root 运行的第三方服务或安装器"
  - "目标进程加载 DLL/so/dylib/配置/引擎等外部文件"

# 执行规则：以下每条必须逐一执行，不允许因为"看起来路径在系统目录"而跳过
reasoning_chain:
  - "问：哪些进程以 SYSTEM/root 运行？（Windows: tasklist /v；Linux: ps -eo user,cmd | grep root）"
  - "问：它们加载文件时去哪些路径找？（Windows ProcMon 过滤 CreateFile + result=NAME NOT FOUND；Linux strace -f -e openat 看 ENOENT）"
  - "问：这些搜索路径里有没有当前用户可写的目录？（Windows: icacls 看 (M)/(W)/(F)；Linux: find <dir> -writable / ls -ld）"
  - "问：Windows 服务 ImagePath 是否未加引号且含空格？（sc qc <svc> 看 BINARY_PATH_NAME，截断点 C:\\Program 处能否写）"
  - "问：进程对加载的文件是否校验签名？（替换后看是否仍被加载，不校验才可利用）"
  - "如果命中可写目录且优先级不低于真实文件 → 放置同名恶意 DLL/EXE/配置 → 等待启动/定时/修复(msiexec /fa)/重启触发"
  - "如果是 OpenSSL 类硬编码 confdir（如 c:\\usr\\local\\ssl）→ 低权限创建该目录植入 openssl.cnf 指定恶意 Engine"
  - "验证：触发加载后确认代码以高权限执行（whoami 落地高权限 token / 文件以 root 落盘）"
