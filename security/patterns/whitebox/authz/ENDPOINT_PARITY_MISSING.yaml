id: ENDPOINT_PARITY_MISSING
name: "端点对等性缺失：同资源不同操作端点权限检查不一致"
applicable: both
category: authz
cwe: CWE-862

trigger:
  - "资源有多个变更端点（create / update / import / clone / responses / passthrough）"
  - "create 端点有 workspace.* 或所有权检查，其他端点缺失"
  - "import / alternate 端点假设'只有管理员调用'但实际授权给普通用户"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，grep 命令必须实际运行，不允许跳过"
  - "问：该资源类型有哪些变更端点？"
  - "白盒：grep -rn '@router.post.*<resource>' --include='*.py' | grep -E '(create|update|import|clone|duplicate|responses)'"
  - "问：每个端点的权限检查（Depends 链 + 显式 has_permission）是否一致？"
  - "白盒：对每个端点 grep -B5 -A15 '<endpoint_func>' | grep 'workspace\\.\\|has_access\\|admin'"
  - "如果：create 有 workspace.* 检查而 update/import 只有 write grant 或无检查 → 漏洞"
  - "验证：低权用户调 create → 预期 403；同用户改走 update / import / responses 端点修改同一资源，看是否成功"
