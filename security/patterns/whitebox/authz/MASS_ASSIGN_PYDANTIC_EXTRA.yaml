id: MASS_ASSIGN_PYDANTIC_EXTRA
name: "Mass Assignment：Pydantic extra='allow' + 不安全 dict merge"
applicable: both
category: authz
cwe: CWE-915

trigger:
  - "Form 模型设了 ConfigDict(extra='allow')"
  - "创建/写入端点用 dict 展开构造：{**server_fields, **form.model_dump()}"
  - "form_dump 展开在 user_id 等敏感字段之后（后值覆盖）"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，grep 命令必须实际运行，不允许跳过"
  - "问：Form 模型是否设了 extra='allow'？"
  - "白盒：grep -rn \"ConfigDict(extra='allow')\" --include='*.py' models/"
  - "问：insert/构造时 server 字段和 **form.model_dump() 谁在后面？"
  - "白盒：grep -rn 'model_dump()' --include='*.py' | grep -B3 -A3 'user_id'"
  - "如果：extra='allow' 且 form_dump 在 user_id 之后 → 后值胜出，Mass Assignment 成立"
  - "验证：正常请求体外注入 \"user_id\":\"<他人UUID>\"，看响应里 user_id 是否变成注入值；再试注入 id / version / created_at 等字段"
