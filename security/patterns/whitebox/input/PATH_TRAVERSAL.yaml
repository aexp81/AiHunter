id: PATH_TRAVERSAL_FILE_OP
name: "用户可控路径直接用于文件操作"
applicable: whitebox
category: input
cwe: CWE-22

trigger:
  - "文件上传API"
  - "文件下载API"
  - "接受 filename/filepath/path 参数的接口"
  - "代码中有 open(user_input, ...) / shutil.copy(user_input, ...)"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，grep 命令必须实际运行，不允许跳过"
  - "问：上传的文件最终存储在服务器什么位置？(追踪数据流)"
  - "问：存储路径是完全硬编码，还是包含了用户可控输入（如 filename）？"
  - "问：如果包含用户输入，拼接方式是什么？(f-string / os.path.join / pathlib)"
  - "问：拼接前有没有路径规范化？检查点："
  - "  - os.path.basename() 提取纯文件名？"
  - "  - pathlib.Path().resolve() + 边界检查？"
  - "  - os.path.abspath() + startswith(BASE_DIR) 验证？"
  - "如果答案是：用户输入参与 + 字符串拼接 + 无规范化 → 漏洞存在"
  - "构造 payload: ../../tmp/pwned.txt 验证是否穿越成功"
  - "问：若用了 startswith 做边界检查，base 末尾是否带 os.sep？"
  - "白盒：grep -rn 'startswith' --include='*.py' | grep -iE 'abspath|dir|path'"
  - "如果 startswith(BASE) 缺 trailing os.sep → sibling-prefix 绕过（/cache 放行 /cache_evil）"
  - "问：扩展名/路径段是否用 filename.split('.')[-1] 提取而未过滤 '/'？"
  - "白盒：grep -rn \"split('\\\\.')\\[-1\\]\\|split(\\\".\\\")\\[-1\\]\" --include='*.py'"
  - "如果命中：filename 含 / 可注入路径段（绕过 basename 的另一 sink）"
