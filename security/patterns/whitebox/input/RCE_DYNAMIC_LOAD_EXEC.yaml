id: RCE_DYNAMIC_LOAD_EXEC
name: "RCE：用户可控代码/模块/命令进入动态执行"
applicable: both
category: input
cwe: "CWE-94 / CWE-78"

trigger:
  - "出现 exec/eval/new Function/importlib/subprocess(shell=True)/pip install"
  - "参数含用户输入或来自外部 server 的 SSE 事件"

reasoning_chain:
  - "执行规则：以下每条必须逐一执行，grep 命令必须实际运行，不允许跳过"
  - "问：代码中哪里有动态执行 sink？"
  - "白盒：grep -rn 'exec(\\|eval(\\|new Function\\|importlib\\|shell=True\\|subprocess' backend/ src/"
  - "问：被执行的字符串/模块 id/依赖名是否来自请求体或外部 SSE？"
  - "问：SSE/WebSocket 事件类型是否经白名单校验？"
  - "如果：用户内容直达 exec / 拼接进系统调用 / SSE 事件未白名单 → RCE"
  - "验证：创建 function/tool，后端在 import/toggle 时执行 __init__ 内代码，放 subprocess 验证回显；外部 model server 回 execute 事件，看前端是否执行"
